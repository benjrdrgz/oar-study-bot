<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OAR Pro — Ace the Officer Aptitude Rating</title>
  <meta name="description" content="The most comprehensive OAR study platform. 180+ practice questions, 21 lessons, adaptive testing, and science-backed study tools.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- MathJax (loaded on demand when study/formulas views activate) -->
  <script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax:{inlineMath:[['\\(','\\)']],displayMath:[['\\[','\\]']],processEscapes:true},
    "HTML-CSS":{scale:115,availableFonts:["TeX"]},
    showProcessingMessages:false,messageStyle:"none"
  });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.9/MathJax.js?config=TeX-MML-AM_CHTML"></script>

  <style>
    /* === DESIGN SYSTEM === */
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0B1120;
      --surface:#111827;
      --surface-2:#1F2937;
      --surface-3:#374151;
      --border:#1E293B;
      --border-hover:#334155;
      --accent:#3B82F6;
      --accent-hover:#2563EB;
      --accent-glow:rgba(59,130,246,.15);
      --green:#10B981;
      --green-bg:rgba(16,185,129,.1);
      --red:#EF4444;
      --red-bg:rgba(239,68,68,.1);
      --yellow:#F59E0B;
      --yellow-bg:rgba(245,158,11,.1);
      --purple:#8B5CF6;
      --text:#F9FAFB;
      --text-2:#9CA3AF;
      --text-3:#6B7280;
      --sidebar-width:280px;
    }
    body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
    a{color:var(--accent);text-decoration:none}
    a:hover{color:var(--accent-hover)}

    /* === LAYOUT === */
    .app-layout{display:flex;min-height:100vh;padding-top:56px}
    .app-sidebar{width:var(--sidebar-width);background:var(--surface);border-right:1px solid var(--border);position:fixed;top:56px;left:0;bottom:0;overflow-y:auto;z-index:50;transition:transform .2s}
    .app-main{flex:1;margin-left:var(--sidebar-width);padding:24px 32px;max-width:900px}
    .app-main.full-width{margin-left:0;max-width:100%}

    /* === TOP NAV === */
    .nav{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(11,17,32,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center}
    .nav-inner{max-width:1400px;margin:0 auto;padding:0 20px;width:100%;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.5px}
    .nav-logo span{color:var(--accent)}
    .nav-links{display:flex;gap:4px;align-items:center}
    .nav-link{padding:8px 14px;border-radius:8px;color:var(--text-2);font-size:14px;font-weight:500;transition:all .15s}
    .nav-link:hover{color:var(--text);background:var(--surface-2)}
    .nav-link.active{color:var(--accent);background:var(--accent-glow)}
    .nav-user{display:flex;align-items:center;gap:8px}
    .nav-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-glow);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;cursor:pointer}
    .nav-user-menu{position:absolute;top:52px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px;min-width:180px;display:none;z-index:200}
    .nav-user-menu.open{display:block}
    .nav-user-menu a{display:block;padding:8px 12px;border-radius:6px;color:var(--text-2);font-size:14px}
    .nav-user-menu a:hover{background:var(--surface-2);color:var(--text)}

    /* === SIDEBAR === */
    .sidebar-section{padding:16px}
    .sidebar-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-3);margin-bottom:8px;padding:0 12px}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--text-2);font-size:14px;cursor:pointer;transition:all .15s;margin-bottom:2px}
    .sidebar-item:hover{background:var(--surface-2);color:var(--text)}
    .sidebar-item.active{background:var(--accent-glow);color:var(--accent)}
    .sidebar-item .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .sidebar-item .status-dot.not-started{border:2px solid var(--text-3)}
    .sidebar-item .status-dot.in-progress{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
    .sidebar-item .status-dot.completed{background:var(--green);box-shadow:0 0 6px var(--green)}
    .sidebar-item .status-dot.weak{background:var(--red);box-shadow:0 0 6px var(--red)}
    .sidebar-progress{padding:16px;border-top:1px solid var(--border)}
    .sidebar-progress-bar{height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;margin-top:6px}
    .sidebar-progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
    .sidebar-score{text-align:center;padding:16px;border-bottom:1px solid var(--border)}
    .sidebar-score .score-value{font-size:32px;font-weight:800;color:var(--accent)}
    .sidebar-score .score-label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px}

    /* === CARDS === */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;transition:border-color .15s}
    .card:hover{border-color:var(--border-hover)}
    .card-title{font-size:16px;font-weight:700;margin-bottom:8px}
    .card-subtitle{font-size:13px;color:var(--text-2)}

    /* === BUTTONS === */
    .btn{padding:12px 24px;border-radius:10px;font-weight:600;font-size:14px;border:none;cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:8px}
    .btn-primary{background:var(--accent);color:white}
    .btn-primary:hover{background:var(--accent-hover)}
    .btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
    .btn-secondary:hover{border-color:var(--accent)}
    .btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.2)}
    .btn-success{background:var(--green-bg);color:var(--green);border:1px solid rgba(16,185,129,.2)}
    .btn-lg{padding:16px 32px;font-size:16px;border-radius:12px}
    .btn-sm{padding:8px 16px;font-size:13px}
    .btn-block{width:100%;justify-content:center}

    /* === FORMS === */
    .form-group{margin-bottom:16px}
    .form-label{display:block;font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:6px}
    .form-input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:14px;font-family:inherit;transition:border-color .15s}
    .form-input:focus{outline:none;border-color:var(--accent)}
    .form-error{font-size:12px;color:var(--red);margin-top:4px}

    /* === CALLOUTS (for lessons) === */
    .callout{padding:16px 18px;margin:14px 0;border-radius:0 10px 10px 0;line-height:1.7}
    .callout-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .callout-formula{background:rgba(59,130,246,.06);border-left:3px solid var(--accent)}.callout-formula .callout-title{color:var(--accent)}
    .callout-example{background:rgba(16,185,129,.06);border-left:3px solid var(--green)}.callout-example .callout-title{color:var(--green)}
    .callout-warning{background:rgba(239,68,68,.06);border-left:3px solid var(--red)}.callout-warning .callout-title{color:var(--red)}
    .callout-tip{background:rgba(245,158,11,.06);border-left:3px solid var(--yellow)}.callout-tip .callout-title{color:var(--yellow)}
    .callout-think{background:rgba(139,92,246,.08);border-left:3px solid var(--purple)}.callout-think .callout-title{color:var(--purple)}
    .callout-practice{background:rgba(59,130,246,.06);border:1px dashed rgba(59,130,246,.3);border-radius:10px;padding:18px}.callout-practice .callout-title{color:var(--accent)}
    .callout-oar{background:rgba(239,68,68,.06);border-left:3px solid var(--red)}.callout-oar .callout-title{color:var(--red)}
    .formula-block{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin:12px 0;text-align:center;min-height:40px;display:flex;align-items:center;justify-content:center}

    /* === LOADING === */
    .skeleton{background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface-3) 50%,var(--surface-2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skeleton-text{height:14px;margin-bottom:8px}
    .skeleton-title{height:24px;width:60%;margin-bottom:16px}
    .skeleton-card{height:120px;margin-bottom:12px}

    /* === TRANSITIONS === */
    #app{transition:opacity .15s ease}

    /* === MOBILE === */
    .mobile-toggle{display:none;position:fixed;bottom:20px;left:20px;z-index:200;width:48px;height:48px;border-radius:50%;background:var(--accent);color:white;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(59,130,246,.3)}
    @media(max-width:768px){
      .app-sidebar{transform:translateX(-100%)}
      .app-sidebar.open{transform:translateX(0)}
      .app-main{margin-left:0;padding:16px}
      .mobile-toggle{display:flex;align-items:center;justify-content:center}
      .nav-links{display:none}
    }

    /* === MathJax === */
    .MathJax{color:#e0e7ff !important;font-size:1.1em !important}

    /* === MISC === */
    .text-muted{color:var(--text-2)}
    .text-sm{font-size:13px}
    .text-center{text-align:center}
    .mt-4{margin-top:16px}
    .mt-8{margin-top:32px}
    .mb-4{margin-bottom:16px}
    .mb-8{margin-bottom:32px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
    @media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr}}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
    .badge-green{background:var(--green-bg);color:var(--green)}
    .badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
    .badge-red{background:var(--red-bg);color:var(--red)}
    .badge-blue{background:var(--accent-glow);color:var(--accent)}
    .divider{height:1px;background:var(--border);margin:24px 0}
  </style>
</head>
<body>

  <!-- Top Navigation (rendered by JS based on auth state) -->
  <nav class="nav" id="topnav"></nav>

  <!-- Mobile sidebar toggle -->
  <button class="mobile-toggle" id="mobileToggle" onclick="document.getElementById('sidebar').classList.toggle('open')">&#9776;</button>

  <!-- App Layout -->
  <div class="app-layout" id="layout">
    <!-- Sidebar (rendered by JS, hidden on public pages) -->
    <aside class="app-sidebar" id="sidebar"></aside>

    <!-- Main Content Area -->
    <main class="app-main" id="app">
      <!-- Views render here -->
    </main>
  </div>

  <!-- Scripts -->
  <script src="js/supabase-init.js"></script>
