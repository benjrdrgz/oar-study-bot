<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OAR Pro — Ace the Officer Aptitude Rating</title>
  <meta name="description" content="The most comprehensive OAR study platform. 180+ practice questions, 21 lessons, adaptive testing, and science-backed study tools.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;540;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- MathJax v3 (faster, cleaner API, no queue bugs) -->
  <script>
    window.MathJax = {
      tex: {
        // IMPORTANT: only \(...\) for inline math.
        // Do NOT enable $...$ — it breaks currency ($50) and percent formatting in plain prose.
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      },
      chtml: { scale: 1.15 }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <style>
    /* =======================================================
       DESIGN SYSTEM v2 — references: Linear, Raycast, Vercel
       =======================================================
       Linear:  HSL palette, 540 weight, layered shadows, tight tracking
       Raycast: #07080A bg (not pure #000), coral accent, 5-layer shadows
       Vercel:  pill radius, custom @font-face (we ship Space Grotesk + Inter)
    */
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      /* ——— HSL grayscale (Linear pattern) ——— */
      --h:220;                              /* single hue controls everything */
      --bg:hsl(var(--h), 22%, 4%);          /* NOT pure black — Raycast #07080A */
      --bg-elevated:hsl(var(--h), 20%, 6%);
      --surface:hsl(var(--h), 18%, 8.5%);   /* card background */
      --surface-2:hsl(var(--h), 16%, 12%);  /* elevated card */
      --surface-3:hsl(var(--h), 14%, 16%);
      --border:hsl(var(--h), 16%, 14%);
      --border-hover:hsl(var(--h), 18%, 22%);
      --border-strong:hsl(var(--h), 16%, 28%);

      /* ——— Accent: electric blue (was too pale) ——— */
      --accent:hsl(214, 100%, 62%);         /* #3E8BFF — more saturated */
      --accent-hover:hsl(214, 100%, 55%);
      --accent-glow:hsla(214, 100%, 62%, .16);
      --accent-soft:hsla(214, 100%, 62%, .08);

      /* ——— Semantic colors (tuned for dark bg) ——— */
      --green:hsl(152, 68%, 50%);           /* mint like Raycast */
      --green-bg:hsla(152, 68%, 50%, .12);
      --red:hsl(4, 90%, 64%);               /* coral-red */
      --red-bg:hsla(4, 90%, 64%, .12);
      --yellow:hsl(38, 94%, 58%);
      --yellow-bg:hsla(38, 94%, 58%, .12);
      --purple:hsl(264, 80%, 68%);

      /* ——— Text (Linear: never pure white) ——— */
      --text:hsl(0, 0%, 98%);               /* NOT #FFFFFF */
      --text-2:hsl(var(--h), 12%, 64%);
      --text-3:hsl(var(--h), 10%, 44%);

      /* ——— Layout ——— */
      --sidebar-width:280px;
      --nav-height:56px;
      --content-max:960px;

      /* ——— Shadows (layered, Linear/Raycast) ——— */
      --shadow-sm:
        0 1px 2px hsla(var(--h), 50%, 2%, .25),
        0 1px 1px hsla(var(--h), 50%, 2%, .15);
      --shadow-md:
        0 4px 12px hsla(var(--h), 60%, 2%, .35),
        0 2px 4px hsla(var(--h), 60%, 2%, .2),
        0 0 0 1px hsla(0, 0%, 100%, .04);
      --shadow-lg:
        0 24px 48px hsla(var(--h), 60%, 2%, .5),
        0 12px 24px hsla(var(--h), 60%, 2%, .35),
        0 0 0 1px hsla(0, 0%, 100%, .06);
      --shadow-glow:
        0 0 0 1px hsla(214, 100%, 62%, .4),
        0 0 24px hsla(214, 100%, 62%, .25),
        0 8px 32px hsla(214, 100%, 62%, .15);

      /* ——— Motion (Linear's easing curves) ——— */
      --ease-out:cubic-bezier(.22, 1, .36, 1);
      --ease-spring:cubic-bezier(.175, .885, .32, 1.275);
      --dur-fast:140ms;
      --dur-base:220ms;
    }

    /* ——— Base ——— */
    html{scroll-behavior:smooth}
    body{
      font-family:'Inter',system-ui,-apple-system,sans-serif;
      font-feature-settings:'ss01','cv11';   /* Inter tabular numerals + rounded 1 */
      font-weight:440;                        /* Linear: between regular and medium */
      background:var(--bg);
      color:var(--text);
      line-height:1.55;
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      letter-spacing:-0.003em;
    }
    /* Display type — Space Grotesk for big headings */
    h1,h2,h3,.display{
      font-family:'Space Grotesk','Inter',system-ui,sans-serif;
      font-weight:600;
      letter-spacing:-0.035em;        /* Linear tight tracking */
      line-height:1.1;
    }
    h1{font-size:clamp(1.75rem, 1.2rem + 2.4vw, 2.75rem)}
    h2{font-size:clamp(1.25rem, 1rem + 1.2vw, 1.625rem);letter-spacing:-0.025em}
    h3{font-size:clamp(1.0625rem, .95rem + .6vw, 1.25rem);letter-spacing:-0.018em}
    /* Guardrail: many legacy views have `font-weight:800` inline on headings.
       Force them back to the design-system weight so typography stays consistent
       site-wide without editing every legacy inline style. */
    h1,h2,h3{font-weight:600 !important}
    /* Big numeric displays (score, streak, percent etc.) — add class="num" to use JetBrains Mono.
       Legacy views use inline font-size/font-weight for big numbers; this rule normalises
       any element with class .big-num or .score-big without touching them. */
    .big-num, .score-big{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;font-weight:500 !important}
    /* Guardrail for legacy inline-styled big numbers across views.
       Catches any element whose inline style sets font-size to one of the common
       big-number sizes so they get JetBrains Mono + the correct weight without
       touching every legacy .js view. */
    [style*="font-size:56px"],[style*="font-size: 56px"],
    [style*="font-size:64px"],[style*="font-size: 64px"],
    [style*="font-size:48px"],[style*="font-size: 48px"],
    [style*="font-size:36px"],[style*="font-size: 36px"]{
      font-family:'JetBrains Mono',ui-monospace,monospace !important;
      font-variant-numeric:tabular-nums;
      letter-spacing:-0.02em;
      font-weight:500 !important;
    }
    /* Monospace for stats/numerics */
    .num,.stat,.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
    a{color:var(--accent);text-decoration:none;transition:color var(--dur-fast) var(--ease-out)}
    a:hover{color:var(--accent-hover)}
    ::selection{background:var(--accent-glow);color:var(--text)}

    /* Ambient gradient behind hero (Vercel-style iridescent) */
    body::before{
      content:'';
      position:fixed;
      top:-20vh;
      left:50%;
      width:140vw;
      height:80vh;
      transform:translateX(-50%);
      background:
        radial-gradient(ellipse at 30% 40%, hsla(214, 100%, 62%, .12), transparent 55%),
        radial-gradient(ellipse at 70% 60%, hsla(264, 80%, 68%, .08), transparent 55%);
      pointer-events:none;
      z-index:0;
      filter:blur(40px);
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration:0.01ms !important;
        transition-duration:0.01ms !important;
      }
    }

    /* === LAYOUT === */
    .app-layout{display:flex;min-height:100vh;padding-top:var(--nav-height);position:relative;z-index:1}
    .app-sidebar{width:var(--sidebar-width);background:var(--surface);border-right:1px solid var(--border);position:fixed;top:var(--nav-height);left:0;bottom:0;overflow-y:auto;z-index:50;transition:transform var(--dur-base) var(--ease-out);backdrop-filter:blur(8px)}
    .app-main{flex:1;margin-left:var(--sidebar-width);padding:28px 40px 60px}
    .app-main.full-width{margin-left:0;max-width:100%}

    /* === TOP NAV — Linear tiny 13px nav ===*/
    .nav{position:fixed;top:0;left:0;right:0;height:var(--nav-height);background:hsla(var(--h), 22%, 4%, .78);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center}
    .nav-inner{max-width:1400px;margin:0 auto;padding:0 24px;width:100%;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.045em;display:flex;align-items:center;gap:6px}
    .nav-logo span{color:var(--accent);font-weight:600}
    .nav-links{display:flex;gap:2px;align-items:center}
    .nav-link{
      padding:7px 13px;
      border-radius:7px;
      color:var(--text-2);
      font-size:13px;                      /* Linear: tiny nav */
      font-weight:540;                     /* Linear: between 500 and 600 */
      letter-spacing:-0.005em;
      transition:color var(--dur-fast) var(--ease-out), background var(--dur-fast) var(--ease-out);
      position:relative;
    }
    .nav-link:hover{color:var(--text);background:hsla(var(--h), 16%, 20%, .5)}
    .nav-link.active{color:var(--text);background:var(--surface-2)}
    .nav-link.active::after{
      content:'';position:absolute;
      left:13px;right:13px;bottom:-1px;
      height:2px;
      background:linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius:2px;
    }
    .nav-user{display:flex;align-items:center;gap:8px;position:relative}
    .nav-avatar{
      width:30px;height:30px;
      border-radius:50%;
      background:linear-gradient(135deg, var(--accent), var(--purple));
      color:var(--text);
      display:flex;align-items:center;justify-content:center;
      font-weight:600;font-size:12px;
      letter-spacing:-0.02em;
      cursor:pointer;
      transition:transform var(--dur-fast) var(--ease-spring);
      box-shadow:var(--shadow-sm);
    }
    .nav-avatar:hover{transform:scale(1.05)}
    .nav-user-menu{position:absolute;top:44px;right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:6px;min-width:200px;display:none;z-index:200;box-shadow:var(--shadow-lg)}
    .nav-user-menu.open{display:block;animation:menuIn 180ms var(--ease-out)}
    .nav-user-menu a{display:block;padding:9px 12px;border-radius:7px;color:var(--text-2);font-size:13px;font-weight:500;transition:all var(--dur-fast) var(--ease-out)}
    .nav-user-menu a:hover{background:var(--surface-2);color:var(--text)}
    @keyframes menuIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

    /* === SIDEBAR === */
    .sidebar-section{padding:14px}
    .sidebar-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.13em;color:var(--text-3);margin-bottom:6px;padding:6px 12px}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:7px;color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer;transition:color var(--dur-fast) var(--ease-out), background var(--dur-fast) var(--ease-out);margin-bottom:1px;letter-spacing:-0.003em}
    .sidebar-item:hover{background:hsla(var(--h), 18%, 14%, .55);color:var(--text)}
    .sidebar-item.active{background:var(--surface-2);color:var(--text);box-shadow:inset 2px 0 0 var(--accent)}
    .sidebar-item .status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .sidebar-item .status-dot.not-started{border:1.5px solid var(--text-3)}
    .sidebar-item .status-dot.in-progress{background:var(--yellow);box-shadow:0 0 8px hsla(38, 94%, 58%, .6)}
    .sidebar-item .status-dot.completed{background:var(--green);box-shadow:0 0 8px hsla(152, 68%, 50%, .6)}
    .sidebar-item .status-dot.weak{background:var(--red);box-shadow:0 0 8px hsla(4, 90%, 64%, .6)}
    .sidebar-progress{padding:14px 16px;border-top:1px solid var(--border)}
    .sidebar-progress-bar{height:4px;background:var(--surface-2);border-radius:2px;overflow:hidden;margin-top:6px}
    .sidebar-progress-fill{height:100%;background:linear-gradient(90deg, var(--green), hsl(172, 68%, 50%));border-radius:2px;transition:width var(--dur-base) var(--ease-out)}
    .sidebar-score{text-align:center;padding:18px 16px 14px;border-bottom:1px solid var(--border)}
    .sidebar-score .score-value{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:600;color:var(--text);letter-spacing:-0.035em;font-variant-numeric:tabular-nums}
    .sidebar-score .score-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.13em;font-weight:600;margin-top:2px}

    /* === CARDS === */
    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:14px;
      padding:22px 24px;
      transition:border-color var(--dur-base) var(--ease-out), transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out);
      position:relative;
    }
    .card:hover{
      border-color:var(--border-hover);
      box-shadow:var(--shadow-md);
    }
    .card-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;margin-bottom:6px;letter-spacing:-0.018em;color:var(--text)}
    .card-subtitle{font-size:13px;color:var(--text-2);line-height:1.5}

    /* === BUTTONS — layered shadow, Linear recipe === */
    .btn{
      padding:10px 18px;
      border-radius:9px;
      font-weight:540;
      font-size:13px;
      letter-spacing:-0.003em;
      border:none;
      cursor:pointer;
      transition:all var(--dur-fast) var(--ease-out);
      font-family:inherit;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      position:relative;
      white-space:nowrap;
      user-select:none;
      -webkit-user-select:none;
    }
    .btn-primary{
      background:linear-gradient(180deg, hsl(214, 100%, 65%), hsl(214, 100%, 58%));
      color:#fff;
      box-shadow:
        inset 0 1px 0 hsla(0, 0%, 100%, .2),
        0 1px 2px hsla(214, 100%, 30%, .4),
        0 4px 12px hsla(214, 100%, 40%, .25),
        0 0 0 1px hsla(214, 100%, 55%, .5);
      font-weight:600;
    }
    .btn-primary:hover{
      background:linear-gradient(180deg, hsl(214, 100%, 68%), hsl(214, 100%, 62%));
      box-shadow:
        inset 0 1px 0 hsla(0, 0%, 100%, .25),
        0 2px 4px hsla(214, 100%, 30%, .5),
        0 8px 20px hsla(214, 100%, 40%, .35),
        0 0 0 1px hsla(214, 100%, 60%, .6);
      transform:translateY(-0.5px);
    }
    .btn-primary:active{transform:translateY(0);box-shadow:inset 0 1px 3px hsla(214, 100%, 20%, .4), 0 0 0 1px hsla(214, 100%, 55%, .6)}
    .btn-secondary{
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--border-strong);
      box-shadow:inset 0 1px 0 hsla(0, 0%, 100%, .04), 0 1px 2px hsla(var(--h), 50%, 2%, .3);
    }
    .btn-secondary:hover{background:var(--surface-3);border-color:var(--border-hover)}
    .btn-danger{background:var(--red-bg);color:var(--red);border:1px solid hsla(4, 90%, 64%, .25)}
    .btn-danger:hover{background:hsla(4, 90%, 64%, .18);border-color:hsla(4, 90%, 64%, .4)}
    .btn-success{background:var(--green-bg);color:var(--green);border:1px solid hsla(152, 68%, 50%, .25)}
    .btn-lg{padding:14px 26px;font-size:15px;border-radius:11px}
    .btn-sm{padding:7px 14px;font-size:12px;border-radius:7px}
    .btn-block{width:100%;justify-content:center}
    .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

    /* === FORMS === */
    .form-group{margin-bottom:18px}
    .form-label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:7px;letter-spacing:-0.003em;text-transform:none}
    .form-input{
      width:100%;
      padding:11px 14px;
      border-radius:9px;
      border:1px solid var(--border-strong);
      background:var(--bg-elevated);
      color:var(--text);
      font-size:14px;
      font-weight:500;
      font-family:inherit;
      letter-spacing:-0.003em;
      transition:border-color var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out), background var(--dur-fast) var(--ease-out);
    }
    .form-input::placeholder{color:var(--text-3);font-weight:440}
    .form-input:hover{border-color:var(--border-hover)}
    .form-input:focus{
      outline:none;
      border-color:var(--accent);
      background:var(--surface);
      box-shadow:0 0 0 3px var(--accent-soft);
    }
    .form-error{font-size:12px;color:var(--red);margin-top:6px;font-weight:500}

    /* === CALLOUTS (for lessons) === */
    .callout{padding:16px 18px;margin:14px 0;border-radius:0 10px 10px 0;line-height:1.7}
    .callout-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .callout-formula{background:rgba(59,130,246,.06);border-left:3px solid var(--accent)}.callout-formula .callout-title{color:var(--accent)}
    .callout-example{background:rgba(16,185,129,.06);border-left:3px solid var(--green)}.callout-example .callout-title{color:var(--green)}
    .callout-warning{background:rgba(239,68,68,.06);border-left:3px solid var(--red)}.callout-warning .callout-title{color:var(--red)}
    .callout-tip{background:rgba(245,158,11,.06);border-left:3px solid var(--yellow)}.callout-tip .callout-title{color:var(--yellow)}
    .callout-think{background:rgba(139,92,246,.08);border-left:3px solid var(--purple)}.callout-think .callout-title{color:var(--purple)}
    .callout-practice{background:rgba(59,130,246,.06);border:1px dashed rgba(59,130,246,.3);border-radius:10px;padding:18px}.callout-practice .callout-title{color:var(--accent)}
    .callout-oar{background:rgba(239,68,68,.06);border-left:3px solid var(--red)}.callout-oar .callout-title{color:var(--red)}
    .formula-block{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin:12px 0;text-align:center;min-height:40px;display:flex;align-items:center;justify-content:center}
    /* Inline math — used when a formula is embedded in prose. Keeps math typographically distinct from surrounding text without MathJax overhead. */
    .math-inline{font-family:'JetBrains Mono','SF Mono',Menlo,monospace;font-size:.95em;color:var(--text);background:rgba(255,255,255,.035);padding:1px 6px;border-radius:4px;border:1px solid rgba(255,255,255,.05);white-space:nowrap}
    /* === LESSON CONTENT TYPOGRAPHY — readable, spacious, study-optimized === */
    .lesson-content{font-size:15.5px;line-height:1.85;color:var(--text)}
    .lesson-content h1{font-size:24px;font-weight:800;margin:0 0 20px;line-height:1.2;letter-spacing:-.025em}
    .lesson-content h2{font-size:19px;font-weight:700;margin:44px 0 14px;line-height:1.25;letter-spacing:-.02em;color:var(--text)}
    .lesson-content h2:first-child{margin-top:8px}
    .lesson-content h3{font-size:15.5px;font-weight:650;margin:32px 0 10px;line-height:1.35;color:var(--text)}
    .lesson-content p{margin:0 0 20px;line-height:1.85}
    .lesson-content p:last-child{margin-bottom:0}
    .lesson-content ul,.lesson-content ol{margin:0 0 20px;padding-left:28px}
    .lesson-content li{margin-bottom:10px;line-height:1.75}
    .lesson-content li:last-child{margin-bottom:0}
    .lesson-content strong{font-weight:660;color:var(--text)}
    .lesson-content em{font-style:italic;color:var(--text-2)}
    .lesson-content .callout{margin:24px 0;line-height:1.8}
    .lesson-content .callout p{margin-bottom:10px}
    .lesson-content .callout li{margin-bottom:8px}
    .lesson-content .formula-block{margin:20px 0;font-size:1.05em}
    .lesson-content hr,.lesson-content .divider{margin:32px 0}
    .lesson-content sup,.lesson-content sub{font-size:.72em;line-height:0;position:relative}
    .lesson-content sup{top:-.4em}
    .lesson-content sub{bottom:-.2em}
    /* Practice view — question + explanation readability */
    #questionText{font-size:17px!important;line-height:1.75!important}
    .quiz-explanation p{line-height:1.8;font-size:14.5px}
    .callout p{line-height:1.8}

    /* === LANDING PAGE — design system compliant ===
       No hardcoded font-weight or font-size overrides.
       Inherits h1/h2/h3 tokens from the type scale. */
    .landing-hero{text-align:center;padding:72px 24px 48px;max-width:780px;margin:0 auto;position:relative;z-index:1}
    .landing-hero .eyebrow{display:inline-block;padding:5px 13px;border-radius:999px;background:hsla(214,100%,62%,.08);border:1px solid hsla(214,100%,62%,.18);color:var(--accent);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:22px}
    .landing-hero .hero-title{font-size:clamp(2.25rem,1.6rem + 2.8vw,3.75rem);margin:0 0 18px;line-height:1.04}
    .landing-hero .hero-accent{background:linear-gradient(135deg, var(--accent) 0%, hsl(264, 85%, 70%) 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
    .landing-hero .hero-lede{font-size:17px;color:var(--text-2);max-width:560px;margin:0 auto 28px;line-height:1.6}
    .landing-hero .hero-cta-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .landing-hero .hero-meta{margin-top:18px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;font-size:12px;color:var(--text-3)}
    .landing-hero .hero-meta-sep{color:var(--border-strong)}

    .landing-stats{max-width:880px;margin:0 auto 64px;padding:0 24px}
    .landing-stats .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border-hover);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm)}
    .landing-stats .stat-card{background:var(--surface);padding:24px 16px;text-align:center;transition:background var(--dur-fast) var(--ease-out)}
    .landing-stats .stat-card:hover{background:var(--surface-2)}
    .landing-stats .stat{font-size:28px;font-weight:500;color:var(--text);display:block;margin-bottom:4px;line-height:1.1}
    .landing-stats .stat-label{font-size:11px;color:var(--text-3);letter-spacing:.06em;text-transform:uppercase;font-weight:500}

    .landing-section{max-width:1000px;margin:0 auto 72px;padding:0 24px}
    .landing-section-narrow{max-width:720px}
    .landing-section .section-header{text-align:center;margin-bottom:36px}
    .landing-section .section-header h2{font-size:clamp(1.5rem, 1.2rem + 1.2vw, 2rem);margin:0 0 8px}
    .landing-section .section-lede{color:var(--text-2);font-size:15px;margin:0}

    .feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .feature-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px 24px;transition:border-color var(--dur-fast) var(--ease-out),transform var(--dur-fast) var(--ease-out)}
    .feature-card:hover{border-color:var(--border-hover);transform:translateY(-2px)}
    .feature-card h3{margin:0 0 8px;color:var(--text)}
    .feature-card p{font-size:14px;color:var(--text-2);line-height:1.6;margin:0}

    .how-list{display:flex;flex-direction:column;gap:28px}
    .how-row{display:flex;gap:22px;align-items:flex-start}
    .how-num{font-size:13px;color:var(--accent);background:hsla(214,100%,62%,.08);border:1px solid hsla(214,100%,62%,.18);min-width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0}
    .how-body h3{margin:0 0 4px}
    .how-body p{margin:0;font-size:14px;color:var(--text-2);line-height:1.65}

    .landing-section-pricing{max-width:500px}
    .pricing-card{background:var(--surface);border:1px solid var(--border-hover);border-radius:16px;padding:40px 32px 32px;position:relative;overflow:hidden;box-shadow:var(--shadow-md)}
    .pricing-ribbon{position:absolute;top:18px;right:-38px;transform:rotate(45deg);background:var(--accent);color:hsl(var(--h), 22%, 4%);padding:5px 44px;font-size:10px;font-weight:700;letter-spacing:.06em;font-family:'Inter',sans-serif}
    .pricing-head{text-align:center;margin-bottom:28px}
    .pricing-strike{font-size:14px;color:var(--text-3);text-decoration:line-through;display:block;margin-bottom:2px}
    .pricing-amount{font-size:56px;font-weight:500;color:var(--text);line-height:1;display:block;margin-bottom:8px}
    .pricing-cycle{font-size:13px;color:var(--text-2)}
    .pricing-referral-note{font-size:12px;color:var(--text-3);margin-top:8px;line-height:1.5}
    .pricing-referral-callout{display:flex;align-items:flex-start;gap:8px;margin-top:12px;padding:10px 14px;background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.3);border-radius:8px;font-size:13px;color:hsl(48,96%,75%);line-height:1.45}
    .pricing-referral-callout-icon{flex-shrink:0;font-size:15px;margin-top:1px}
    /* Deal state — referral code detected */
    .pricing-card-deal{border-color:rgba(34,197,94,.35);box-shadow:0 0 0 1px rgba(34,197,94,.2),0 8px 40px rgba(34,197,94,.08)}
    .pricing-ribbon-deal{background:var(--green);color:hsl(142,71%,8%)}
    .pricing-deal-banner{display:flex;align-items:center;gap:8px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;color:var(--green);margin-bottom:16px;line-height:1.4}
    .pricing-deal-icon{font-size:18px;flex-shrink:0}
    .pricing-amount-deal{color:var(--green)}
    .pricing-features{list-style:none;padding:0;margin:0 0 28px;border-top:1px solid var(--border);padding-top:22px}
    .pricing-features li{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:14px;color:var(--text)}
    .pricing-features .check{color:var(--green);font-size:15px;flex-shrink:0}
    .pricing-guarantee{text-align:center;font-size:12px;color:var(--text-3);margin:14px 0 0}

    .faq-list{display:flex;flex-direction:column;gap:6px}
    .faq-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color var(--dur-fast) var(--ease-out)}
    .faq-row:hover{border-color:var(--border-hover)}
    .faq-q{padding:20px 26px;display:flex;justify-content:space-between;align-items:center;gap:16px;font-weight:500;font-size:15px;color:var(--text)}
    .faq-icon{color:var(--text-3);font-size:18px;font-weight:300;transition:transform var(--dur-fast) var(--ease-out);line-height:1}
    .faq-a{display:none;padding:0 26px 22px;color:var(--text-2);font-size:14px;line-height:1.7}
    .faq-a.open{display:block}

    .landing-final-cta{text-align:center;max-width:580px;padding:48px 24px 72px}
    .landing-final-cta h2{font-size:clamp(1.5rem, 1.2rem + 1.2vw, 2rem);margin:0 0 8px}
    .landing-final-cta .section-lede{margin-bottom:26px}

    .landing-footer{border-top:1px solid var(--border);padding:36px 24px 48px;text-align:center;max-width:1000px;margin:0 auto}
    .landing-footer .footer-links{display:flex;justify-content:center;gap:28px;margin-bottom:20px;flex-wrap:wrap}
    .landing-footer .footer-links a{color:var(--text-3);font-size:13px;transition:color var(--dur-fast) var(--ease-out)}
    .landing-footer .footer-links a:hover{color:var(--text-2)}
    .landing-footer .footer-disclaimer{font-size:12px;color:var(--text-3);line-height:1.7;margin:0}

    @media (max-width:780px){
      .feature-grid{grid-template-columns:1fr}
      .landing-stats .stats-grid{grid-template-columns:repeat(2,1fr)}
      .landing-stats .stat{font-size:26px}
    }

    /* === LOADING === */
    .skeleton{background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface-3) 50%,var(--surface-2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skeleton-text{height:14px;margin-bottom:8px}
    .skeleton-title{height:24px;width:60%;margin-bottom:16px}
    .skeleton-card{height:120px;margin-bottom:12px}

    /* === TRANSITIONS === */
    #app{transition:opacity .15s ease}

    /* === MOBILE === */
    .mobile-toggle{display:none;position:fixed;bottom:20px;left:20px;z-index:200;width:52px;height:52px;border-radius:50%;background:var(--accent);color:white;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(59,130,246,.4)}
    .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:49}
    .sidebar-backdrop.open{display:block}
    .mobile-nav-menu{display:none;position:fixed;top:56px;right:0;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 0 12px;padding:8px;z-index:99;min-width:200px;box-shadow:-4px 4px 16px rgba(0,0,0,.3)}
    .mobile-nav-menu.open{display:block}
    .mobile-nav-menu a{display:block;padding:12px 16px;color:var(--text);text-decoration:none;border-radius:8px;font-size:15px;font-weight:500}
    .mobile-nav-menu a:hover{background:var(--surface-2)}
    .mobile-nav-menu a.admin{color:var(--yellow)}
    .hamburger-btn{display:none;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:4px 8px;margin-right:8px}
    @media(max-width:768px){
      .app-sidebar{transform:translateX(-100%);box-shadow:4px 0 20px rgba(0,0,0,.4)}
      .app-sidebar.open{transform:translateX(0)}
      .app-main{margin-left:0;padding:16px;max-width:100%}
      .app-main.full-width{padding:0}
      .mobile-toggle{display:flex;align-items:center;justify-content:center}
      .nav-links{display:none}
      .hamburger-btn{display:block}
      .nav-inner{padding:0 12px}
      .nav-logo{font-size:18px}
      /* Compact cards on mobile */
      .card{padding:16px}
      h1{font-size:24px !important}
      h2{font-size:20px !important}
    }

    /* === MathJax === */
    .MathJax{color:#e0e7ff !important;font-size:1.1em !important}

    /* === MISC === */
    .text-muted{color:var(--text-2)}
    .text-sm{font-size:13px}
    .text-center{text-align:center}
    .mt-4{margin-top:16px}
    .mt-8{margin-top:32px}
    .mb-4{margin-bottom:16px}
    .mb-8{margin-bottom:32px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
    @media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr}}
    .badge{
      display:inline-flex;
      align-items:center;
      gap:4px;
      padding:3px 9px;
      border-radius:999px;
      font-size:10.5px;
      font-weight:600;
      letter-spacing:.01em;
      border:1px solid transparent;
      font-variant-numeric:tabular-nums;
      line-height:1.4;
    }
    .badge-green{background:var(--green-bg);color:var(--green);border-color:hsla(152, 68%, 50%, .2)}
    .badge-yellow{background:var(--yellow-bg);color:var(--yellow);border-color:hsla(38, 94%, 58%, .22)}
    .badge-red{background:var(--red-bg);color:var(--red);border-color:hsla(4, 90%, 64%, .25)}
    .badge-blue{background:var(--accent-soft);color:var(--accent);border-color:hsla(214, 100%, 62%, .25)}
    .divider{height:1px;background:linear-gradient(90deg, transparent, var(--border) 20%, var(--border) 80%, transparent);margin:28px 0;border:0}

    /* === HERO KBD KEY PILL === */
    kbd, .kbd{
      display:inline-flex;align-items:center;justify-content:center;
      min-width:20px;height:20px;padding:0 6px;
      background:var(--surface-2);
      border:1px solid var(--border-strong);
      border-bottom-width:2px;
      border-radius:5px;
      font-family:'JetBrains Mono',ui-monospace,monospace;
      font-size:10px;font-weight:600;
      color:var(--text-2);
      letter-spacing:0;
      box-shadow:0 1px 2px hsla(var(--h), 60%, 2%, .2);
    }

    /* === AMBIENT SPINNER === */
    .spinner{
      width:18px;height:18px;
      border:2px solid var(--border-hover);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin 700ms linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

  <!-- Top Navigation (rendered by JS based on auth state) -->
  <nav class="nav" id="topnav"></nav>

  <!-- Mobile sidebar toggle -->
  <button class="mobile-toggle" id="mobileToggle" onclick="toggleSidebar()">&#9776;</button>

  <!-- Sidebar backdrop (closes sidebar on tap outside) -->
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

  <!-- Mobile nav menu (shown via hamburger in top nav) -->
  <div class="mobile-nav-menu" id="mobileNavMenu"></div>

  <!-- App Layout -->
  <div class="app-layout" id="layout">
    <!-- Sidebar (rendered by JS, hidden on public pages) -->
    <aside class="app-sidebar" id="sidebar"></aside>

    <!-- Main Content Area -->
    <main class="app-main" id="app">
      <!-- Views render here -->
    </main>
  </div>

  <!-- Scripts -->
  <script src="js/supabase-init.js"></script>
  <script src="js/router.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/generators/index.js"></script>
  <script src="js/store.js"></script>
  <script src="js/scorecard.js"></script>
  <script src="js/checkout.js"></script>

  <!-- View scripts -->
  <script src="js/views/landing.js"></script>
  <script src="js/views/onboarding.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/study.js"></script>
  <script src="js/views/practice.js"></script>
  <script src="js/views/adaptive.js"></script>
  <script src="js/views/formulas.js"></script>
  <script src="js/views/strategies.js"></script>
  <script src="js/views/tutor.js"></script>
  <script src="js/views/test-day.js"></script>
  <script src="js/views/diagnostic.js"></script>
  <script src="js/views/profile.js"></script>
  <script src="js/views/admin/sales.js"></script>
  <script src="js/views/admin/affiliates.js"></script>
  <script src="js/views/admin/preview.js"></script>

  <!-- Mobile UI helpers -->
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarBackdrop').classList.toggle('open');
    }
    function toggleMobileNav() {
      document.getElementById('mobileNavMenu').classList.toggle('open');
    }
    // Close mobile nav when clicking a link or outside
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('mobileNavMenu');
      if (!menu) return;
      if (e.target.closest('.mobile-nav-menu a')) {
        menu.classList.remove('open');
      } else if (!e.target.closest('.hamburger-btn') && !e.target.closest('.mobile-nav-menu')) {
        menu.classList.remove('open');
      }
    });
    // Close sidebar when clicking a sidebar link (mobile only)
    document.addEventListener('click', (e) => {
      if (window.innerWidth > 768) return;
      if (e.target.closest('.app-sidebar a, .sidebar-item')) {
        const sb = document.getElementById('sidebar');
        if (sb && sb.classList.contains('open')) {
          sb.classList.remove('open');
          document.getElementById('sidebarBackdrop').classList.remove('open');
        }
      }
    });

    /* ==========================================================
       GLOBAL KEYBOARD SHORTCUTS
       D — Dashboard
       S — Study
       P — Practice (Quick Drill)
       I — Infinite drill
       T — Test sim (Adaptive CAT)
       F — Formulas
       ? — Show shortcut overlay
       Escape — close shortcut overlay
       Ignored when typing in inputs or during a quiz.
       ========================================================== */
    const KEYBOARD_SHORTCUTS = [
      { key: 'D', hash: '#/dashboard',  label: 'Dashboard' },
      { key: 'S', hash: '#/study',      label: 'Study' },
      { key: 'P', hash: '#/practice',   label: 'Practice' },
      { key: 'I', hash: '#/practice',   label: 'Infinite Drill', action: 'infinite' },
      { key: 'T', hash: '#/adaptive',   label: 'Test Sim' },
      { key: 'F', hash: '#/formulas',   label: 'Formulas' },
      { key: 'G', hash: '#/strategies', label: 'Strategies' },
      { key: 'U', hash: '#/tutor',      label: 'Tutor' },
      { key: 'R', hash: '#/profile',    label: 'Profile' },
    ];
    function showShortcutOverlay() {
      let el = document.getElementById('kbdOverlay');
      if (!el) {
        el = document.createElement('div');
        el.id = 'kbdOverlay';
        el.style.cssText = 'position:fixed;inset:0;background:hsla(220,22%,4%,.82);backdrop-filter:blur(8px);z-index:999;display:flex;align-items:center;justify-content:center;animation:fadeIn 140ms ease-out';
        el.innerHTML = `
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 36px;max-width:440px;width:90%;box-shadow:var(--shadow-lg)" onclick="event.stopPropagation()">
            <h2 style="margin-bottom:4px;font-size:20px">Keyboard Shortcuts</h2>
            <p class="text-muted" style="font-size:13px;margin-bottom:20px;color:var(--text-2)">Press any key to jump around the app.</p>
            <div style="display:flex;flex-direction:column;gap:10px">
              ${KEYBOARD_SHORTCUTS.map(s => `
                <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px">
                  <span style="color:var(--text)">${s.label}</span>
                  <kbd class="kbd">${s.key}</kbd>
                </div>
              `).join('')}
              <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-top:4px;padding-top:12px;border-top:1px solid var(--border)">
                <span style="color:var(--text-2)">Show this menu</span>
                <kbd class="kbd">?</kbd>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px">
                <span style="color:var(--text-2)">Close</span>
                <kbd class="kbd">Esc</kbd>
              </div>
            </div>
          </div>
        `;
        el.onclick = () => el.remove();
        document.body.appendChild(el);
      } else {
        el.remove();
      }
    }
    document.addEventListener('keydown', (e) => {
      // Ignore typing in inputs/textarea/contenteditable
      const tag = (e.target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea' || e.target.isContentEditable) return;
      // Ignore during active quiz (avoid hijacking 1-4 answer shortcuts)
      if (typeof quizState !== 'undefined' && quizState?.questions?.length && !quizState.finished && /\/practice/.test(location.hash)) return;
      if (typeof catState !== 'undefined' && catState?.phase === 'testing') return;
      // Ignore when modifier keys are down
      if (e.metaKey || e.ctrlKey || e.altKey) return;

      if (e.key === '?' || (e.shiftKey && e.key === '/')) { e.preventDefault(); showShortcutOverlay(); return; }
      if (e.key === 'Escape') { document.getElementById('kbdOverlay')?.remove(); return; }

      const match = KEYBOARD_SHORTCUTS.find(s => s.key === e.key.toUpperCase());
      if (match) {
        e.preventDefault();
        location.hash = match.hash;
        if (match.action === 'infinite') {
          // wait for practice to render then start infinite
          setTimeout(() => { if (typeof startQuiz === 'function') startQuiz('infinite'); }, 350);
        }
      }
    });
  </script>


</body>
</html>
