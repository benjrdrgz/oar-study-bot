<html lang="en">
<head>

<title>Practice — OAR Pro</title>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0B1120;--surface:#111827;--surface-2:#1F2937;--surface-3:#374151;
  --border:#1E293B;--border-hover:#334155;
  --accent:#3B82F6;--accent-hover:#2563EB;--accent-glow:rgba(59,130,246,.15);
  --green:#10B981;--green-bg:rgba(16,185,129,.1);
  --red:#EF4444;--red-bg:rgba(239,68,68,.1);
  --yellow:#F59E0B;--yellow-bg:rgba(245,158,11,.1);
  --purple:#8B5CF6;
  --text:#F9FAFB;--text-2:#9CA3AF;--text-3:#6B7280;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding-top:72px}
a{color:inherit;text-decoration:none}

.nav{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(11,17,32,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;width:100%;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-size:18px;font-weight:800;color:var(--text);text-decoration:none;letter-spacing:-.5px}
.nav-links{display:flex;gap:4px}
.nav-link{padding:8px 14px;border-radius:8px;color:var(--text-2);text-decoration:none;font-size:14px;font-weight:500;transition:all .15s}
.nav-link:hover{color:var(--text);background:var(--surface-2)}
.nav-link.active{color:var(--accent);background:var(--accent-glow)}

.container{max-width:800px;margin:0 auto;padding:0 20px}

/* Mode Selector */
.mode-selector{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:32px}
.mode-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;text-align:center;transition:all .2s}
.mode-card:hover{border-color:var(--border-hover);transform:translateY(-2px)}
.mode-card.active{border-color:var(--accent);background:var(--accent-glow)}
.mode-icon{font-size:24px;margin-bottom:8px}
.mode-name{font-size:13px;font-weight:600}
.mode-desc{font-size:11px;color:var(--text-3);margin-top:4px}

/* Topic Filter */
.topic-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.topic-btn{padding:6px 14px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.topic-btn:hover{border-color:var(--border-hover);color:var(--text)}
.topic-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Quiz Header */
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.quiz-progress{flex:1;margin-right:20px}
.quiz-progress-bar{height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden}
.quiz-progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.quiz-progress-text{font-size:12px;color:var(--text-3);margin-top:4px}
.quiz-timer{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;padding:8px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:80px;text-align:center}
.quiz-timer.warning{color:var(--red);border-color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* Question Card */
.question-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:24px}
.question-number{font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.question-passage{font-size:14px;line-height:1.7;color:var(--text-2);padding:16px 20px;background:var(--surface-2);border-radius:10px;margin-bottom:20px;border-left:3px solid var(--accent)}
.question-text{font-size:18px;font-weight:600;line-height:1.5;margin-bottom:24px}

/* Answer Options */
.answers{display:flex;flex-direction:column;gap:10px}
.answer-option{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--surface-2);border:2px solid transparent;border-radius:12px;cursor:pointer;transition:all .15s;font-size:15px}
.answer-option:hover{border-color:var(--border-hover);background:var(--surface-3)}
.answer-option.selected{border-color:var(--accent);background:var(--accent-glow)}
.answer-option.correct{border-color:var(--green);background:var(--green-bg)}
.answer-option.wrong{border-color:var(--red);background:var(--red-bg)}
.answer-option.show-correct{border-color:var(--green);background:var(--green-bg)}
.answer-letter{width:32px;height:32px;border-radius:50%;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;transition:all .15s}
.answer-option.selected .answer-letter{background:var(--accent);color:#fff}
.answer-option.correct .answer-letter{background:var(--green);color:#fff}
.answer-option.wrong .answer-letter{background:var(--red);color:#fff}
.answer-option.show-correct .answer-letter{background:var(--green);color:#fff}
.answer-text{flex:1}

/* Result icons */
.result-icon{font-size:18px;flex-shrink:0}

/* Explanation */
.explanation{margin-top:20px;padding:16px 20px;border-radius:12px;background:var(--accent-glow);border-left:3px solid var(--accent);font-size:14px;line-height:1.6;display:none}
.explanation.visible{display:block}
.explanation strong{color:var(--text)}

/* Action Buttons */
.quiz-actions{display:flex;gap:12px;margin-top:20px}
.btn{padding:12px 24px;border-radius:10px;font-weight:600;font-size:14px;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border-hover)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Results Screen */
.results-screen{text-align:center;padding:40px 0}
.results-score{font-size:72px;font-weight:800;margin:20px 0 8px;letter-spacing:-2px}
.results-score.great{color:var(--green)}
.results-score.ok{color:var(--yellow)}
.results-score.low{color:var(--red)}
.results-subtitle{font-size:16px;color:var(--text-2);margin-bottom:32px}
.results-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px;text-align:left}
.results-stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.results-stat-label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.results-stat-value{font-size:20px;font-weight:700}
.results-breakdown{text-align:left;margin-bottom:32px}
.results-breakdown h3{font-size:14px;font-weight:600;margin-bottom:12px}
.breakdown-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.breakdown-label{flex:1;font-size:14px}
.breakdown-bar{width:120px;height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden}
.breakdown-fill{height:100%;border-radius:3px}
.breakdown-pct{font-size:14px;font-weight:600;width:40px;text-align:right}
.results-actions{display:flex;gap:12px;justify-content:center}

/* Start Screen */
.start-screen{text-align:center;padding:60px 0}
.start-screen h1{font-size:28px;font-weight:800;margin-bottom:8px}
.start-screen p{color:var(--text-2);margin-bottom:32px}

/* Confetti */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200;overflow:hidden}
.confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:confetti-fall 3s linear forwards}
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

@media(max-width:768px){
  .mode-selector{grid-template-columns:repeat(2,1fr)}
  .results-grid{grid-template-columns:1fr}
  .question-text{font-size:16px}
  .quiz-timer{font-size:16px;padding:6px 12px}
}
</style>
</head>

  {id:"M2",section:"Math",topic:"Arithmetic",q:"What is 3/4 + 2/3?",passage:null,options:["17/12","5/7","5/12","1 5/12"],correct:0,explanation:"Common denominator: (3x3 + 4x2) / (4x3) = (9+8)/12 = 17/12."},
  {id:"M3",section:"Math",topic:"Arithmetic",q:"A $50 item is marked up 40%, then discounted 25%. What is the final price?",passage:null,options:["$52.50","$57.50","$50.00","$47.50"],correct:0,explanation:"$50 x 1.40 = $70, then $70 x 0.75 = $52.50. Percentages on different bases don't cancel."},

  {id:"M5",section:"Math",topic:"Arithmetic",q:"A value increases from 1200 to 1500. What is the percent increase?",passage:null,options:["25%","20%","30%","15%"],correct:0,explanation:"% change = (1500-1200)/1200 x 100 = 300/1200 x 100 = 25%."},
  {id:"M6",section:"Math",topic:"Arithmetic",q:"The ratio of boys to girls is 3:5. If there are 40 students total, how many boys?",passage:null,options:["15","24","18","12"],correct:0,explanation:"Total parts = 3+5 = 8. Boys = (3/8) x 40 = 15."},
  {id:"M7",section:"Math",topic:"Arithmetic",q:"What is 15% of 240?",passage:null,options:["36","32","38","42"],correct:0,explanation:"0.15 x 240 = 36."},
  {id:"M8",section:"Math",topic:"Arithmetic",q:"What is (2/3)² × (9/4)?",passage:null,options:["1","2/3","3/4","4/9"],correct:0,explanation:"(2/3)² = 4/9. Then 4/9 x 9/4 = 36/36 = 1."},
  {id:"M36",section:"Math",topic:"Arithmetic",q:"What is 0.125 expressed as a fraction?",passage:null,options:["1/8","1/6","1/4","1/5"],correct:0,explanation:"0.125 = 125/1000 = 1/8."},

  // MATH - ALGEBRA
  {id:"M9",section:"Math",topic:"Algebra",q:"Solve: 3x - 7 = 14",passage:null,options:["x = 7","x = 3","x = 21","x = -7"],correct:0,explanation:"3x = 21, so x = 7."},
  {id:"M10",section:"Math",topic:"Algebra",q:"Solve the system: 2x + y = 7 and x - y = 2",passage:null,options:["x=3, y=1","x=2, y=3","x=4, y=-1","x=1, y=5"],correct:0,explanation:"Add equations: 3x = 9, x = 3. Then 3 - y = 2, y = 1."},
  {id:"M11",section:"Math",topic:"Algebra",q:"Simplify: x³ · x⁵ / x²",passage:null,options:["x⁶","x⁸","x¹⁰","x⁴"],correct:0,explanation:"Add exponents for multiplication (3+5=8), subtract for division (8-2=6): x⁶."},
  {id:"M12",section:"Math",topic:"Algebra",q:"Factor: x² - 5x + 6",passage:null,options:["(x-2)(x-3)","(x+2)(x+3)","(x-1)(x-6)","(x+1)(x-6)"],correct:0,explanation:"Find two numbers that multiply to 6 and add to -5: -2 and -3. So (x-2)(x-3)."},
  {id:"M13",section:"Math",topic:"Algebra",q:"Solve: 2x² + 5x - 3 = 0",passage:null,options:["x = 1/2 or x = -3","x = 3 or x = -1/2","x = 1 or x = -3/2","x = 2 or x = -3"],correct:0,explanation:"Using quadratic formula: x = (-5 ± √49)/4 = (-5±7)/4. x = 2/4 = 1/2 or x = -12/4 = -3."},
  {id:"M14",section:"Math",topic:"Algebra",q:"Solve: |x - 4| = 7",passage:null,options:["x = 11 or x = -3","x = 11 only","x = 3 or x = -11","x = 7 or x = -7"],correct:0,explanation:"x - 4 = 7 gives x = 11. x - 4 = -7 gives x = -3."},
  {id:"M15",section:"Math",topic:"Algebra",q:"If f(x) = 2x² - 3x + 1, what is f(3)?",passage:null,options:["10","16","4","22"],correct:0,explanation:"f(3) = 2(9) - 3(3) + 1 = 18 - 9 + 1 = 10."},
  {id:"M16",section:"Math",topic:"Algebra",q:"Solve: -3(2x - 4) > 18",passage:null,options:["x < -1","x > -1","x < 1","x > 1"],correct:0,explanation:"-6x + 12 > 18 → -6x > 6 → x < -1 (flip sign when dividing by negative)."},
  {id:"M33",section:"Math",topic:"Algebra",q:"Solve: log₂(x) = 5",passage:null,options:["x = 32","x = 25","x = 10","x = 64"],correct:0,explanation:"log₂(x) = 5 means 2⁵ = x = 32."},
  {id:"M37",section:"Math",topic:"Algebra",q:"Solve: 2^(x+1) = 16",passage:null,options:["x = 3","x = 4","x = 7","x = 8"],correct:0,explanation:"16 = 2⁴, so 2^(x+1) = 2⁴ → x+1 = 4 → x = 3."},

  {id:"M24",section:"Math",topic:"Geometry",q:"What is the slope of the line through (2,5) and (6,13)?",passage:null,options:["2","4","1/2","8"],correct:0,explanation:"Slope = (13-5)/(6-2) = 8/4 = 2."},
  {id:"M34",section:"Math",topic:"Geometry",q:"A sector has a central angle of 60° and radius 12. What is its arc length?",passage:null,options:["4π","12π","2π","6π"],correct:0,explanation:"Arc length = (60/360) × 2π(12) = (1/6)(24π) = 4π."},
  {id:"M38",section:"Math",topic:"Geometry",q:"A trapezoid has bases 8 and 12 with height 5. What is its area?",passage:null,options:["50","40","60","100"],correct:0,explanation:"A = ½(b₁ + b₂)h = ½(8+12)(5) = ½(20)(5) = 50."},

  {id:"M26",section:"Math",topic:"Word Problems",q:"Worker A finishes a job in 5 hours. Worker B finishes in 3 hours. How long working together?",passage:null,options:["1.875 hours","2 hours","4 hours","2.5 hours"],correct:0,explanation:"1/5 + 1/3 = 8/15 jobs per hour. Time = 15/8 = 1.875 hours."},
  {id:"M27",section:"Math",topic:"Word Problems",q:"10L of 20% salt solution. How many liters of water to add for 8%?",passage:null,options:["15L","10L","12L","20L"],correct:0,explanation:"Salt = 2L constant. 2 = 0.08 × Total → Total = 25L. Water to add: 25 - 10 = 15L."},
  {id:"M28",section:"Math",topic:"Word Problems",q:"4 red, 3 blue, 5 green marbles. Probability of drawing blue?",passage:null,options:["1/4","3/8","1/3","3/5"],correct:0,explanation:"P = 3/(4+3+5) = 3/12 = 1/4."},
  {id:"M29",section:"Math",topic:"Word Problems",q:"Test scores: 78, 85, 92, 88. What 5th score gives an 86 average?",passage:null,options:["87","86","90","85"],correct:0,explanation:"Need sum = 86 × 5 = 430. Current = 343. Fifth score = 430 - 343 = 87."},
  {id:"M30",section:"Math",topic:"Word Problems",q:"Two trains 490 miles apart head toward each other at 60 and 80 mph. When do they meet?",passage:null,options:["3.5 hours","4 hours","3 hours","5 hours"],correct:0,explanation:"Combined rate = 140 mph. Time = 490/140 = 3.5 hours."},
  {id:"M31",section:"Math",topic:"Word Problems",q:"A 6ft man casts a 4ft shadow. A flagpole casts a 20ft shadow. How tall is the flagpole?",passage:null,options:["30 ft","24 ft","20 ft","15 ft"],correct:0,explanation:"Similar triangles: 6/4 = h/20 → h = 120/4 = 30 ft."},

  {id:"M35",section:"Math",topic:"Word Problems",q:"A plane flies 600 miles with a tailwind in 2 hours, returns in 3 hours. Wind speed?",passage:null,options:["50 mph","75 mph","100 mph","25 mph"],correct:0,explanation:"With wind: 300 = p+w. Against: 200 = p-w. Add: 2p=500, p=250. w=50 mph."},

    ],correct:0,explanation:"The passage says discoveries 'challenged long-held assumptions,' implying previous theories were the accepted consensus based on available evidence, now updated with new findings."},
  {id:"R5",section:"Reading",topic:"Main Idea",q:"What is the tone of this passage?",
    passage:"The epidemic of sleep deprivation among shift workers has reached levels that demand immediate institutional attention. Research from the National Sleep Foundation reveals that workers who have been awake for 17 consecutive hours exhibit cognitive impairment equivalent to a blood alcohol concentration of 0.05%, while 24 hours without sleep produces impairment matching the legal intoxication threshold of 0.10%. Despite these alarming findings, many industries continue to schedule 12-hour rotating shifts with minimal recovery periods, effectively placing impaired workers in positions where they operate heavy machinery or make critical safety decisions.",
    options:[
      "Concerned and somewhat critical",
      "Neutral and objective",
      "Angry and accusatory",
      "Optimistic and encouraging"
    ],correct:0,explanation:"Words like 'epidemic,' 'demand immediate attention,' and 'alarming findings' show concern. Criticizing industries for scheduling practices adds a critical element."},
  {id:"R6",section:"Reading",topic:"Inference",q:"What conclusion does the passage most strongly support?",
    passage:"The epidemic of sleep deprivation among shift workers has reached levels that demand immediate institutional attention. Research from the National Sleep Foundation reveals that workers who have been awake for 17 consecutive hours exhibit cognitive impairment equivalent to a blood alcohol concentration of 0.05%, while 24 hours without sleep produces impairment matching the legal intoxication threshold of 0.10%. Despite these alarming findings, many industries continue to schedule 12-hour rotating shifts with minimal recovery periods, effectively placing impaired workers in positions where they operate heavy machinery or make critical safety decisions.",
    options:[
      "Working 17+ hours straight poses safety risks comparable to impaired driving",
      "All shift work should be immediately banned",
      "Sleep deprivation only affects physical, not cognitive, performance",
      "The National Sleep Foundation opposes all night shift work"
    ],correct:0,explanation:"The passage explicitly compares 17+ hours awake to 0.05% BAC impairment, directly supporting that extended wakefulness creates driving-like safety risks."},
  {id:"R7",section:"Reading",topic:"Main Idea",q:"Which title best fits this passage?",
    passage:"Microplastics — fragments smaller than five millimeters — have been detected in virtually every environment on Earth, from the deepest ocean trenches to the summit of Mount Everest. A 2023 study published in Environmental Science & Technology estimated that the average person ingests approximately 5 grams of microplastic per week, roughly the weight of a credit card. While researchers have confirmed that these particles accumulate in human lung tissue, blood, and even placental matter, the long-term health implications remain subjects of intense scientific investigation and debate.",
    options:[
      "Global Spread and Potential Dangers of Microplastics",
      "How to Avoid Microplastics in Your Diet",
      "Microplastics: A Solved Environmental Problem",
      "The Chemistry of Plastic Degradation"
    ],correct:0,explanation:"The passage covers both the global spread (everywhere from oceans to Everest) and potential dangers (accumulation in tissue, uncertain health effects)."},
  {id:"R8",section:"Reading",topic:"Inference",q:"What is the primary implication of the passage about Yellowstone wolves?",
    passage:"When gray wolves were reintroduced to Yellowstone National Park in 1995 after a 70-year absence, the ecological consequences extended far beyond simple predator-prey dynamics. The wolves' presence altered elk grazing patterns, allowing overgrazed riparian vegetation to recover along stream banks. This regrowth stabilized riverbanks, reduced erosion, and even changed the physical course of rivers. Meanwhile, carcasses left by wolf kills provided food for scavengers including bears, eagles, and beetles, creating nutrient redistribution networks that enriched soil composition across the ecosystem.",
    options:[
      "Ecological impacts of predators extend far beyond their direct prey relationships",
      "Wolves are the most important species in any ecosystem",
      "Elk populations should be eliminated to protect vegetation",
      "River courses change naturally without animal influence"
    ],correct:0,explanation:"The passage demonstrates cascading effects: wolves → elk behavior → vegetation → rivers → scavengers → soil. The impact extends far beyond just eating elk."},
  {id:"R9",section:"Reading",topic:"Main Idea",q:"What is the author's position on electric vehicles?",
    passage:"Proponents of electric vehicles frequently cite their zero tailpipe emissions as evidence of environmental superiority over internal combustion engines. However, a comprehensive lifecycle analysis reveals a more complex picture. The manufacturing of EV batteries requires mining lithium, cobalt, and nickel — processes with significant environmental footprints. Furthermore, the carbon intensity of charging an EV depends entirely on the regional power grid; in areas dominated by coal-fired electricity, the per-mile carbon footprint of an EV can approach that of an efficient gasoline vehicle. That said, in regions with substantial renewable energy infrastructure, EVs demonstrate a clear and significant advantage in total lifecycle emissions.",
    options:[
      "The environmental benefit is real but more nuanced than commonly believed",
      "EVs are worse for the environment than gasoline cars",
      "EVs should not be manufactured until mining is cleaner",
      "There is no difference between EVs and gasoline vehicles"
    ],correct:0,explanation:"The passage acknowledges both complications (mining, grid dependence) and genuine advantages (renewable regions), taking a nuanced 'it depends' position."},
  {id:"R10",section:"Reading",topic:"Inference",q:"According to the passage, where do EVs have the greatest advantage?",
    passage:"Proponents of electric vehicles frequently cite their zero tailpipe emissions as evidence of environmental superiority over internal combustion engines. However, a comprehensive lifecycle analysis reveals a more complex picture. The manufacturing of EV batteries requires mining lithium, cobalt, and nickel — processes with significant environmental footprints. Furthermore, the carbon intensity of charging an EV depends entirely on the regional power grid; in areas dominated by coal-fired electricity, the per-mile carbon footprint of an EV can approach that of an efficient gasoline vehicle. That said, in regions with substantial renewable energy infrastructure, EVs demonstrate a clear and significant advantage in total lifecycle emissions.",
    options:[
      "Regions with renewable energy infrastructure",
      "Areas with coal-fired power plants",
      "Countries with the most lithium mines",
      "Urban areas with high traffic density"
    ],correct:0,explanation:"The passage explicitly states EVs show 'clear and significant advantage' in 'regions with substantial renewable energy infrastructure.'"},

  // MECHANICAL - FORCES
  {id:"MC1",section:"Mechanical",topic:"Forces",q:"A 5 kg object has a net force of 20N applied. What is its acceleration?",passage:null,options:["4 m/s²","100 m/s²","15 m/s²","25 m/s²"],correct:0,explanation:"F = ma → a = F/m = 20/5 = 4 m/s²."},
  {id:"MC2",section:"Mechanical",topic:"Forces",q:"An object moves at constant velocity. What is the net force acting on it?",passage:null,options:["Zero","Equal to its weight","Depends on speed","Cannot be determined"],correct:0,explanation:"Newton's 1st Law: constant velocity means balanced forces, so net force = 0."},
  {id:"MC3",section:"Mechanical",topic:"Forces",q:"A 2 kg object is dropped. What is its velocity after 3 seconds? (g = 10 m/s²)",passage:null,options:["30 m/s","60 m/s","20 m/s","6 m/s"],correct:0,explanation:"v = gt = 10 × 3 = 30 m/s."},
  {id:"MC4",section:"Mechanical",topic:"Forces",q:"A 50N force pushes right, 20N friction pushes left. Net force?",passage:null,options:["30N right","70N right","30N left","20N right"],correct:0,explanation:"Net = 50 - 20 = 30N in the direction of the larger force (right)."},
  {id:"MC5",section:"Mechanical",topic:"Forces",q:"You push a wall with 15N. How much force does the wall exert on you?",passage:null,options:["15N","0N","30N","7.5N"],correct:0,explanation:"Newton's 3rd Law: the wall pushes back with equal force (15N) in the opposite direction."},
  {id:"MC32",section:"Mechanical",topic:"Forces",q:"A 1000 kg car accelerates from 0 to 20 m/s in 10 seconds. What force is required?",passage:null,options:["2000N","200N","20000N","10000N"],correct:0,explanation:"a = 20/10 = 2 m/s². F = ma = 1000 × 2 = 2000N."},
  // Note: MC32 used for forces, MC33 used in electricity (Bernoulli)

  // MECHANICAL - LEVERS
  {id:"MC6",section:"Mechanical",topic:"Levers",q:"A 40 kg weight sits 3m from the fulcrum. Where must a 60 kg weight sit to balance?",passage:null,options:["2m","3m","4m","1.5m"],correct:0,explanation:"F₁D₁ = F₂D₂ → 40 × 3 = 60 × D → D = 120/60 = 2m."},
  {id:"MC7",section:"Mechanical",topic:"Levers",q:"What class of lever is a wheelbarrow?",passage:null,options:["2nd class","1st class","3rd class","Not a lever"],correct:0,explanation:"Wheelbarrow: load in the middle (between fulcrum at wheel and effort at handles) = 2nd class."},
  {id:"MC8",section:"Mechanical",topic:"Levers",q:"A lever has an effort arm of 8 ft and load arm of 2 ft. What is the mechanical advantage?",passage:null,options:["4","6","2","10"],correct:0,explanation:"MA = effort arm / load arm = 8/2 = 4."},
  {id:"MC9",section:"Mechanical",topic:"Levers",q:"What class of lever are tweezers?",passage:null,options:["3rd class","1st class","2nd class","Not a lever"],correct:0,explanation:"Tweezers: effort (your fingers) in the middle = 3rd class. FLE: 1st=Fulcrum, 2nd=Load, 3rd=Effort."},
  {id:"MC10",section:"Mechanical",topic:"Levers",q:"You need 30 N·m of torque. Your wrench is 0.5m long. How much force?",passage:null,options:["60N","15N","30N","150N"],correct:0,explanation:"Torque = F × d → 30 = F × 0.5 → F = 60N."},
  {id:"MC34",section:"Mechanical",topic:"Levers",q:"How much force to lift 300 lbs with a lever? Effort arm = 6ft, load arm = 2ft.",passage:null,options:["100 lbs","150 lbs","50 lbs","200 lbs"],correct:0,explanation:"F × 6 = 300 × 2 → F = 600/6 = 100 lbs."},

  // MECHANICAL - GEARS & PULLEYS
  {id:"MC11",section:"Mechanical",topic:"Gears & Pulleys",q:"Gear A turns clockwise. Adjacent Gear B turns which direction?",passage:null,options:["Counterclockwise","Clockwise","Same as A","Doesn't move"],correct:0,explanation:"Adjacent (meshing) gears always turn in opposite directions."},
  {id:"MC12",section:"Mechanical",topic:"Gears & Pulleys",q:"Gear A has 20 teeth at 100 RPM. Gear B has 50 teeth. What is B's speed?",passage:null,options:["40 RPM","250 RPM","100 RPM","25 RPM"],correct:0,explanation:"T₁ × RPM₁ = T₂ × RPM₂ → 20 × 100 = 50 × RPM → RPM = 40."},
  {id:"MC13",section:"Mechanical",topic:"Gears & Pulleys",q:"5 gears in a chain. First gear turns CW. Which way does the last gear turn?",passage:null,options:["Clockwise","Counterclockwise","Alternates","Doesn't turn"],correct:0,explanation:"Odd number of gears: first and last turn the same direction. 5 is odd → CW."},
  {id:"MC14",section:"Mechanical",topic:"Gears & Pulleys",q:"A fixed pulley lifts a 100 lb load. What force is needed?",passage:null,options:["100 lbs","50 lbs","200 lbs","25 lbs"],correct:0,explanation:"Fixed pulley has MA = 1. It changes direction of force but not the amount. Still 100 lbs."},
  {id:"MC15",section:"Mechanical",topic:"Gears & Pulleys",q:"A block and tackle has 4 ropes supporting a 200 lb load. Force needed?",passage:null,options:["50 lbs","100 lbs","200 lbs","25 lbs"],correct:0,explanation:"MA = number of supporting ropes = 4. Force = 200/4 = 50 lbs."},
  {id:"MC16",section:"Mechanical",topic:"Gears & Pulleys",q:"Gear train: A(10t) → B(30t) → C(15t). A at 300 RPM. What is C's speed?",passage:null,options:["200 RPM","100 RPM","150 RPM","600 RPM"],correct:0,explanation:"A→B: 10×300 = 30×RPM_B → RPM_B = 100. B→C: 30×100 = 15×RPM_C → RPM_C = 200 RPM."},

  // MECHANICAL - ENERGY
  {id:"MC17",section:"Mechanical",topic:"Energy",q:"A 4 kg object moves at 5 m/s. What is its kinetic energy?",passage:null,options:["50 J","100 J","20 J","10 J"],correct:0,explanation:"KE = ½mv² = ½(4)(25) = 50 J."},
  {id:"MC18",section:"Mechanical",topic:"Energy",q:"If you double an object's speed, what happens to its kinetic energy?",passage:null,options:["Quadruples","Doubles","Triples","Stays the same"],correct:0,explanation:"KE = ½mv². Speed is squared, so doubling speed → 2² = 4× the KE."},
  {id:"MC19",section:"Mechanical",topic:"Energy",q:"A 10 kg mass is lifted 5m. What is its potential energy? (g = 10)",passage:null,options:["500 J","50 J","100 J","250 J"],correct:0,explanation:"PE = mgh = 10 × 10 × 5 = 500 J."},
  {id:"MC20",section:"Mechanical",topic:"Energy",q:"A ramp is 10m long and 2m high. What is its mechanical advantage?",passage:null,options:["5","2","10","0.2"],correct:0,explanation:"MA of inclined plane = length/height = 10/2 = 5."},
  {id:"MC21",section:"Mechanical",topic:"Energy",q:"600 J of work done in 30 seconds. What is the power?",passage:null,options:["20 W","200 W","18000 W","0.05 W"],correct:0,explanation:"P = W/t = 600/30 = 20 W."},
  {id:"MC31",section:"Mechanical",topic:"Energy",q:"A 2 kg object falls from 20m. What is its speed at the bottom? (g = 10)",passage:null,options:["20 m/s","40 m/s","10 m/s","200 m/s"],correct:0,explanation:"PE = KE → mgh = ½mv² → v² = 2gh = 2(10)(20) = 400 → v = 20 m/s."},

  // MECHANICAL - FLUIDS
  {id:"MC22",section:"Mechanical",topic:"Fluids",q:"200N force over 4 m² area. What is the pressure?",passage:null,options:["50 Pa","800 Pa","196 Pa","4 Pa"],correct:0,explanation:"P = F/A = 200/4 = 50 Pa."},
  {id:"MC23",section:"Mechanical",topic:"Fluids",q:"Hydraulic system: small piston 5 cm², large piston 25 cm². 40N applied. Output force?",passage:null,options:["200N","8N","1000N","40N"],correct:0,explanation:"Pascal's law: F₁/A₁ = F₂/A₂ → 40/5 = F/25 → F = 200N."},
  {id:"MC24",section:"Mechanical",topic:"Fluids",q:"A block is 60% submerged in water. What is its density relative to water?",passage:null,options:["0.6","0.4","1.6","1.0"],correct:0,explanation:"Density ratio equals fraction submerged. 60% submerged → density = 0.6 × water density."},
  {id:"MC25",section:"Mechanical",topic:"Fluids",q:"A pipe narrows from 10 cm² to 5 cm². Water enters at 2 m/s. Exit velocity?",passage:null,options:["4 m/s","1 m/s","2 m/s","10 m/s"],correct:0,explanation:"Continuity: A₁v₁ = A₂v₂ → 10 × 2 = 5 × v → v = 4 m/s."},

  // MECHANICAL - ELECTRICITY
  {id:"MC26",section:"Mechanical",topic:"Electricity",q:"A 12V battery powers a 4Ω resistor. What is the current?",passage:null,options:["3A","48A","0.33A","8A"],correct:0,explanation:"Ohm's law: I = V/R = 12/4 = 3A."},
  {id:"MC27",section:"Mechanical",topic:"Electricity",q:"Three resistors (2Ω, 3Ω, 5Ω) in series. Total resistance?",passage:null,options:["10Ω","0.97Ω","30Ω","3.33Ω"],correct:0,explanation:"Series: R_total = R₁ + R₂ + R₃ = 2 + 3 + 5 = 10Ω."},
  {id:"MC28",section:"Mechanical",topic:"Electricity",q:"Two 10Ω resistors in parallel. Total resistance?",passage:null,options:["5Ω","20Ω","10Ω","0.2Ω"],correct:0,explanation:"Parallel: 1/R = 1/10 + 1/10 = 2/10. R = 10/2 = 5Ω. Shortcut: equal resistors in parallel = R/n."},
  {id:"MC29",section:"Mechanical",topic:"Electricity",q:"In a series circuit, one bulb burns out. What happens?",passage:null,options:["All bulbs go out","Other bulbs get brighter","Nothing changes","Only adjacent bulbs go out"],correct:0,explanation:"Series circuit: one path for current. If one element breaks, the circuit is open and all go out."},
  {id:"MC30",section:"Mechanical",topic:"Electricity",q:"A device uses 120V and draws 2A. What is its power?",passage:null,options:["240W","60W","122W","0.017W"],correct:0,explanation:"P = V × I = 120 × 2 = 240W."},
  {id:"MC33",section:"Mechanical",topic:"Electricity",q:"According to Bernoulli's principle, when air speeds up, what happens to pressure?",passage:null,options:["Pressure decreases","Pressure increases","Pressure stays the same","Pressure doubles"],correct:0,explanation:"Bernoulli's principle: faster fluid = lower pressure. This is how airplane wings generate lift."},

  // MECHANICAL - MOMENTUM & IMPULSE
  {id:"MC35",section:"Mechanical",topic:"Momentum & Impulse",q:"A 5-kg object moves at 10 m/s. What is its momentum?",passage:null,options:["50 kg·m/s","15 kg·m/s","2 kg·m/s","500 kg·m/s"],correct:0,explanation:"p = mv = 5 × 10 = 50 kg·m/s."},
  {id:"MC36",section:"Mechanical",topic:"Momentum & Impulse",q:"A force of 20 N acts on an object for 3 seconds. What impulse does it receive?",passage:null,options:["60 N·s","23 N·s","6.67 N·s","17 N·s"],correct:0,explanation:"Impulse J = FΔt = 20 × 3 = 60 N·s."},
  {id:"MC37",section:"Mechanical",topic:"Momentum & Impulse",q:"A 0.5-kg ball moving at 8 m/s collides with a stationary 1.5-kg block and they stick together. What is the final velocity?",passage:null,options:["2 m/s","4 m/s","8 m/s","1 m/s"],correct:0,explanation:"Conservation of momentum: m₁v₁ = (m₁+m₂)v_f → 0.5×8 = 2×v → v = 2 m/s."},
  {id:"MC38",section:"Mechanical",topic:"Momentum & Impulse",q:"In a perfectly elastic collision, which quantities are conserved?",passage:null,options:["Both momentum and kinetic energy","Only momentum","Only kinetic energy","Neither"],correct:0,explanation:"Elastic collisions conserve BOTH momentum and kinetic energy. Inelastic collisions only conserve momentum."},
  {id:"MC39",section:"Mechanical",topic:"Momentum & Impulse",q:"A 2-kg cart moving at 6 m/s collides with a 4-kg cart at rest. They stick together. What is the final velocity?",passage:null,options:["2 m/s","3 m/s","6 m/s","4 m/s"],correct:0,explanation:"m₁v₁ = (m₁+m₂)v_f → 2×6 = 6×v → v = 12/6 = 2 m/s."},

  // MECHANICAL - KINEMATICS
  {id:"MC40",section:"Mechanical",topic:"Kinematics",q:"An object starts from rest and accelerates at 4 m/s² for 5 seconds. What is its final velocity?",passage:null,options:["20 m/s","9 m/s","1.25 m/s","100 m/s"],correct:0,explanation:"v = v₀ + at = 0 + 4×5 = 20 m/s."},
  {id:"MC41",section:"Mechanical",topic:"Kinematics",q:"A ball is thrown upward at 30 m/s (g = 10 m/s²). How long until it stops rising?",passage:null,options:["3 seconds","30 seconds","0.33 seconds","6 seconds"],correct:0,explanation:"At the top, v = 0. t = v₀/g = 30/10 = 3 seconds."},
  {id:"MC42",section:"Mechanical",topic:"Kinematics",q:"An object starts from rest and accelerates at 2 m/s² for 10 seconds. How far does it travel?",passage:null,options:["100 m","20 m","200 m","50 m"],correct:0,explanation:"d = ½at² = ½ × 2 × 10² = ½ × 2 × 100 = 100 m."},
  {id:"MC43",section:"Mechanical",topic:"Kinematics",q:"A car traveling at 20 m/s brakes to a stop over 50 m. What is the acceleration?",passage:null,options:["-4 m/s²","-2 m/s²","4 m/s²","-8 m/s²"],correct:0,explanation:"v² = v₀² + 2ad → 0 = 400 + 2a(50) → a = -400/100 = -4 m/s²."},
  {id:"MC44",section:"Mechanical",topic:"Kinematics",q:"In uniform circular motion, the centripetal acceleration is directed:",passage:null,options:["Toward the center of the circle","Away from the center","Tangent to the circle","In the direction of motion"],correct:0,explanation:"Centripetal means 'center-seeking.' The acceleration always points toward the center of the circular path."},

  // MECHANICAL - GAS LAWS
  {id:"MC45",section:"Mechanical",topic:"Gas Laws",q:"A gas occupies 4 L at 2 atm. If pressure increases to 8 atm at constant temperature, what is the new volume?",passage:null,options:["1 L","2 L","16 L","32 L"],correct:0,explanation:"Boyle's Law: P₁V₁ = P₂V₂ → 2×4 = 8×V → V = 8/8 = 1 L."},
  {id:"MC46",section:"Mechanical",topic:"Gas Laws",q:"A gas at 300 K has a volume of 6 L. If heated to 600 K at constant pressure, what is the new volume?",passage:null,options:["12 L","3 L","6 L","1200 L"],correct:0,explanation:"Charles's Law: V₁/T₁ = V₂/T₂ → 6/300 = V/600 → V = 12 L."},
  {id:"MC47",section:"Mechanical",topic:"Gas Laws",q:"What does the ideal gas law state?",passage:null,options:["PV = nRT","P = nRT/V²","PV² = nRT","P/V = nRT"],correct:0,explanation:"The ideal gas law is PV = nRT, where P = pressure, V = volume, n = moles, R = gas constant, T = temperature."},
  {id:"MC48",section:"Mechanical",topic:"Gas Laws",q:"According to Boyle's Law, pressure and volume are:",passage:null,options:["Inversely related at constant temperature","Directly related at constant temperature","Unrelated","Inversely related at constant pressure"],correct:0,explanation:"Boyle's Law: P₁V₁ = P₂V₂. As pressure increases, volume decreases (inverse relationship) at constant temperature."},

  // MECHANICAL - HEAT TRANSFER
  {id:"MC49",section:"Mechanical",topic:"Heat Transfer",q:"Which type of heat transfer requires no medium (can travel through a vacuum)?",passage:null,options:["Radiation","Conduction","Convection","All require a medium"],correct:0,explanation:"Radiation transfers energy via electromagnetic waves and does not need a medium — it can travel through the vacuum of space."},
  {id:"MC50",section:"Mechanical",topic:"Heat Transfer",q:"A metal spoon in hot soup gets hot at the handle. This is an example of:",passage:null,options:["Conduction","Convection","Radiation","Evaporation"],correct:0,explanation:"Conduction: heat transfer through direct contact between molecules. The heat travels through the solid spoon."},
  {id:"MC51",section:"Mechanical",topic:"Heat Transfer",q:"Warm air rising from a heater is an example of:",passage:null,options:["Convection","Conduction","Radiation","Insulation"],correct:0,explanation:"Convection: heat transfer through fluid (liquid or gas) movement. Warm air rises, cool air sinks, creating a current."},
  {id:"MC52",section:"Mechanical",topic:"Heat Transfer",q:"At what point on a phase diagram do solid, liquid, and gas coexist in equilibrium?",passage:null,options:["Triple point","Boiling point","Critical point","Freezing point"],correct:0,explanation:"The triple point is the unique temperature and pressure where all three phases of a substance coexist in equilibrium."},

  // MECHANICAL - MAGNETISM
  {id:"MC53",section:"Mechanical",topic:"Magnetism",q:"What happens when two north poles of magnets are brought together?",passage:null,options:["They repel","They attract","Nothing happens","They demagnetize"],correct:0,explanation:"Like poles (N-N or S-S) repel each other. Opposite poles (N-S) attract."},
  {id:"MC54",section:"Mechanical",topic:"Magnetism",q:"Which of the following materials are ferromagnetic?",passage:null,options:["Iron, cobalt, and nickel","Copper, silver, and gold","Aluminum, zinc, and tin","Wood, plastic, and glass"],correct:0,explanation:"Iron, cobalt, and nickel are the three naturally ferromagnetic elements — they can be strongly magnetized."},
  {id:"MC55",section:"Mechanical",topic:"Magnetism",q:"What is the primary function of a transformer?",passage:null,options:["To increase or decrease voltage","To store electrical energy","To convert AC to DC","To measure current"],correct:0,explanation:"Transformers change voltage levels using electromagnetic induction. Step-up increases voltage; step-down decreases it. V₁/V₂ = N₁/N₂."},
  {id:"MC56",section:"Mechanical",topic:"Magnetism",q:"A diode allows current to flow in:",passage:null,options:["One direction only","Both directions equally","Neither direction","Only when heated"],correct:0,explanation:"A diode is a one-way valve for current. It allows flow in the forward direction and blocks it in reverse."},

  // MOMETRIX PRACTICE TEST 1 — MATH
  {id:"MPT1_M1",section:"Math",topic:"Word Problems",q:"Haley's violin instructor insists she practice a minimum of 3.5 hours per week. If she practices 45 minutes on both Sunday and Monday, 25 minutes on both Tuesday and Wednesday, how many minutes does she have left to practice?",passage:null,options:["70 minutes","75 minutes","80 minutes","85 minutes"],correct:0,explanation:"3.5 hours = 210 minutes. She practiced 45+45+25+25 = 140 minutes. 210 - 140 = 70 minutes remaining."},
  {id:"MPT1_M2",section:"Math",topic:"Algebra",q:"Simplify: (2x⁴)³ + 2(y⁵)⁵",passage:null,options:["8x¹² + 2y²⁵","6x⁷ + 2y¹⁰","6x¹² + 2y²⁵","8x⁶⁴ + 2y³¹²⁵"],correct:0,explanation:"(2x⁴)³ = 2³·(x⁴)³ = 8x¹². 2(y⁵)⁵ = 2y²⁵. Answer: 8x¹² + 2y²⁵."},
  {id:"MPT1_M3",section:"Math",topic:"Geometry",q:"If the ratio of the measures of the three angles in a triangle are 2:6:10, what is the actual measure of the smallest angle?",passage:null,options:["20 degrees","40 degrees","60 degrees","80 degrees"],correct:0,explanation:"Total parts = 2+6+10 = 18. 180°/18 = 10° per part. Smallest = 2×10 = 20°."},
  {id:"MPT1_M4",section:"Math",topic:"Algebra",q:"A plot of land has a width of w and a length of 2w+3. If the plot has an area of 90 square feet, what is the value of w?",passage:null,options:["6 feet","5 feet","15 feet","15/2 feet"],correct:0,explanation:"w(2w+3) = 90 → 2w²+3w-90 = 0. Factoring: (2w+15)(w-6) = 0. w = 6."},
  {id:"MPT1_M5",section:"Math",topic:"Geometry",q:"Connor has a fish tank that is a rectangular prism with length 7 inches and width 5 inches. It holds 210 cubic inches of water. What is the height?",passage:null,options:["6 inches","5 inches","17.5 inches","10 inches"],correct:0,explanation:"V = lwh → 210 = 7×5×h → h = 210/35 = 6 inches."},
  {id:"MPT1_M6",section:"Math",topic:"Algebra",q:"If 2x² = -4x² + 216, which of the following is a possible value of x?",passage:null,options:["6","4","5","7"],correct:0,explanation:"6x² = 216 → x² = 36 → x = ±6. So 6 is a possible value."},
  {id:"MPT1_M7",section:"Math",topic:"Geometry",q:"The perimeter of a square is 24 m. What is its area?",passage:null,options:["36 m²","24 m²","30 m²","42 m²"],correct:0,explanation:"Side = 24/4 = 6m. Area = 6² = 36 m²."},
  {id:"MPT1_M8",section:"Math",topic:"Word Problems",q:"Mr. Foster wants to carpet his 27 ft by 18 ft playroom. Carpet costs $14 per square yard. What is the price?",passage:null,options:["$756","$486","$1,260","$2,268"],correct:0,explanation:"Convert to yards: 27/3=9, 18/3=6. Area = 9×6 = 54 sq yards. Cost = 54×$14 = $756."},
  {id:"MPT1_M9",section:"Math",topic:"Arithmetic",q:"Alicia rolls a standard six-sided die. What is the probability she rolls a number greater than or equal to 3?",passage:null,options:["2/3","5/6","3/5","3/4"],correct:0,explanation:"Numbers ≥ 3: {3,4,5,6} = 4 outcomes. P = 4/6 = 2/3."},
  {id:"MPT1_M10",section:"Math",topic:"Algebra",q:"A boat rental company charges $15 daily fee and $4 per hour. Which equation calculates total fee y for x hours?",passage:null,options:["y = 4x + 15","y = 15x + 4","x = 4y + 15","x = 15y + 4"],correct:0,explanation:"$15 flat + $4 per hour × x hours = y = 4x + 15."},
  {id:"MPT1_M11",section:"Math",topic:"Word Problems",q:"Bruce is attending a conference 827 km away. Traveling at 64 km/hour, approximately how long will it take?",passage:null,options:["13 hours","5 hours","9 hours","17 hours"],correct:0,explanation:"Time = Distance/Rate = 827/64 ≈ 12.9 ≈ 13 hours."},
  {id:"MPT1_M12",section:"Math",topic:"Word Problems",q:"Jackson can decorate a cake in 3 hours. Eli can do it in 2 hours. Working together, how long will it take?",passage:null,options:["1.2 hours","0.8 hours","1.5 hours","1.8 hours"],correct:0,explanation:"1/3 + 1/2 = 5/6 per hour. Time = 6/5 = 1.2 hours."},
  {id:"MPT1_M13",section:"Math",topic:"Algebra",q:"Solve for x by factoring: 2x² - 7x = x² - 12",passage:null,options:["x = 3, x = 4","x = -3, x = -4","x = 3, x = -4","x = -3, x = 4"],correct:0,explanation:"2x² - 7x - x² + 12 = 0 → x² - 7x + 12 = 0 → (x-3)(x-4) = 0 → x = 3 or x = 4."},
  {id:"MPT1_M14",section:"Math",topic:"Arithmetic",q:"Ms. Snead's classroom has 24 students. If 8 have pets, approximately what percent have pets?",passage:null,options:["33%","16%","0.33%","0.16%"],correct:0,explanation:"8/24 = 1/3 ≈ 33%."},
  {id:"MPT1_M15",section:"Math",topic:"Arithmetic",q:"Carlos spends 1/8 of his monthly salary on utility bills. If utilities total $320, what is his salary?",passage:null,options:["$2,560","$2,440","$2,520","$2,600"],correct:0,explanation:"Salary × 1/8 = $320 → Salary = $320 × 8 = $2,560."},
  {id:"MPT1_M16",section:"Math",topic:"Geometry",q:"If the volume of a cube is 8 cm³, what is the length of the side?",passage:null,options:["2 cm","1 cm","3 cm","4 cm"],correct:0,explanation:"Side = ∛8 = 2 cm."},
  {id:"MPT1_M17",section:"Math",topic:"Algebra",q:"Simplify: (2x² + 3)(2x - 1)",passage:null,options:["4x³ - 2x² + 6x - 3","2x² + 6x - 3","4x³ - 2x² + 6x + 3","4x³ - 2x² - 6x - 3"],correct:0,explanation:"FOIL: 2x²·2x = 4x³, 2x²·(-1) = -2x², 3·2x = 6x, 3·(-1) = -3. Result: 4x³ - 2x² + 6x - 3."},
  {id:"MPT1_M18",section:"Math",topic:"Algebra",q:"Simplify: (2x⁴y⁷m²z) × (5x²y³m⁸)",passage:null,options:["10x⁶y¹⁰m¹⁰z","10x⁶y⁹m¹⁰z","7x⁶y¹⁰m¹⁰z","10x⁵y¹⁰m¹⁰z"],correct:0,explanation:"Multiply coefficients: 2×5=10. Add exponents: x⁴⁺²=x⁶, y⁷⁺³=y¹⁰, m²⁺⁸=m¹⁰, z stays. = 10x⁶y¹⁰m¹⁰z."},
  {id:"MPT1_M19",section:"Math",topic:"Arithmetic",q:"A classroom has 13 boys and 18 girls. If a name is chosen randomly, what is the probability it's a girl?",passage:null,options:["58%","42%","36%","72%"],correct:0,explanation:"Total = 31. P(girl) = 18/31 ≈ 0.58 = 58%."},
  {id:"MPT1_M20",section:"Math",topic:"Arithmetic",q:"Ms. Marejo paid $52 for a dress from clearance. If the dress was 20% off, what was the list price?",passage:null,options:["$65","$260","$62.40","$41.60"],correct:0,explanation:"$52 = 80% of original. Original = $52/0.80 = $65."},

  // MOMETRIX PRACTICE TEST 2 — MATH
  {id:"MPT2_M1",section:"Math",topic:"Algebra",q:"The expression 3x² + 3x - 18 is equal to the product of (x+3) and which other factor?",passage:null,options:["(3x - 6)","(3x - 4)","(3x + 4)","(3x + 6)"],correct:0,explanation:"Check: (x+3)(3x-6) = 3x² - 6x + 9x - 18 = 3x² + 3x - 18. ✓"},
  {id:"MPT2_M2",section:"Math",topic:"Algebra",q:"If 10x + 2 = 7, what is the value of 2x?",passage:null,options:["1","0.5","-0.5","5"],correct:0,explanation:"10x = 5 → x = 0.5 → 2x = 1."},
  {id:"MPT2_M3",section:"Math",topic:"Word Problems",q:"Quinn deposits $250 from each quarterly paycheck into savings. How much after 5 years?",passage:null,options:["$5,000","$4,800","$5,200","$5,400"],correct:0,explanation:"Quarterly = 4 times/year. 5 years × 4 = 20 deposits. 20 × $250 = $5,000."},
  {id:"MPT2_M4",section:"Math",topic:"Word Problems",q:"Vivian has $50. She buys a calculator, then a book costing half the calculator, then a pen costing half the book. She has $15 left. How much was the calculator?",passage:null,options:["$20","$14","$15","$18"],correct:0,explanation:"Let calc = c. Book = c/2. Pen = c/4. Total: c + c/2 + c/4 = 7c/4 = $35. c = $20."},
  {id:"MPT2_M5",section:"Math",topic:"Geometry",q:"Determine the volume of a rectangular box with length 5 in, height 7 in, width 9 in.",passage:null,options:["315 in³","445 in³","45 in³","35 in³"],correct:0,explanation:"V = 5 × 7 × 9 = 315 in³."},
  {id:"MPT2_M6",section:"Math",topic:"Arithmetic",q:"A magician has 2 rabbits (black and white). He's pulled the black one 16 times in a row. What is the probability of pulling white next?",passage:null,options:["0.5","1","1/17","0"],correct:0,explanation:"Each draw is independent. P(white) = 1/2 = 0.5 regardless of previous draws (gambler's fallacy)."},
  {id:"MPT2_M7",section:"Math",topic:"Word Problems",q:"Plan A: $25/month + 5¢/min. Plan B: $50/month unlimited. At what duration are they equal?",passage:null,options:["8 hours and 20 minutes","500 hours","8 hours and 33 minutes","5 hours"],correct:0,explanation:"25 + 0.05x = 50 → 0.05x = 25 → x = 500 minutes = 8 hrs 20 min."},
  {id:"MPT2_M8",section:"Math",topic:"Algebra",q:"What is 4⁶ ÷ 2⁸?",passage:null,options:["16","2","8","32"],correct:0,explanation:"4⁶ = (2²)⁶ = 2¹². 2¹² ÷ 2⁸ = 2⁴ = 16."},
  {id:"MPT2_M9",section:"Math",topic:"Geometry",q:"AC and BD are straight lines intersecting at E. Angle BEC is 45°. What is angle AEB?",passage:null,options:["135°","90°","115°","180°"],correct:0,explanation:"AEB and BEC are supplementary (they form a straight line AC). 180° - 45° = 135°."},
  {id:"MPT2_M10",section:"Math",topic:"Geometry",q:"A circle has an area equal to 36π. What is its diameter?",passage:null,options:["12","6","4","4π"],correct:0,explanation:"A = πr² = 36π → r² = 36 → r = 6 → diameter = 12."},

  // MOMETRIX PRACTICE TEST 1 — MECHANICAL (Conceptual)
  {id:"MPT1_MC1",section:"Mechanical",topic:"Kinematics",q:"A cannon fires a projectile toward mountains. Neglecting air resistance, where is the velocity greatest?",passage:null,options:["Exiting the muzzle","Halfway to the mountains","As it impacts the mountains"],correct:0,explanation:"Velocity is greatest at launch. Gravity decelerates the projectile on the way up and re-accelerates on the way down, but never exceeds initial velocity without additional force."},
  {id:"MPT1_MC2",section:"Mechanical",topic:"Fluids",q:"The larger piston has 4× the area of the smaller piston. If the small piston is compressed 8 inches, how far will the larger piston move?",passage:null,options:["2 inches","8 inches","32 inches"],correct:0,explanation:"Volume is conserved. A₁×d₁ = A₂×d₂. Since A₂ = 4A₁: d₂ = d₁/4 = 8/4 = 2 inches."},
  {id:"MPT1_MC3",section:"Mechanical",topic:"Energy",q:"A pendulum swings once per second. Shortened by removing half the string, new frequency is 1.4 Hz. How many swings per minute?",passage:null,options:["84 times","92 times","72 times"],correct:0,explanation:"1.4 Hz = 1.4 swings/second. Per minute: 1.4 × 60 = 84 times."},
  {id:"MPT1_MC4",section:"Mechanical",topic:"Fluids",q:"Two identical pistons are connected by a pipe. What is the mechanical advantage?",passage:null,options:["1","0.5","2"],correct:0,explanation:"MA = A₂/A₁. Since they're identical, A₂ = A₁, so MA = 1."},
  {id:"MPT1_MC5",section:"Mechanical",topic:"Kinematics",q:"A ball thrown horizontally off a cliff and an identical ball dropped at the same time. How long after the dropped ball hits will the thrown ball hit?",passage:null,options:["At the same time","Approximately 1 second after","Approximately 2 seconds after"],correct:0,explanation:"Horizontal velocity doesn't affect vertical fall time. Both experience same gravitational acceleration, so they hit at the same time."},

  {id:"MPT1_MC7",section:"Mechanical",topic:"Energy",q:"A ball is pushed into a vertical spring then released upward. Which describes the energy states?",passage:null,options:["Potential energy to kinetic energy","Convective energy to potential energy","Kinetic energy to potential energy"],correct:0,explanation:"Compressed spring = elastic PE. When released, PE converts to KE as the ball moves upward."},
  {id:"MPT1_MC8",section:"Mechanical",topic:"Fluids",q:"A vacuum tank at 50 feet underwater is raised to 25 feet. Will the pressure on the walls increase, decrease, or stay the same?",passage:null,options:["Decrease","Increase","Stay the same"],correct:0,explanation:"Water pressure increases with depth. Moving from 50ft to 25ft means less water above = less pressure on the tank walls."},
  {id:"MPT1_MC9",section:"Mechanical",topic:"Electricity",q:"Which electrical component holds a voltage across a gap between two conductive materials?",passage:null,options:["Capacitor","Resistor","Inductor"],correct:0,explanation:"A capacitor stores energy in an electric field between two parallel plates (conductive materials separated by a gap)."},
  {id:"MPT1_MC10",section:"Mechanical",topic:"Energy",q:"A ball thrown straight up has initial KE of 100 ft-lbs. What is PE at half the max height?",passage:null,options:["50 foot-pounds","33 foot-pounds","66 foot-pounds"],correct:0,explanation:"At half height, half the KE has converted to PE. So PE = 50 ft-lbs, remaining KE = 50 ft-lbs."},

  {id:"MPT2_M11",section:"Math",topic:"Word Problems",q:"Mike is at a salad bar costing 15 cents per ounce. He has 1/4 lb blueberries, 1/2 lb strawberries, 1/2 lb yogurt, 1/4 lb walnuts. How much will it cost?",passage:null,options:["$3.60","$1.80","$2.75","$3.00"],correct:0,explanation:"Total weight = 0.25+0.5+0.5+0.25 = 1.5 lbs = 24 oz. Cost = 24 × $0.15 = $3.60."},
  {id:"MPT2_M12",section:"Math",topic:"Algebra",q:"If a square root of twice the sum of x and 6 equals half of x, which is a possible value of x?",passage:null,options:["12","3/2","-3i","-3"],correct:0,explanation:"√(2(x+6)) = x/2. Square both sides: 2(x+6) = x²/4. Multiply by 4: 8x+48 = x². x²-8x-48=0. (x-12)(x+4)=0. x=12."},

  {id:"MPT2_M16",section:"Math",topic:"Word Problems",q:"Morris works 7AM to 4:30PM. He earns $12/hr for 8 hours and 50% more for overtime. How much did he make?",passage:null,options:["$123","$134","$106","$89"],correct:0,explanation:"Regular: 8 × $12 = $96. OT: 1.5 hrs × $18 = $27. Total = $96 + $27 = $123."},
  {id:"MPT2_M17",section:"Math",topic:"Algebra",q:"Mandy buys 4 yogurts + 3 crackers for $9.55, and 2 yogurts + 2 crackers for $5.90. How much does one box of crackers cost?",passage:null,options:["$1.75","$2.00","$2.25","$2.50"],correct:2,explanation:"System: 4y+3c=9.55, y+c=2.95. Substituting: 4(2.95-c)+3c=9.55 → 11.80-4c+3c=9.55 → c=$2.25."},
  {id:"MPT2_M18",section:"Math",topic:"Geometry",q:"What is the distance from (0,-5) to (-4,6)?",passage:null,options:["√137","√17","√153","√223"],correct:0,explanation:"d = √((-4-0)² + (6-(-5))²) = √(16+121) = √137."},
  {id:"MPT2_M19",section:"Math",topic:"Arithmetic",q:"What is √6 between?",passage:null,options:["2 and 3","0 and 1","1 and 2","3 and 4"],correct:0,explanation:"2² = 4 and 3² = 9. Since 4 < 6 < 9, √6 is between 2 and 3."},
  {id:"MPT2_M20",section:"Math",topic:"Arithmetic",q:"If x/8 = y/4 = 4, what is x - y?",passage:null,options:["16","8","32","48"],correct:0,explanation:"x/8 = 4 → x = 32. y/4 = 4 → y = 16. x - y = 32 - 16 = 16."},

  {id:"MPT3_M9",section:"Math",topic:"Arithmetic",q:"Kyra sets aside 1/3 of her income for rent/utilities. If monthly cost is $1,050, what is her salary?",passage:null,options:["$3,150","$3,225","$3,750","$4,050"],correct:0,explanation:"1/3 × salary = $1,050. Salary = $1,050 × 3 = $3,150."},

  {id:"MPT3_M15",section:"Math",topic:"Arithmetic",q:"A bag has 5 red, 4 green, 3 yellow marbles. P(red then green without replacement)?",passage:null,options:["5/33","5/36","1/6","7/132"],correct:0,explanation:"P(red) = 5/12. P(green|red drawn) = 4/11. P(both) = 5/12 × 4/11 = 20/132 = 5/33."},

// ==================== STATE ====================
let state = {
  screen: 'menu',   // menu, config, quiz, results
  mode: 'quick',     // quick, topic, full, missed
  section: 'All',
  currentQ: 0,
  questions: [],
  answers: [],       // {qId, selected, correct, time}
  startTime: 0,
  questionStartTime: 0,
  timerInterval: null,
  timeLimit: 0,      // seconds, 0 = untimed
  timeRemaining: 0
};

function loadProgress() {
  return JSON.parse(localStorage.getItem('oar_progress') || '{"answers":[]}');
}
function saveProgress(answer) {
  const data = loadProgress();
  // Remove previous answer for same question if exists
  data.answers = data.answers.filter(a => a.qId !== answer.qId);
  data.answers.push(answer);
  localStorage.setItem('oar_progress', JSON.stringify(data));
}

// ==================== RENDER ====================
const app = document.getElementById('app');

function render() {
  if (state.screen === 'menu') renderMenu();
  else if (state.screen === 'config') renderConfig();
  else if (state.screen === 'quiz') renderQuiz();
  else if (state.screen === 'results') renderResults();
}

        </div>
        <div class="mode-card${state.mode==='full'?' active':''}" onclick="selectMode('full')">
          <div class="mode-icon">&#128640;</div>
          <div class="mode-name">Full Test</div>
          <div class="mode-desc">30 questions, timed</div>
        </div>
        <div class="mode-card${state.mode==='missed'?' active':''}" onclick="selectMode('missed')">
          <div class="mode-icon">&#128260;</div>
          <div class="mode-name">Missed Questions</div>
          <div class="mode-desc">${missed} to review</div>
        </div>
      </div>

      ${state.mode === 'topic' ? renderTopicFilter() : ''}

      <div style="text-align:center;margin-top:24px">
        <button class="btn btn-primary" style="padding:14px 48px;font-size:16px" onclick="startQuiz()">
          ${state.mode === 'full' ? 'Begin Full Test' : state.mode === 'missed' ? 'Review Missed' : 'Start Practice'}
        </button>
      </div>
    </div>
  `;
}

function renderTopicFilter() {
  const sections = ['All','Math','Reading','Mechanical'];
  return `
    <div class="topic-filter">
      ${sections.map(s => `<button class="topic-btn${state.section===s?' active':''}" onclick="selectSection('${s}')">${s}</button>`).join('')}
    </div>
  `;
}

function selectMode(m) { state.mode = m; render(); }
function selectSection(s) { state.section = s; render(); }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  let pool = [];
  if (state.mode === 'quick') {
    pool = shuffle(questions).slice(0, 5);
    state.timeLimit = 120;
  } else if (state.mode === 'topic') {
    pool = state.section === 'All' ? shuffle(questions) : shuffle(questions.filter(q => q.section === state.section));
    if (pool.length === 0) { alert('No questions for this section.'); return; }
    state.timeLimit = 0;
  } else if (state.mode === 'full') {
    // Pick 10 math, 10 reading, 10 mechanical for balanced 30
    const math = shuffle(questions.filter(q => q.section === 'Math')).slice(0,10);
    const read = shuffle(questions.filter(q => q.section === 'Reading')).slice(0,10);
    const mech = shuffle(questions.filter(q => q.section === 'Mechanical')).slice(0,10);
    pool = [...math, ...read, ...mech];
    state.timeLimit = 85 * 60; // 85 min total
  } else if (state.mode === 'missed') {
    const missed = loadProgress().answers.filter(a => !a.correct).map(a => a.qId);
    pool = shuffle(questions.filter(q => missed.includes(q.id)));
    if (pool.length === 0) { alert('No missed questions to review! Great job!'); return; }
    state.timeLimit = 0;
  }

  state.questions = pool;
  state.answers = [];
  state.currentQ = 0;
  state.startTime = Date.now();
  state.questionStartTime = Date.now();
  state.timeRemaining = state.timeLimit;
  state.screen = 'quiz';

  if (state.timeLimit > 0) {
    state.timerInterval = setInterval(() => {
      state.timeRemaining = Math.max(0, state.timeLimit - Math.floor((Date.now() - state.startTime) / 1000));
      updateTimer();
      if (state.timeRemaining <= 0) {
        clearInterval(state.timerInterval);
        finishQuiz();
      }
    }, 1000);
  }

  render();
}

function updateTimer() {
  const el = document.getElementById('timer');
  if (!el) return;
  const m = Math.floor(state.timeRemaining / 60);
  const s = state.timeRemaining % 60;
  el.textContent = m + ':' + String(s).padStart(2, '0');
  if (state.timeRemaining <= 30) el.classList.add('warning');
  else el.classList.remove('warning');
}

function renderQuiz() {
  const q = state.questions[state.currentQ];
  const answered = state.answers.find(a => a.qId === q.id);
  const letters = ['A','B','C','D'];
  const pct = ((state.currentQ + (answered ? 1 : 0)) / state.questions.length * 100).toFixed(0);

  app.innerHTML = `
    <div style="padding:24px 0">
      <div class="quiz-header">
        <div class="quiz-progress">
          <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
          <div class="quiz-progress-text">Question ${state.currentQ + 1} of ${state.questions.length}</div>
        </div>
        ${state.timeLimit > 0 ? `<div class="quiz-timer" id="timer"></div>` : ''}
      </div>

      <div class="question-card">
        <div class="question-number">${q.section} &mdash; ${q.topic}</div>
        ${q.passage ? `<div class="question-passage">${q.passage}</div>` : ''}
        <div class="question-text">${q.q}</div>

        <div class="answers">
          ${q.options.map((opt, i) => {
            let cls = 'answer-option';
            let icon = '';
            if (answered) {
              if (i === q.correct) { cls += ' correct show-correct'; icon = '<span class="result-icon">&#10003;</span>'; }
              else if (i === answered.selected && !answered.correct) { cls += ' wrong'; icon = '<span class="result-icon">&#10007;</span>'; }
            } else if (state._selected === i) {
              cls += ' selected';
            }
            return `<div class="${cls}" onclick="selectAnswer(${i})" data-idx="${i}">
              <span class="answer-letter">${letters[i]}</span>
              <span class="answer-text">${opt}</span>
              ${icon}
            </div>`;
          }).join('')}
        </div>

        <div class="explanation${answered ? ' visible' : ''}" id="explanation">
          <strong>Explanation:</strong> ${q.explanation}
        </div>

        <div class="quiz-actions">
          ${!answered && state._selected !== undefined ?
            `<button class="btn btn-primary" onclick="confirmAnswer()">Confirm Answer</button>` :
            answered ?
              (state.currentQ < state.questions.length - 1 ?
                `<button class="btn btn-primary" onclick="nextQuestion()">Next Question &rarr;</button>` :
                `<button class="btn btn-primary" onclick="finishQuiz()">See Results</button>`) :
              `<button class="btn btn-primary" disabled>Select an answer</button>`
          }
        </div>
      </div>
    </div>
  `;

  if (state.timeLimit > 0) updateTimer();
}

state._selected = undefined;

function selectAnswer(idx) {
  const q = state.questions[state.currentQ];
  const answered = state.answers.find(a => a.qId === q.id);
  if (answered) return;
  state._selected = idx;
  render();
}

function confirmAnswer() {
  const q = state.questions[state.currentQ];
  const timeSpent = Math.floor((Date.now() - state.questionStartTime) / 1000);
  const isCorrect = state._selected === q.correct;

  const answer = {
    qId: q.id,
    section: q.section,
    topic: q.topic,
    selected: state._selected,
    correct: isCorrect,
    time: timeSpent,
    timestamp: Date.now()
  };

  state.answers.push(answer);
  saveProgress(answer);
  state._selected = undefined;
  render();
}

function nextQuestion() {
  state.currentQ++;
  state.questionStartTime = Date.now();
  state._selected = undefined;
  render();
  window.scrollTo(0, 0);
}

function finishQuiz() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.screen = 'results';
  render();
}

function renderResults() {
  const total = state.questions.length;
  const correctCount = state.answers.filter(a => a.correct).length;
  const pct = Math.round((correctCount / total) * 100);
  const totalTime = Math.floor((Date.now() - state.startTime) / 1000);
  const avgTime = Math.round(state.answers.reduce((s, a) => s + a.time, 0) / state.answers.length);

  // Section breakdown
  const sections = {};
  state.answers.forEach(a => {
    if (!sections[a.section]) sections[a.section] = { correct: 0, total: 0 };
    sections[a.section].total++;
    if (a.correct) sections[a.section].correct++;
  });

  const scoreClass = pct >= 80 ? 'great' : pct >= 60 ? 'ok' : 'low';

  app.innerHTML = `
    <div class="results-screen">
      <h2 style="font-size:16px;color:var(--text-2);font-weight:500">Practice Complete</h2>
      <div class="results-score ${scoreClass}">${pct}%</div>
      <div class="results-subtitle">${correctCount} of ${total} correct</div>

      <div class="results-grid">
        <div class="results-stat">
          <div class="results-stat-label">Total Time</div>
          <div class="results-stat-value">${Math.floor(totalTime/60)}m ${totalTime%60}s</div>
        </div>
        <div class="results-stat">
          <div class="results-stat-label">Avg per Question</div>
          <div class="results-stat-value">${avgTime}s</div>
        </div>
        <div class="results-stat">
          <div class="results-stat-label">Accuracy</div>
          <div class="results-stat-value">${pct}%</div>
        </div>
      </div>

      <div class="results-breakdown">
        <h3>Breakdown by Section</h3>
        ${Object.entries(sections).map(([name, data]) => {
          const secPct = Math.round((data.correct / data.total) * 100);
          const color = secPct >= 80 ? 'var(--green)' : secPct >= 60 ? 'var(--yellow)' : 'var(--red)';
          return `<div class="breakdown-row">
            <span class="breakdown-label">${name} (${data.correct}/${data.total})</span>
            <div class="breakdown-bar"><div class="breakdown-fill" style="width:${secPct}%;background:${color}"></div></div>
            <span class="breakdown-pct" style="color:${color}">${secPct}%</span>
          </div>`;
        }).join('')}
      </div>

      <div class="results-actions">
        <button class="btn btn-primary" onclick="goToMenu()">Practice Again</button>
        ${state.answers.some(a => !a.correct) ? `<button class="btn btn-secondary" onclick="reviewMissed()">Review Missed</button>` : ''}
        <a href="study.html" class="btn btn-secondary">Back to Study</a>
      </div>
    </div>
  `;

  if (pct >= 80) launchConfetti();
}

function goToMenu() {
  state.screen = 'menu';
  state.mode = 'quick';
  state._selected = undefined;
  render();
}

function reviewMissed() {
  state.mode = 'missed';
  startQuiz();
}

// ==================== KEYBOARD SHORTCUTS ====================
document.addEventListener('keydown', e => {
  if (state.screen !== 'quiz') return;
  const q = state.questions[state.currentQ];
  const answered = state.answers.find(a => a.qId === q.id);

  const keyMap = {'1':0,'2':1,'3':2,'4':3,'a':0,'b':1,'c':2,'d':3};
  const idx = keyMap[e.key.toLowerCase()];

  if (idx !== undefined && !answered) {
    selectAnswer(idx);
  } else if (e.key === 'Enter') {
    if (!answered && state._selected !== undefined) confirmAnswer();
    else if (answered && state.currentQ < state.questions.length - 1) nextQuestion();
    else if (answered) finishQuiz();
  }
});

// ==================== CONFETTI ====================
function launchConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  const colors = ['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899'];
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 2 + 's';
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.width = (6 + Math.random() * 8) + 'px';
    c.style.height = (6 + Math.random() * 8) + 'px';
    container.appendChild(c);
  }
  setTimeout(() => container.remove(), 5000);
}

// ==================== INIT ====================
// Check URL params for topic filter
const urlParams = new URLSearchParams(window.location.search);
const topicParam = urlParams.get('topic');
if (topicParam) {
  state.mode = 'topic';
  if (topicParam.includes('MATH')) state.section = 'Math';
  else if (topicParam.includes('READING')) state.section = 'Reading';
  else if (topicParam.includes('MECHANICAL')) state.section = 'Mechanical';
}

render();
</script>
