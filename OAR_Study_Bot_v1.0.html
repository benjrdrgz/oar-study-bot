        {readingLessons.map(l=>(
          <div key={l.id} className="topic-card" onClick={()=>{setSelectedLesson(l.id);setView('learn_topic')}}>
            <h4>{l.title} {state.lessonsCompleted.includes(l.id)&&<span className="badge badge-green">✓ Done</span>}</h4>
            <div className="desc">{l.desc}</div>
          </div>
        ))}
      </div>

      <h3 className="mb-8" style={{color:'var(--yellow)'}}>Mechanical Comprehension (30 Qs, 15 min on exam)</h3>
      <div className="grid2 mb-16">
        {mechLessons.map(l=>(
          <div key={l.id} className="topic-card" onClick={()=>{setSelectedLesson(l.id);setView('learn_topic')}}>
            <h4>{l.title} {state.lessonsCompleted.includes(l.id)&&<span className="badge badge-green">✓ Done</span>}</h4>
            <div className="desc">{l.desc}</div>
          </div>
        ))}
      </div>
    </div>
  );

  // ---- LEARN TOPIC ----
  if(view==='learn_topic'&&selectedLesson) {
    const lesson=LESSONS[selectedLesson];
    if(!lesson) {setView('learn');return null;}
    const practiceQs=QUESTIONS.filter(q=>q.lesson===selectedLesson);
    return(
      <div className="app">
        <div className="section-header">
          <div>
            <span className={`tag ${sectionColor(lesson.section)}`}>{sectionLabel(lesson.section)}</span>
            <h2 style={{marginTop:8}}>{lesson.title}</h2>
          </div>
          <button className="back-btn" onClick={()=>setView('learn')}>← Back to Lessons</button>
        </div>
        <TTSBar lessonId={selectedLesson}/>
        <div className="card">
          <div className="lesson-content" dangerouslySetInnerHTML={{__html:lesson.content}}/>
          <YouTubeLinks lessonId={selectedLesson}/>
        </div>
        <div className="flex gap-8 mt-16" style={{flexWrap:'wrap'}}>
          {state.lessonsCompleted.includes(selectedLesson)?(
            <>
              <button className="btn btn-primary" style={{opacity:.7}}>✓ Lesson Completed</button>
              <button className="btn btn-sm btn-secondary" onClick={()=>unmarkLesson(selectedLesson)}>↩ Unmark & Relearn</button>
            </>
          ):(
            <button className="btn btn-primary" onClick={()=>completeLesson(selectedLesson)}>Mark as Complete</button>
          )}
          {practiceQs.length>0&&(
            <button className="btn btn-success" onClick={()=>startPractice(selectedLesson)}>
              Practice ({practiceQs.length} Questions)
            </button>
          )}
        </div>
      </div>
    );
  }

  // ---- QUIZ SETUP ----
  if(view==='quiz') return(
    <div className="app">
      <div className="section-header">
        <h2>📝 Quiz Mode</h2>
        <button className="back-btn" onClick={()=>setView('dashboard')}>← Dashboard</button>
      </div>
      <div className="card">
        <h3>Choose Your Quiz</h3>
        <p className="text-muted mb-16">Questions are weighted toward your weak areas. Previously missed questions appear 3× more often.</p>
        <div className="grid2">
          <div className="topic-card" onClick={()=>startQuiz('all',15)}>
            <h4>🎯 Full OAR Mix (15 Qs)</h4>
            <div className="desc">All sections, simulates real test distribution</div>
          </div>
          <div className="topic-card" onClick={()=>startQuiz('all',30)}>
            <h4>💪 Marathon (30 Qs)</h4>
            <div className="desc">Extended practice, all sections</div>
          </div>
          <div className="topic-card" onClick={()=>startQuiz('math',10)}>
            <h4>🔢 Math Only (10 Qs)</h4>
            <div className="desc">Arithmetic, algebra, geometry, word problems</div>
          </div>
          <div className="topic-card" onClick={()=>startQuiz('reading',8)}>
            <h4>📖 Reading Only (8 Qs)</h4>
            <div className="desc">Main idea, inference, vocabulary, detail</div>
          </div>
          <div className="topic-card" onClick={()=>startQuiz('mechanical',10)}>
            <h4>⚙️ Mechanical Only (10 Qs)</h4>
            <div className="desc">Forces, levers, gears, pulleys, energy, fluids</div>
          </div>
          <div className="topic-card" onClick={()=>{
            const wrongIds=[...new Set(state.quizHistory.filter(h=>!h.correct).map(h=>h.qId))];
            const wrongQs=QUESTIONS.filter(q=>wrongIds.includes(q.id));
            if(wrongQs.length===0){alert('No missed questions yet! Take some quizzes first.');return;}
            setQuizQuestions(wrongQs.sort(()=>Math.random()-0.5).slice(0,Math.min(15,wrongQs.length)));
            setQuizIndex(0);setQuizAnswers([]);setQuizStartTime(Date.now());
            setShowExplanation(false);setSelectedAnswer(null);setView('quiz_active');
          }}>
            <h4>🔁 Missed Questions Only</h4>
            <div className="desc">Retry questions you got wrong</div>
          </div>
        </div>
      </div>
    </div>
  );

  // ---- QUIZ ACTIVE ----
  if(view==='quiz_active'&&quizQuestions.length>0) {
    const q=quizQuestions[quizIndex];
    const elapsed=quizStartTime?Math.floor((Date.now()-quizStartTime)/1000):0;
    const mins=Math.floor(elapsed/60);
    const secs=elapsed%60;
    const currentCorrect=quizAnswers.filter(a=>a.correct).length;
    return(
      <div className="app">
        <div className="quiz-header">
          <div className="quiz-progress">
            Question {quizIndex+1} of {quizQuestions.length}
            <span className="badge badge-blue" style={{marginLeft:8}}>{currentCorrect}/{quizAnswers.length} correct</span>
          </div>
          <div className="flex gap-16 flex-center">
            <span className={`tag ${sectionColor(q.section)}`}>{sectionLabel(q.section)}</span>
            <span className="badge badge-yellow">{'★'.repeat(q.difficulty)}</span>
          </div>
        </div>
        <div className="progress-bar mb-16"><div className="fill fill-blue" style={{width:`${(quizIndex+1)/quizQuestions.length*100}%`}}/></div>

        <div className="question-card">
          <div className="q-text" style={{whiteSpace:'pre-line'}}>{q.q}</div>
          {q.options.map((opt,i)=>{
            let cls='option';
            if(showExplanation){
              cls+=' disabled';
              if(i===q.correct) cls+=' correct';
              else if(i===selectedAnswer&&i!==q.correct) cls+=' wrong';
            }else if(i===selectedAnswer){cls+=' selected';}
            return <button key={i} className={cls} onClick={()=>answerQuestion(i)}>{String.fromCharCode(65+i)}) {opt}</button>
          })}
          {showExplanation&&(
            <div className="explanation">
              <h5>{selectedAnswer===q.correct?'✅ Correct!':'❌ Incorrect'}</h5>
              {selectedAnswer!==q.correct&&<p><strong>Your answer:</strong> {String.fromCharCode(65+selectedAnswer)}) {q.options[selectedAnswer]}<br/><strong>Correct answer:</strong> {String.fromCharCode(65+q.correct)}) {q.options[q.correct]}</p>}
              <p style={{marginTop:8}}>{q.explanation}</p>
              {LESSONS[q.lesson]&&<p className="text-sm text-muted mt-8">📚 Related lesson: {LESSONS[q.lesson].title}</p>}
            </div>
          )}
        </div>
        {showExplanation&&(
          <div className="flex gap-8">
            <button className="btn btn-primary" onClick={nextQuestion}>
              {quizIndex<quizQuestions.length-1?'Next Question →':'Finish Quiz'}
            </button>
            {LESSONS[q.lesson]&&selectedAnswer!==q.correct&&(
              <button className="btn btn-secondary" onClick={()=>{setSelectedLesson(q.lesson);setView('learn_topic')}}>
                📚 Review Lesson
              </button>
            )}
          </div>
        )}
      </div>
    );
  }

  // ---- QUIZ RESULTS ----
  if(view==='quiz_results') {
    const correct=quizAnswers.filter(a=>a.correct).length;
    const total=quizAnswers.length;
    const pctScore=Math.round(correct/total*100);
    const missed=quizAnswers.filter(a=>!a.correct);
    const missedByLesson={};
    missed.forEach(m=>{if(!missedByLesson[m.lesson])missedByLesson[m.lesson]=[];missedByLesson[m.lesson].push(m);});
    return(
      <div className="app">
        <div className="section-header">
          <h2>Quiz Results</h2>
          <button className="back-btn" onClick={()=>setView('dashboard')}>← Dashboard</button>
        </div>
        <div className="card" style={{textAlign:'center'}}>
          <div style={{fontSize:64,fontWeight:800,color:pctScore>=70?'var(--green)':pctScore>=50?'var(--yellow)':'var(--red)'}}>{pctScore}%</div>
          <div className="text-lg">{correct} out of {total} correct</div>
          <div className="progress-bar mt-8" style={{maxWidth:400,margin:'12px auto'}}><div className={`fill ${pctScore>=70?'fill-green':pctScore>=50?'fill-yellow':'fill-red'}`} style={{width:`${pctScore}%`}}/></div>
          <div className="text-sm text-muted mt-8">
            {pctScore>=80?'🔥 Excellent! You\'re crushing it.':pctScore>=60?'👍 Good progress. Keep drilling weak areas.':pctScore>=40?'📚 Getting there. Focus on the lessons for topics you missed.':'💪 Keep studying! Review the lessons below, then retake the quiz.'}
          </div>
        </div>

        {missed.length>0&&(
          <div className="card">
            <h3>❌ Questions You Missed</h3>
            {Object.entries(missedByLesson).map(([lid,entries])=>(
              <div key={lid} style={{marginBottom:16}}>
                <div className="flex flex-between flex-center mb-8">
                  <div>
                    <span className={`tag ${sectionColor(LESSONS[lid]?.section)}`}>{sectionLabel(LESSONS[lid]?.section)}</span>
                    {' '}<strong>{LESSONS[lid]?.title}</strong>
                  </div>
                  <button className="btn btn-sm btn-secondary" onClick={()=>{setSelectedLesson(lid);setView('learn_topic')}}>Review →</button>
                </div>
                {entries.map((e,i)=>{
                  const q=QUESTIONS.find(qq=>qq.id===e.qId);
                  return q?(
                    <div key={i} className="text-sm" style={{padding:'6px 0',borderTop:'1px solid var(--border)'}}>
                      <div className="text-muted">{q.q.substring(0,100)}...</div>
                    </div>
                  ):null;
                })}
              </div>
            ))}
          </div>
        )}

        <div className="flex gap-8">
          <button className="btn btn-primary" onClick={()=>setView('quiz')}>Take Another Quiz</button>
          <button className="btn btn-secondary" onClick={()=>setView('review')}>Review Weak Areas</button>
        </div>
      </div>
    );
  }

  // ---- REVIEW (STUDY GUIDE FOR WEAK AREAS) ----
  if(view==='review') {
    const wrongEntries=state.quizHistory.filter(h=>!h.correct);
    const lessonMissMap={};
    wrongEntries.forEach(e=>{
      if(!lessonMissMap[e.lesson])lessonMissMap[e.lesson]={count:0,questions:new Set()};
      lessonMissMap[e.lesson].count++;
      lessonMissMap[e.lesson].questions.add(e.qId);
    });
    const sortedLessons=Object.entries(lessonMissMap).sort((a,b)=>b[1].count-a[1].count);

    return(
      <div className="app">
        <div className="section-header">
          <h2>🔁 Review — Personalized Study Guide</h2>
          <button className="back-btn" onClick={()=>setView('dashboard')}>← Dashboard</button>
        </div>

        {sortedLessons.length===0?(
          <div className="card" style={{textAlign:'center'}}>
            <div style={{fontSize:48}}>🎉</div>
            <h3>No weak areas yet!</h3>
            <p className="text-muted">Take some quizzes first, then come back here. Any questions you miss will generate a personalized study guide.</p>
            <button className="btn btn-primary mt-16" onClick={()=>setView('quiz')}>Start a Quiz</button>
          </div>
        ):(
          <>
            <div className="card" style={{background:'rgba(239,71,111,0.05)',borderColor:'var(--red)'}}>
              <h3 style={{color:'var(--red)'}}>Your Weak Areas (sorted by most missed)</h3>
              <p className="text-sm text-muted">These topics need the most attention. The bot has built a study plan for each one.</p>
            </div>

            {sortedLessons.map(([lid,data])=>{
              const lesson=LESSONS[lid];
              if(!lesson) return null;
              const missedQs=QUESTIONS.filter(q=>[...data.questions].includes(q.id));
              return(
                <div key={lid} className="card">
                  <div className="flex flex-between flex-center mb-8">
                    <div>
                      <span className={`tag ${sectionColor(lesson.section)}`}>{sectionLabel(lesson.section)}</span>
                      <span className="font-bold" style={{marginLeft:8}}>{lesson.title}</span>
                      <span className="badge badge-red">{data.count} mistakes</span>
                    </div>
                  </div>

                  <div style={{background:'var(--card2)',borderRadius:8,padding:16,marginBottom:12}}>
                    <h4 style={{color:'var(--accent)',marginBottom:8}}>📖 Quick Review</h4>
                    <div className="lesson-content text-sm" dangerouslySetInnerHTML={{__html:lesson.content.substring(0,800)+(lesson.content.length>800?'...':'')}}/>
                    <button className="btn btn-sm btn-secondary mt-8" onClick={()=>{setSelectedLesson(lid);setView('learn_topic')}}>Read Full Lesson →</button>
                  </div>

                  <h4 style={{color:'var(--red)',marginBottom:8}}>❌ Questions You Missed</h4>
                  {missedQs.map((q,i)=>(
                    <div key={i} style={{background:'var(--card2)',borderRadius:8,padding:12,marginBottom:8}}>
                      <div className="text-sm font-bold mb-8" style={{whiteSpace:'pre-line'}}>{q.q}</div>
                      <div className="text-sm text-green">✅ Correct: {String.fromCharCode(65+q.correct)}) {q.options[q.correct]}</div>
                      <div className="text-sm text-muted mt-8">{q.explanation}</div>
                    </div>
                  ))}
                  <button className="btn btn-sm btn-success mt-8" onClick={()=>startPractice(lid)}>🔄 Practice This Topic ({QUESTIONS.filter(q=>q.lesson===lid).length} Qs)</button>
                </div>
              );
            })}
          </>
        )}
      </div>
    );
  }

  // ---- FULL LOG ----
  if(view==='log') {
    const recent=state.quizHistory.slice().reverse().slice(0,100);
    return(
      <div className="app">
        <div className="section-header">
          <h2>📊 Full Question Log</h2>
          <button className="back-btn" onClick={()=>setView('dashboard')}>← Dashboard</button>
        </div>
        <div className="card">
          <div className="flex flex-between flex-center mb-16">
            <div>
              <span className="text-muted">{state.quizHistory.length} total answers</span>
              <span className="text-green" style={{marginLeft:16}}>{totalCorrect} correct</span>
              <span className="text-red" style={{marginLeft:16}}>{totalAnswered-totalCorrect} wrong</span>
            </div>
          </div>
          {recent.length===0?<p className="text-muted">No questions answered yet.</p>:
            recent.map((h,i)=>{
              const q=QUESTIONS.find(qq=>qq.id===h.qId);
              return(
                <div key={i} className="log-entry">
                  <div className="q-info">
                    <span className={`tag ${sectionColor(h.section)}`}>{sectionLabel(h.section)}</span>
                    <span className="text-sm" style={{marginLeft:8}}>{q?q.q.substring(0,60)+'...':'Unknown question'}</span>
                  </div>
                  <div className={`result ${h.correct?'text-green':'text-red'}`}>{h.correct?'✅':'❌'}</div>
                </div>
              );
            })
          }
        </div>
      </div>
    );
  }

  // ---- CHECKPOINTS VIEW ----
  if(view==='checkpoints') return(
    <div className="app">
      <div className="section-header">
        <h2>💾 Checkpoints</h2>
        <button className="back-btn" onClick={()=>setView('dashboard')}>← Dashboard</button>
      </div>

      <div className="card">
        <h3>Save Current Progress</h3>
        <p className="text-sm text-muted mb-8">Create a named snapshot of where you are right now. You can restore back to any checkpoint later.</p>
        <div className="cp-input-row">
          <input type="text" value={cpName} onChange={e=>setCpName(e.target.value)} placeholder="e.g. 'Before Mechanics deep dive' or 'Week 1 baseline'" />
          <button className="btn btn-primary" onClick={saveCheckpoint}>💾 Save</button>
        </div>
        <div className="text-sm text-muted">Current: {state.quizHistory.length} answers • {totalCorrect} correct ({accuracy}%) • {state.lessonsCompleted.length} lessons done</div>
      </div>

      <div className="card">
        <div className="flex flex-between flex-center mb-8">
          <h3>Quick Actions</h3>
        </div>
        <div className="flex gap-8" style={{flexWrap:'wrap'}}>
          <button className="btn btn-sm btn-secondary" onClick={resetToFresh}>🔄 Fresh Start (keep checkpoints)</button>
          <button className="btn btn-sm btn-danger" onClick={resetProgress}>🗑️ Nuclear Reset (erase everything)</button>
        </div>
        <p className="text-sm text-muted mt-8">"Fresh Start" zeros your progress but keeps all checkpoints so you can go back. "Nuclear" deletes everything.</p>
      </div>

      <div className="card">
        <h3>Saved Checkpoints ({checkpoints.length})</h3>
        {checkpoints.length===0?(
          <p className="text-muted">No checkpoints saved yet. Save one above to create a restore point.</p>
        ):(
          checkpoints.map(cp=>{
            const d=new Date(cp.date);
            const dateStr=d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
            const acc=cp.stats.answered>0?Math.round(cp.stats.correct/cp.stats.answered*100):0;
            return(
              <div key={cp.id} className="checkpoint-card">
                <div className="cp-info">
                  <div className="cp-name">{cp.name}</div>
                  <div className="cp-meta">{dateStr}</div>
                  <div className="cp-stats">
                    <span>{cp.stats.answered} answers</span>
                    <span style={{color:'var(--green)'}}>{acc}% accuracy</span>
                    <span>{cp.stats.lessonsCompleted}/{lessonList.length} lessons</span>
                  </div>
                </div>
                <div className="cp-actions">
                  {confirmRestore===cp.id?(
                    <>
                      <span className="text-sm text-yellow" style={{marginRight:8}}>Restore this?</span>
                      <button className="btn btn-sm btn-success" onClick={()=>restoreCheckpoint(cp.id)}>Yes</button>
                      <button className="btn btn-sm btn-secondary" onClick={()=>setConfirmRestore(null)}>No</button>
                    </>
                  ):(
                    <>
                      <button className="btn btn-sm btn-primary" onClick={()=>setConfirmRestore(cp.id)}>⏪ Restore</button>
                      <button className="btn btn-sm btn-danger" onClick={()=>{if(confirm('Delete this checkpoint?'))deleteCheckpoint(cp.id)}}>✕</button>
                    </>
                  )}
                </div>
              </div>
            );
          })
        )}
      </div>

      <div className="card" style={{background:'rgba(0,180,216,0.05)',borderColor:'var(--accent)'}}>
        <h3>How Checkpoints Work</h3>
        <p className="text-sm" style={{lineHeight:1.7}}>
          <strong>Save</strong> — Takes a snapshot of your current progress: all quiz history, lesson completions, streaks, and stats. Name it something meaningful like "Before Algebra Review" or "End of Week 1."<br/><br/>
          <strong>Restore</strong> — Rolls your progress back to exactly where you were when you saved. Your current progress will be replaced, so save a new checkpoint first if you want to keep it.<br/><br/>
          <strong>Use Case:</strong> If you're about to reset and regrind a section, save first. If the regrind goes wrong or you want to compare, restore back. You can also use it to branch: save, study one way, restore, study another way, and compare results.
        </p>
      </div>
    </div>
  );

  // ---- CHECKPOINT SAVE MODAL (renders over any view) ----
  const cpModal = showCpModal ? (
    <div className="modal-overlay" onClick={()=>setShowCpModal(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>💾 Save Checkpoint</h3>
        <p className="text-sm text-muted mb-16">Name this snapshot so you can find it later.</p>
        <div className="cp-input-row">
          <input type="text" value={cpName} onChange={e=>setCpName(e.target.value)} placeholder="e.g. 'Before Mechanics deep dive'" onKeyDown={e=>{if(e.key==='Enter')saveCheckpoint()}} autoFocus />
        </div>
        <div className="text-sm text-muted mb-16">Saving: {state.quizHistory.length} answers • {accuracy}% accuracy • {state.lessonsCompleted.length} lessons</div>
        <div className="flex gap-8">
          <button className="btn btn-primary" onClick={saveCheckpoint}>Save Checkpoint</button>
          <button className="btn btn-secondary" onClick={()=>setShowCpModal(false)}>Cancel</button>
        </div>
      </div>
    </div>
  ) : null;

  return <div className="app">{cpModal}<p>Loading...</p></div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
