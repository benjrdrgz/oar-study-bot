<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#131a2b;--card2:#1a2340;--accent:#00b4d8;--accent2:#0077b6;--green:#06d6a0;--red:#ef476f;--yellow:#ffd166;--orange:#f77f00;--text:#e0e6f0;--text2:#8892a8;--border:#1e2d4a}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.app{max-width:1100px;margin:0 auto;padding:16px}
button{cursor:pointer;border:none;font-family:inherit;font-size:inherit}
.btn{padding:10px 20px;border-radius:8px;font-weight:600;transition:all .2s}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{background:var(--accent2);color:#fff}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent)}
.btn-success{background:var(--green);color:#000}.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:6px 14px;font-size:13px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
.card h3{color:var(--accent);margin-bottom:12px}
h1{font-size:28px;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
h2{font-size:22px;color:var(--text);margin-bottom:16px}
.subtitle{color:var(--text2);font-size:14px;margin-bottom:24px}
.nav{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.nav button{padding:10px 18px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text2);font-weight:600;font-size:14px;transition:all .2s}
.nav button.active{background:var(--accent);color:#000;border-color:var(--accent)}
.nav button:hover:not(.active){border-color:var(--accent);color:var(--text)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:768px){.grid2,.grid3{grid-template-columns:1fr}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.stat-card .num{font-size:36px;font-weight:800;color:var(--accent)}
.stat-card .label{color:var(--text2);font-size:13px;margin-top:4px}
.progress-bar{height:8px;background:var(--card2);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-bar .fill{height:100%;border-radius:4px;transition:width .5s}
.fill-green{background:var(--green)}.fill-blue{background:var(--accent)}.fill-red{background:var(--red)}.fill-yellow{background:var(--yellow)}
.topic-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all .2s}
.topic-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.topic-card h4{color:var(--text);margin-bottom:6px;font-size:16px}
.topic-card .desc{color:var(--text2);font-size:13px}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;margin-left:8px}
.badge-green{background:rgba(6,214,160,.15);color:var(--green)}
.badge-yellow{background:rgba(255,209,102,.15);color:var(--yellow)}
.badge-red{background:rgba(239,71,111,.15);color:var(--red)}
.badge-blue{background:rgba(0,180,216,.15);color:var(--accent)}
.lesson-content{line-height:1.8;font-size:15px}
.lesson-content h4{color:var(--accent);margin:20px 0 10px;font-size:18px}
.lesson-content p{margin-bottom:12px}
.lesson-content .formula{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin:12px 0;font-family:'Courier New',monospace;font-size:15px;color:var(--yellow)}
.lesson-content .tip{background:rgba(0,180,216,.08);border-left:3px solid var(--accent);padding:12px 16px;margin:12px 0;border-radius:0 8px 8px 0}
.lesson-content .example{background:rgba(6,214,160,.08);border-left:3px solid var(--green);padding:12px 16px;margin:12px 0;border-radius:0 8px 8px 0}
.lesson-content .warning{background:rgba(239,71,111,.08);border-left:3px solid var(--red);padding:12px 16px;margin:12px 0;border-radius:0 8px 8px 0}
.lesson-content ul,.lesson-content ol{margin:8px 0 12px 24px}
.lesson-content li{margin-bottom:6px}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
.question-card .q-text{font-size:16px;margin-bottom:16px;font-weight:500}
.option{display:block;width:100%;text-align:left;padding:12px 16px;margin:6px 0;border-radius:8px;background:var(--card2);border:2px solid var(--border);color:var(--text);font-size:14px;transition:all .15s}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(0,180,216,.08)}
.option.selected{border-color:var(--accent);background:rgba(0,180,216,.12)}
.option.correct{border-color:var(--green);background:rgba(6,214,160,.12);color:var(--green)}
.option.wrong{border-color:var(--red);background:rgba(239,71,111,.12);color:var(--red)}
.option.disabled{cursor:default;opacity:.8}
.explanation{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:16px;font-size:14px;line-height:1.7}
.explanation h5{color:var(--green);margin-bottom:8px}
.timer{font-size:18px;font-weight:700;color:var(--yellow);font-family:'Courier New',monospace}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.quiz-progress{color:var(--text2);font-size:14px}
.tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600;margin:2px}
.tag-math{background:rgba(0,180,216,.15);color:var(--accent)}
.tag-reading{background:rgba(6,214,160,.15);color:var(--green)}
.tag-mech{background:rgba(255,209,102,.15);color:var(--yellow)}
.log-entry{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid var(--border);font-size:14px}
.log-entry:last-child{border-bottom:none}
.log-entry .q-info{flex:1}
.log-entry .result{font-weight:700;width:60px;text-align:center}
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:0}
.tabs button{padding:8px 16px;background:none;color:var(--text2);border:none;font-weight:600;font-size:14px;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
.search-input{width:100%;padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:14px;margin-bottom:16px}
.search-input:focus{outline:none;border-color:var(--accent)}
input[type=text],input[type=number],textarea{padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:14px}
input:focus,textarea:focus{outline:none;border-color:var(--accent)}
.flex{display:flex}.flex-between{justify-content:space-between}.flex-center{align-items:center}.gap-8{gap:8px}.gap-16{gap:16px}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}
.text-green{color:var(--green)}.text-red{color:var(--red)}.text-yellow{color:var(--yellow)}.text-accent{color:var(--accent)}.text-muted{color:var(--text2)}
.text-sm{font-size:13px}.text-lg{font-size:18px}.font-bold{font-weight:700}
.header-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.streak-badge{background:linear-gradient(135deg,var(--orange),var(--red));color:#fff;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700}
.reset-btn{background:none;color:var(--red);font-size:12px;text-decoration:underline;border:none;cursor:pointer;padding:4px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.back-btn{background:none;color:var(--text2);border:none;font-size:14px;cursor:pointer;padding:4px 8px}
.back-btn:hover{color:var(--text)}
.checkpoint-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.checkpoint-card .cp-info{flex:1;min-width:200px}
.checkpoint-card .cp-name{font-weight:700;color:var(--text);font-size:15px}
.checkpoint-card .cp-meta{color:var(--text2);font-size:12px;margin-top:4px}
.checkpoint-card .cp-stats{display:flex;gap:12px;font-size:12px;margin-top:6px}
.checkpoint-card .cp-actions{display:flex;gap:6px;flex-shrink:0}
.cp-input-row{display:flex;gap:8px;margin-bottom:16px;align-items:center}
.cp-input-row input{flex:1;padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:14px}
.cp-input-row input:focus{outline:none;border-color:var(--accent)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:500px;width:100%}
.modal h3{color:var(--accent);margin-bottom:16px}
.relearn-btn{background:rgba(0,180,216,.1);border:1px solid var(--accent);color:var(--accent);padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.relearn-btn:hover{background:var(--accent);color:#000}
.tts-bar{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;margin-bottom:16px;flex-wrap:wrap}
.tts-bar .tts-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:none;cursor:pointer;transition:all .15s}
.tts-btn-play{background:var(--accent);color:#000}.tts-btn-play:hover{background:var(--accent2);color:#fff}
.tts-btn-stop{background:var(--red);color:#fff}.tts-btn-stop:hover{opacity:.8}
.tts-bar .tts-label{color:var(--text2);font-size:13px;font-weight:600}
.tts-bar select{padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px}
.tts-bar input[type=range]{width:80px;accent-color:var(--accent)}
.tts-progress{flex:1;min-width:60px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.tts-progress .tts-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.yt-section{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.yt-section h4{color:var(--red);margin-bottom:12px;font-size:16px}
.yt-link{display:flex;align-items:center;gap:10px;padding:10px 14px;margin:6px 0;background:var(--card2);border:1px solid var(--border);border-radius:8px;text-decoration:none;color:var(--text);transition:all .15s;font-size:14px}
.yt-link:hover{border-color:var(--red);background:rgba(239,71,111,.06)}
.yt-link .yt-icon{color:var(--red);font-size:20px;flex-shrink:0;width:24px;text-align:center}
.yt-link .yt-info{flex:1}
.yt-link .yt-title{font-weight:600;color:var(--text)}
.yt-link .yt-channel{color:var(--text2);font-size:12px}
</style>

<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef}=React;

// ═══════════════════════════════════════════════════
// MASSIVE OAR QUESTION + LESSON DATABASE
// ═══════════════════════════════════════════════════

const LESSONS = {
  math_arithmetic: {
    id:'math_arithmetic',section:'math',title:'Arithmetic Fundamentals',
    desc:'Order of operations, fractions, decimals, percentages, ratios',
    content:`<h4>Order of Operations (PEMDAS)</h4>
<p>Every math question relies on getting the order right: <strong>P</strong>arentheses → <strong>E</strong>xponents → <strong>M</strong>ultiplication/<strong>D</strong>ivision (left to right) → <strong>A</strong>ddition/<strong>S</strong>ubtraction (left to right).</p>
<div class="formula">PEMDAS: 3 + 4 × 2 = 3 + 8 = 11 (NOT 14)</div>
<div class="tip"><strong>OAR Trap:</strong> The test loves mixing operations to catch people who go left-to-right. Always do multiplication/division BEFORE addition/subtraction.</div>

<h4>Fractions</h4>
<p>Adding/subtracting fractions requires a common denominator. Multiplying: multiply straight across. Dividing: flip the second fraction and multiply.</p>
<div class="formula">a/b + c/d = (ad + bc) / bd</div>
<div class="formula">a/b × c/d = ac / bd</div>
<div class="formula">a/b ÷ c/d = a/b × d/c = ad / bc</div>
<div class="example"><strong>Example:</strong> 2/3 + 3/4 = 8/12 + 9/12 = 17/12 = 1 5/12</div>

<h4>Decimals & Percentages</h4>
<p>To convert a percentage to a decimal, divide by 100 (move decimal 2 places left). To find X% of a number, multiply: number × (X/100).</p>
<div class="formula">Percent = (Part / Whole) × 100</div>
<div class="formula">Percent Change = ((New - Old) / Old) × 100</div>
<div class="example"><strong>Example:</strong> A shirt was $80, now $60. Percent decrease = (80-60)/80 × 100 = 25% off</div>

<h4>Ratios & Proportions</h4>
<p>A ratio compares two quantities. A proportion states two ratios are equal. Cross-multiply to solve.</p>
<div class="formula">If a/b = c/d, then ad = bc</div>
<div class="example"><strong>Example:</strong> If 3 pounds costs $5, how much do 9 pounds cost? 3/5 = 9/x → 3x = 45 → x = $15</div>

<div class="tip"><strong>Speed Tip:</strong> On the OAR, estimate first. If the answer choices are far apart, you can often eliminate 2-3 options by rounding.</div>`
  },

  math_algebra: {
    id:'math_algebra',section:'math',title:'Algebra',
    desc:'Equations, inequalities, systems, exponents, quadratics',
    content:`<h4>Solving Linear Equations</h4>
<p>Isolate the variable by performing the same operation on both sides. Always check your answer by plugging it back in.</p>
<div class="formula">If 3x + 7 = 22 → 3x = 15 → x = 5</div>

<h4>Systems of Equations</h4>
<p>Two methods: <strong>Substitution</strong> (solve one equation for a variable, plug into the other) or <strong>Elimination</strong> (add/subtract equations to cancel a variable).</p>
<div class="example"><strong>Example:</strong> 2x + y = 10 and x - y = 2<br/>
Add them: 3x = 12 → x = 4, then y = 10 - 2(4) = 2</div>

<h4>Exponent Rules</h4>
<div class="formula">x^a × x^b = x^(a+b)</div>
<div class="formula">x^a / x^b = x^(a-b)</div>
<div class="formula">(x^a)^b = x^(ab)</div>
<div class="formula">x^0 = 1 (for any x ≠ 0)</div>
<div class="formula">x^(-n) = 1/x^n</div>

<h4>Quadratic Equations</h4>
<div class="formula">ax² + bx + c = 0</div>
<div class="formula">Quadratic Formula: x = (-b ± √(b²-4ac)) / 2a</div>
<div class="formula">Factoring: x² + 5x + 6 = (x+2)(x+3) = 0 → x = -2 or x = -3</div>
<div class="tip"><strong>OAR Tip:</strong> Try factoring first — it's faster. Only use the quadratic formula when factoring isn't obvious.</div>

<h4>Inequalities</h4>
<p>Solve like equations, but <strong>flip the sign when multiplying or dividing by a negative number</strong>.</p>
<div class="formula">-2x > 6 → x < -3 (sign flips!)</div>

<h4>Absolute Value</h4>
<div class="formula">|x| = a means x = a OR x = -a</div>
<div class="formula">|x - 3| = 5 → x = 8 or x = -2</div>`
  },

  math_geometry: {
    id:'math_geometry',section:'math',title:'Geometry',
    desc:'Angles, triangles, circles, area, volume, coordinate geometry',
    content:`<h4>Angles</h4>
<p>Complementary angles sum to 90°. Supplementary angles sum to 180°. Triangle angles sum to 180°.</p>
<div class="formula">Vertical angles are equal. Alternate interior angles are equal (parallel lines).</div>

<h4>Triangle Rules</h4>
<div class="formula">Area = ½ × base × height</div>
<div class="formula">Pythagorean Theorem: a² + b² = c² (right triangles only)</div>
<div class="formula">Common right triangles: 3-4-5, 5-12-13, 8-15-17, 7-24-25</div>
<div class="tip"><strong>OAR Tip:</strong> Memorize the 3-4-5 and 5-12-13 triangles. They show up constantly, often as multiples (6-8-10, 10-24-26).</div>

<h4>Special Triangles</h4>
<div class="formula">45-45-90: sides are x, x, x√2</div>
<div class="formula">30-60-90: sides are x, x√3, 2x</div>

<h4>Circles</h4>
<div class="formula">Circumference = 2πr = πd</div>
<div class="formula">Area = πr²</div>
<div class="formula">Arc length = (θ/360) × 2πr</div>

<h4>Rectangles, Squares, Parallelograms</h4>
<div class="formula">Rectangle: Area = l × w, Perimeter = 2l + 2w</div>
<div class="formula">Square: Area = s², Perimeter = 4s</div>
<div class="formula">Parallelogram: Area = base × height</div>
<div class="formula">Trapezoid: Area = ½(b₁ + b₂) × h</div>

<h4>3D Shapes</h4>
<div class="formula">Rectangular prism volume = l × w × h</div>
<div class="formula">Cylinder volume = πr²h</div>
<div class="formula">Sphere volume = (4/3)πr³</div>
<div class="formula">Cone volume = (1/3)πr²h</div>

<h4>Coordinate Geometry</h4>
<div class="formula">Distance = √((x₂-x₁)² + (y₂-y₁)²)</div>
<div class="formula">Midpoint = ((x₁+x₂)/2, (y₁+y₂)/2)</div>
<div class="formula">Slope = (y₂-y₁)/(x₂-x₁) = rise/run</div>
<div class="formula">Slope-intercept form: y = mx + b</div>`
  },

  math_word: {
    id:'math_word',section:'math',title:'Word Problems',
    desc:'Distance/rate/time, work rate, mixtures, probability, averages',
    content:`<h4>Distance, Rate, Time</h4>
<div class="formula">Distance = Rate × Time (D = RT)</div>
<div class="example"><strong>Example:</strong> A car travels 60 mph for 2.5 hours. Distance = 60 × 2.5 = 150 miles</div>
<div class="example"><strong>Harder:</strong> Two cars leave same point: one at 50 mph east, one at 60 mph west. When are they 330 miles apart?<br/>50t + 60t = 330 → 110t = 330 → t = 3 hours</div>

<h4>Work Rate Problems</h4>
<div class="formula">Combined rate: 1/A + 1/B = 1/T (where A and B are individual times, T is combined time)</div>
<div class="example"><strong>Example:</strong> Worker A finishes in 6 hours, Worker B in 4 hours. Together: 1/6 + 1/4 = 2/12 + 3/12 = 5/12. Time = 12/5 = 2.4 hours</div>
<div class="tip"><strong>OAR Favorite:</strong> Work rate problems appear very frequently. Practice this formula until it's automatic.</div>

<h4>Mixture Problems</h4>
<div class="formula">Amount₁ × Concentration₁ + Amount₂ × Concentration₂ = Total × Final Concentration</div>
<div class="example"><strong>Example:</strong> Mix 10L of 30% solution with 20L of 60% solution: (10×0.3)+(20×0.6) = 3+12 = 15. Final: 15/30 = 50%</div>

<h4>Probability</h4>
<div class="formula">P(event) = favorable outcomes / total outcomes</div>
<div class="formula">P(A and B) = P(A) × P(B) if independent</div>
<div class="formula">P(A or B) = P(A) + P(B) - P(A and B)</div>

<h4>Averages & Weighted Averages</h4>
<div class="formula">Average = Sum of values / Number of values</div>
<div class="formula">Weighted Avg = (w₁×v₁ + w₂×v₂ + ...) / (w₁ + w₂ + ...)</div>
<div class="example"><strong>Example:</strong> Test scores: 80 (worth 30%), 90 (worth 70%). Weighted avg = (0.3×80)+(0.7×90) = 24+63 = 87</div>

<h4>Shadow / Similar Triangle Problems</h4>
<p>If a 6-foot person casts a 4-foot shadow, and a building casts a 20-foot shadow:</p>
<div class="formula">6/4 = h/20 → h = 30 feet</div>

<div class="warning"><strong>Common Trap:</strong> Always check units! The test mixes minutes/hours, feet/yards, etc. Convert everything to the same unit FIRST.</div>`
  },

  reading_main: {
    id:'reading_main',section:'reading',title:'Main Idea & Purpose',
    desc:'Identifying central themes, author purpose, and passage organization',
    content:`<h4>How to Identify the Main Idea</h4>
<p>The main idea is the central point the author wants to communicate. It's NOT a detail — it's the overarching message that all details support.</p>
<div class="tip"><strong>Strategy:</strong> Read the first and last sentences of the passage. These often contain or hint at the main idea. Then skim the body for supporting patterns.</div>

<h4>Topic vs. Main Idea vs. Theme</h4>
<p><strong>Topic:</strong> What the passage is about (1-3 words). <strong>Main Idea:</strong> What the author says about the topic (a complete sentence). <strong>Theme:</strong> The broader life lesson or universal truth.</p>
<div class="example"><strong>Example:</strong> A passage about honeybee population decline.<br/>
Topic: Honeybee decline<br/>
Main Idea: Honeybee populations are declining due to pesticide use, threatening food production.<br/>
Theme: Human activities have unintended consequences on ecosystems.</div>

<h4>Author's Purpose</h4>
<p>Every passage has a purpose: <strong>Inform</strong> (teach facts), <strong>Persuade</strong> (convince you), <strong>Entertain</strong> (tell a story), or <strong>Describe</strong> (paint a picture).</p>
<div class="tip"><strong>Clue Words:</strong> "Should" and "must" = persuade. Statistics and facts without opinion = inform. Vivid imagery = describe.</div>

<h4>The #1 OAR Reading Rule</h4>
<div class="warning"><strong>CRITICAL:</strong> Answer based ONLY on what the passage says. NOT on your own knowledge. Even if you know a fact is true, if the passage doesn't state it or directly imply it, it's wrong. This is the most common mistake on the OAR reading section.</div>

<h4>Passage Organization Patterns</h4>
<p>Recognizing structure helps you navigate faster: Chronological (time order), Cause-Effect, Compare-Contrast, Problem-Solution, Description.</p>`

  reading_inference: {
    id:'reading_inference',section:'reading',title:'Inference & Detail',
    desc:'Drawing conclusions, finding details, vocabulary in context',
    content:`<h4>What Is an Inference?</h4>
<p>An inference is a conclusion drawn from evidence in the text — it's NOT directly stated but is logically supported by what IS stated. Think of it as "reading between the lines."</p>
<div class="formula">Evidence (what the text says) + Reasoning = Inference</div>
<div class="tip"><strong>Test:</strong> If someone asked "where does it say that?", you should be able to point to specific sentences that support your inference, even if those sentences don't say it word-for-word.</div>

<h4>Detail Questions</h4>
<p>These ask "According to the passage..." — the answer is stated directly in the text. Scan for keywords from the question to locate the relevant sentence.</p>
<div class="tip"><strong>Speed Strategy:</strong> Don't re-read the whole passage. Use keywords from the question to locate the relevant section, then read that section carefully.</div>

<h4>Vocabulary in Context</h4>
<p>When asked what a word "most nearly means" in the passage, the answer depends on how it's used, not its most common definition.</p>
<div class="example"><strong>Example:</strong> "The grave professor addressed the class." Here, "grave" means serious/solemn, NOT a burial site. Context determines meaning.</div>

<h4>Eliminating Wrong Answers</h4>
<p>Wrong answers on reading comp often fall into predictable categories:</p>
<ul>
<li><strong>Too extreme:</strong> Uses "always," "never," "all" when the passage is more moderate</li>
<li><strong>True but not stated:</strong> Might be factually correct but isn't in the passage</li>
<li><strong>Opposite:</strong> Reverses what the passage says</li>
<li><strong>Too narrow:</strong> Only covers one detail, not the whole idea</li>
</ul>

<h4>Time Management</h4>
<div class="warning"><strong>20 questions in 30 minutes = 90 seconds per question.</strong> Don't get stuck. If a question is hard, make your best guess and move on. You can't go back on the CAT, so don't waste time second-guessing.</div>`

  mech_forces: {
    id:'mech_forces',section:'mechanical',title:'Forces & Newton\'s Laws',
    desc:'Newton\'s three laws, gravity, friction, net force',
    content:`<h4>Newton's First Law (Inertia)</h4>
<p>An object at rest stays at rest. An object in motion stays in motion at constant velocity. Unless acted on by a net external force.</p>
<div class="tip"><strong>OAR Application:</strong> A hockey puck on ice keeps sliding because friction is minimal. It's not that there's no force — it's that the forces are balanced (net force = 0).</div>

<h4>Newton's Second Law (F = ma)</h4>
<div class="formula">Force = Mass × Acceleration (F = ma)</div>
<div class="formula">Weight = Mass × Gravity (W = mg, where g ≈ 9.8 m/s² or 32 ft/s²)</div>
<div class="example"><strong>Example:</strong> A 10 kg box is pushed with 50 N. a = F/m = 50/10 = 5 m/s²</div>

<h4>Newton's Third Law (Action-Reaction)</h4>
<p>For every action, there is an equal and opposite reaction. If you push on a wall with 10 N, the wall pushes back on you with 10 N.</p>
<div class="warning"><strong>Common Trap:</strong> Action-reaction pairs act on DIFFERENT objects. The force you apply to the wall and the wall's force on you are equal — but they don't cancel because they act on different things.</div>

<h4>Friction</h4>
<div class="formula">Friction Force = μ × Normal Force (F_f = μN)</div>
<p>Static friction (not moving yet) is greater than kinetic friction (already sliding). μ is the coefficient of friction — higher means more friction.</p>

<h4>Gravity & Free Fall</h4>
<div class="formula">All objects fall at the same rate in a vacuum: g ≈ 9.8 m/s²</div>
<div class="formula">Free fall distance: d = ½gt²</div>
<div class="formula">Free fall velocity: v = gt</div>

<h4>Net Force</h4>
<p>Add forces in the same direction, subtract forces in opposite directions. Net force determines acceleration direction.</p>
<div class="example"><strong>Example:</strong> 100 N pushes right, 30 N friction pushes left. Net force = 70 N to the right.</div>`
  },

  mech_levers: {
    id:'mech_levers',section:'mechanical',title:'Levers & Torque',
    desc:'Three classes of levers, mechanical advantage, torque',
    content:`<h4>The Lever Principle</h4>
<div class="formula">Force₁ × Distance₁ = Force₂ × Distance₂</div>
<div class="formula">(Effort × Effort Arm) = (Load × Load Arm)</div>
<p>A lever is a rigid bar that rotates around a fixed point (fulcrum). The mechanical advantage comes from the ratio of distances.</p>

<h4>Three Classes of Levers</h4>
<p><strong>First Class:</strong> Fulcrum is BETWEEN effort and load. Examples: seesaw, crowbar, scissors. Can multiply force OR speed depending on fulcrum position.</p>
<p><strong>Second Class:</strong> Load is BETWEEN fulcrum and effort. Examples: wheelbarrow, bottle opener, nutcracker. ALWAYS multiplies force (effort arm is always longer).</p>
<p><strong>Third Class:</strong> Effort is BETWEEN fulcrum and load. Examples: tweezers, fishing rod, baseball bat. ALWAYS multiplies speed/distance (but requires more force).</p>
<div class="tip"><strong>Memory Trick:</strong> Think "FLE" — Fulcrum-Load-Effort. 1st class = Fulcrum in middle. 2nd = Load in middle. 3rd = Effort in middle.</div>

<h4>Mechanical Advantage</h4>
<div class="formula">MA = Effort Arm / Load Arm = Load / Effort</div>
<div class="example"><strong>Example:</strong> A lever has effort arm 6 ft and load arm 2 ft. MA = 6/2 = 3. You only need 1/3 the force to lift the load.</div>

<h4>Torque</h4>
<div class="formula">Torque = Force × Distance from pivot (τ = F × d)</div>
<p>Torque is the rotational equivalent of force. A longer wrench = more torque with less effort.</p>
<div class="example"><strong>Example:</strong> 20 N applied at 0.5 m from a bolt: Torque = 20 × 0.5 = 10 N·m</div>`
  },

  mech_gears: {
    id:'mech_gears',section:'mechanical',title:'Gears & Pulleys',
    desc:'Gear ratios, direction of rotation, pulley systems',
    content:`<h4>Gear Basics</h4>
<p>Gears are wheels with teeth that mesh together to transmit force and motion. Key rule: <strong>adjacent gears ALWAYS rotate in opposite directions</strong>.</p>
<div class="formula">N₁ × V₁ = N₂ × V₂ (teeth × speed is constant)</div>
<div class="formula">Gear Ratio = N_driven / N_driver = Speed_driver / Speed_driven</div>

<h4>Direction Rules</h4>
<ul>
<li>2 meshed gears: opposite directions</li>
<li>Odd number of gears in a chain: last gear same direction as first</li>
<li>Even number of gears in a chain: last gear opposite direction from first</li>
<li>An idler gear (middle gear) changes direction but NOT speed ratio</li>
</ul>
<div class="example"><strong>Example:</strong> Gear A (20 teeth) drives Gear B (40 teeth). If A spins at 100 RPM:<br/>
20 × 100 = 40 × V₂ → V₂ = 50 RPM. Gear B spins slower but with MORE torque. They spin in opposite directions.</div>

<h4>Pulley Systems</h4>
<p><strong>Fixed Pulley:</strong> Changes direction of force only. You pull down to lift up. Effort = Load. MA = 1.</p>
<p><strong>Movable Pulley:</strong> Attached to the load and moves with it. Effort = Load/2. MA = 2. But you pull twice the distance.</p>
<p><strong>Combined (Block and Tackle):</strong> Uses both fixed and movable pulleys.</p>
<div class="formula">MA of a pulley system = Number of rope segments supporting the load</div>
<div class="tip"><strong>Quick Count Method:</strong> Count how many rope segments connect to or pass through the movable pulley block. That's your MA.</div>
<div class="example"><strong>Example:</strong> A system has 4 rope segments supporting the load. To lift 200 lbs: Effort = 200/4 = 50 lbs. But you pull 4× the distance.</div>

<h4>The Trade-Off</h4>
<div class="warning"><strong>Golden Rule of Simple Machines:</strong> You can reduce force, but you ALWAYS pay with extra distance. Work in = Work out (in an ideal system). Force × Distance is constant.</div>`
  },

  mech_energy: {
    id:'mech_energy',section:'mechanical',title:'Energy, Work & Power',
    desc:'Kinetic/potential energy, work, power, conservation of energy',
    content:`<h4>Work</h4>
<div class="formula">Work = Force × Distance × cos(θ) — where θ is the angle between force and direction of motion</div>
<div class="formula">If force is in the direction of motion: W = F × d</div>
<p>Work is only done when a force causes displacement. Holding a heavy box (no movement) = zero work.</p>

<h4>Kinetic Energy</h4>
<div class="formula">KE = ½mv² (energy of motion)</div>
<div class="tip"><strong>Key insight:</strong> Doubling velocity QUADRUPLES kinetic energy (because v is squared). This is why car crashes at high speed are so much more dangerous.</div>

<h4>Potential Energy</h4>
<div class="formula">Gravitational PE = mgh (mass × gravity × height)</div>
<div class="formula">Spring PE = ½kx² (k = spring constant, x = compression/stretch)</div>

<h4>Conservation of Energy</h4>
<div class="formula">Total Energy = KE + PE = constant (in a closed system)</div>
<div class="example"><strong>Example:</strong> A ball at the top of a hill has max PE, zero KE. At the bottom: max KE, zero PE. PE converted to KE.</div>

<h4>Power</h4>
<div class="formula">Power = Work / Time = Force × velocity</div>
<div class="formula">Units: Watts (W) = Joules/second. 1 horsepower ≈ 746 W</div>

<h4>Inclined Planes</h4>
<div class="formula">Force to push up a frictionless incline: F = mg × sin(θ)</div>
<div class="formula">MA of inclined plane = Length / Height</div>
<p>A longer, less steep ramp requires less force but more distance — same trade-off as all simple machines.</p>`
  },

  mech_fluids: {
    id:'mech_fluids',section:'mechanical',title:'Fluids & Pressure',
    desc:'Pressure, Pascal\'s law, buoyancy, hydraulics',
    content:`<h4>Pressure</h4>
<div class="formula">Pressure = Force / Area (P = F/A)</div>
<div class="formula">Units: Pascals (Pa) = N/m², or PSI = lb/in²</div>
<p>Smaller area = more pressure with the same force. This is why a knife cuts — small area concentrates force.</p>

<h4>Pascal's Law</h4>
<p>Pressure applied to an enclosed fluid is transmitted equally in all directions. This is how hydraulic systems work.</p>
<div class="formula">F₁/A₁ = F₂/A₂</div>
<div class="example"><strong>Example:</strong> A hydraulic press has piston 1 (area 2 in²) and piston 2 (area 20 in²). Apply 10 lbs to piston 1: F₂ = 10 × (20/2) = 100 lbs output force. 10× force multiplication!</div>

<h4>Buoyancy (Archimedes' Principle)</h4>
<p>An object in fluid experiences an upward force equal to the weight of the fluid it displaces.</p>
<div class="formula">Buoyant Force = ρ_fluid × V_displaced × g</div>
<p>Object floats if its density < fluid density. Object sinks if its density > fluid density.</p>

<h4>Fluid Flow</h4>
<div class="formula">Continuity Equation: A₁v₁ = A₂v₂</div>
<p>When a pipe narrows, fluid speeds up. When it widens, fluid slows down (like a river going through a narrow canyon).</p>
<div class="formula">Bernoulli's Principle: faster fluid = lower pressure</div>
<div class="tip"><strong>OAR Application:</strong> Bernoulli explains airplane lift. Air moves faster over the curved top of a wing → lower pressure on top → net upward force.</div>`
  },

  mech_electricity: {
    id:'mech_electricity',section:'mechanical',title:'Electricity Basics',
    desc:'Circuits, Ohm\'s law, series vs parallel, power',
    content:`<h4>Basic Concepts</h4>
<p><strong>Voltage (V):</strong> The "pressure" pushing electrons through a circuit (measured in Volts).<br/>
<strong>Current (I):</strong> The flow rate of electrons (measured in Amps).<br/>
<strong>Resistance (R):</strong> Opposition to current flow (measured in Ohms, Ω).</p>
<div class="tip"><strong>Water Analogy:</strong> Voltage = water pressure, Current = flow rate, Resistance = pipe narrowness. Higher pressure + wider pipe = more flow.</div>

<h4>Ohm's Law</h4>
<div class="formula">V = IR (Voltage = Current × Resistance)</div>
<div class="formula">I = V/R and R = V/I (rearranged forms)</div>

<h4>Series Circuits</h4>
<div class="formula">Total Resistance: R_total = R₁ + R₂ + R₃ + ...</div>
<p>Current is the SAME through all components. Voltage SPLITS across components. If one component fails, the whole circuit breaks.</p>

<h4>Parallel Circuits</h4>
<div class="formula">Total Resistance: 1/R_total = 1/R₁ + 1/R₂ + 1/R₃ + ...</div>
<p>Voltage is the SAME across all branches. Current SPLITS across branches. If one branch fails, others keep working.</p>
<div class="example"><strong>Example:</strong> Two 6Ω resistors in parallel: 1/R = 1/6 + 1/6 = 2/6 → R = 3Ω. Parallel always gives LESS total resistance than any single resistor.</div>

<h4>Electrical Power</h4>
<div class="formula">P = IV = I²R = V²/R</div>
<div class="formula">Units: Watts (W). Energy = Power × Time (kWh for electric bills)</div>`
  }
};

      'The Great Barrier Reef is declining due to environmental factors despite conservation efforts',
      'Coral bleaching is caused by high water temperatures',
      'Conservation programs are failing to protect the reef'
    ],correct:1,
    explanation:'The passage discusses the reef\'s decline (the central problem), lists multiple causes, and mentions conservation efforts — the main idea encompasses all of these. Option A is too narrow (just one detail). Option C is one supporting detail. Option D is too extreme ("failing" — the passage says they "face challenges").'},
  {id:'r2',section:'reading',lesson:'reading_inference',difficulty:2,
    q:'From the same reef passage, which can be inferred?',
    options:[
      'The reef will be completely destroyed within 10 years',
      'Cyclones are the primary threat to the reef',
      'If global temperatures continue rising, the reef\'s decline will likely worsen',
      'Marine protected areas have been completely ineffective'
    ],correct:2,
    explanation:'The passage states that rising temperatures cause bleaching and that conservation "faces challenges from continued global warming." This logically implies that if warming continues, decline worsens. The other options are too extreme or not supported by the passage.'},
  {id:'r3',section:'reading',lesson:'reading_main',difficulty:2,
    q:'"Recent archaeological findings in Southeast Asia have challenged the long-held belief that Homo sapiens migrated out of Africa in a single wave approximately 60,000 years ago. Stone tools and fossil fragments discovered in Sumatra, dated to roughly 73,000 years ago, suggest earlier dispersals may have occurred. Some researchers propose a model of multiple migration waves, with earlier groups potentially not surviving long-term. This debate highlights how new evidence can fundamentally reshape our understanding of human history."\n\nWhat is the author\'s primary purpose?',
    options:[
      'To prove that humans originated in Southeast Asia',
      'To describe how new evidence is challenging established theories about human migration',
      'To argue that the out-of-Africa theory is completely wrong',
      'To catalog recent archaeological discoveries'
    ],correct:1,
    explanation:'The passage presents new evidence that "challenges" an existing belief and notes how "new evidence can fundamentally reshape our understanding." The purpose is to show how evidence changes theories. It doesn\'t claim the old theory is "completely wrong" (too extreme) or that humans originated in SE Asia.'},
  {id:'r4',section:'reading',lesson:'reading_inference',difficulty:2,
    q:'Based on the migration passage, what can be inferred about the "single wave" migration theory?',
    options:[
      'It has been definitively disproven',
      'It was based on the best available evidence at the time',
      'It was never widely accepted by scientists',
      'It only applies to European migration'
    ],correct:1,
    explanation:'The passage calls it a "long-held belief" that is now being "challenged" by new findings. This implies it was the accepted view based on available evidence. "Challenged" ≠ "definitively disproven" (too extreme). And "long-held" contradicts "never widely accepted."'},
  {id:'r5',section:'reading',lesson:'reading_main',difficulty:2,
    q:'"Sleep deprivation has been shown to impair cognitive function in ways comparable to alcohol intoxication. A person who has been awake for 17 hours performs at a level equivalent to someone with a blood alcohol concentration of 0.05%. After 24 hours without sleep, performance drops to a level equivalent to a BAC of 0.10%, which exceeds the legal driving limit in most jurisdictions. Despite this evidence, many industries still expect or require employees to work extended shifts without adequate rest."\n\nWhich statement best captures the author\'s tone?',
    options:[
      'Neutral and purely scientific',
      'Concerned and somewhat critical',
      'Angry and accusatory',
      'Optimistic about future changes'
    ],correct:1,
    explanation:'The passage presents scientific facts but the final sentence — "Despite this evidence, many industries still expect..." — shows concern and mild criticism of current practices. It\'s not purely neutral (there\'s a judgment), not angry (no harsh language), and not optimistic.'},
  {id:'r6',section:'reading',lesson:'reading_inference',difficulty:1,
    q:'Based on the sleep deprivation passage, which of the following is a valid conclusion?',
    options:[
      'Alcohol is less dangerous than sleep deprivation',
      'Working more than 17 hours could pose safety risks comparable to impaired driving',
      'Most workplaces have already addressed this issue',
      'Sleep deprivation only affects driving ability'
    ],correct:1,
    explanation:'The passage equates 17+ hours awake with alcohol impairment levels. Since impaired driving is a safety risk, working 17+ hours poses comparable safety risks. The passage says industries "still expect" long shifts (contradicts C). It discusses general "cognitive function" not just driving (contradicts D).'},
  {id:'r7',section:'reading',lesson:'reading_main',difficulty:2,
    q:'"Microplastics—fragments smaller than 5 millimeters—have been found in virtually every environment on Earth, from the deepest ocean trenches to the highest mountain peaks. These particles originate from the breakdown of larger plastic items, synthetic clothing fibers released during washing, and microbeads in personal care products. While the full health implications for humans remain under investigation, studies in marine organisms have demonstrated endocrine disruption, reduced reproductive success, and impaired growth."\n\nWhich title best fits this passage?',
    options:[
      'Why You Should Stop Using Plastic Immediately',
      'The Global Spread and Potential Dangers of Microplastics',
      'Marine Animals and Plastic Pollution',
      'How Washing Machines Pollute the Ocean'
    ],correct:1,
    explanation:'The passage covers both the widespread distribution of microplastics (global spread) AND their potential dangers. Option A is too prescriptive. C is too narrow (only marine animals). D is too narrow (only one source).'},
  {id:'r8',section:'reading',lesson:'reading_inference',difficulty:3,
    q:'"The introduction of wolves to Yellowstone National Park in 1995 triggered a cascade of ecological changes that scientists call a trophic cascade. With wolves hunting elk, the elk populations shifted their grazing patterns, spending less time in open meadows near rivers. This allowed willow and aspen trees to regenerate along riverbanks. The returning vegetation stabilized riverbanks, reduced erosion, and created habitat for songbirds and beavers. The beavers, in turn, built dams that created pools benefiting fish and amphibian populations."\n\nBased on this passage, which statement is most accurate?',
    options:[
      'Wolves directly improved fish populations',
      'Removing wolves would only affect elk populations',
      'The ecological impacts of predator reintroduction can extend far beyond the immediate prey relationship',
      'Beavers are more important to the ecosystem than wolves'
    ],correct:2,
    explanation:'The passage describes a chain reaction: wolves → elk behavior → trees → erosion/birds/beavers → fish. This demonstrates that predator effects extend far beyond just prey. Wolves didn\'t directly help fish (A is wrong). Removing wolves would affect the whole chain (B is wrong). The passage doesn\'t rank importance (D is unsupported).'},

  // ---- MECHANICAL COMPREHENSION: FORCES ----
  {id:'mc1',section:'mechanical',lesson:'mech_forces',difficulty:1,
    q:'A 5 kg object is pushed with a net force of 20 N. What is its acceleration?',
    options:['2 m/s²','4 m/s²','10 m/s²','100 m/s²'],correct:1,
    explanation:'F = ma. a = F/m = 20/5 = 4 m/s².'},
  {id:'mc2',section:'mechanical',lesson:'mech_forces',difficulty:1,
    q:'An object is moving at constant velocity. What can you say about the net force?',
    options:['Net force is in the direction of motion','Net force is zero','Net force equals the weight','There must be no forces acting on it'],correct:1,
    explanation:'Newton\'s First Law: constant velocity means balanced forces. Net force = 0. There ARE forces (like gravity and the normal force), but they cancel out.'},
  {id:'mc3',section:'mechanical',lesson:'mech_forces',difficulty:2,
    q:'A 2 kg ball is dropped from rest. How fast is it going after 3 seconds? (g = 10 m/s²)',
    options:['20 m/s','30 m/s','6 m/s','60 m/s'],correct:1,
    explanation:'v = gt = 10 × 3 = 30 m/s. The mass doesn\'t matter in free fall (all objects fall at the same rate).'},
  {id:'mc4',section:'mechanical',lesson:'mech_forces',difficulty:2,
    q:'A 50 N force pushes a box right while a 20 N friction force resists. What is the net force?',
    options:['70 N right','30 N right','30 N left','50 N right'],correct:1,
    explanation:'Net force = 50 N - 20 N = 30 N to the right (in the direction of the larger force).'},
  {id:'mc5',section:'mechanical',lesson:'mech_forces',difficulty:2,
    q:'You push against a wall with 15 N of force. According to Newton\'s Third Law, the wall pushes back with:',
    options:['0 N','15 N','30 N','It depends on the wall\'s mass'],correct:1,
    explanation:'Newton\'s Third Law: every action has an equal and opposite reaction. The wall pushes back with exactly 15 N.'},

  // ---- MECHANICAL: LEVERS ----
  {id:'mc6',section:'mechanical',lesson:'mech_levers',difficulty:1,
    q:'A seesaw has a 40 kg child sitting 3 meters from the fulcrum. How far from the fulcrum must a 60 kg child sit to balance?',
    options:['2 meters','4 meters','1.5 meters','4.5 meters'],correct:0,
    explanation:'F₁ × d₁ = F₂ × d₂. 40 × 3 = 60 × d₂. 120 = 60d₂. d₂ = 2 meters.'},
  {id:'mc7',section:'mechanical',lesson:'mech_levers',difficulty:1,
    q:'A wheelbarrow is an example of which class of lever?',
    options:['First class','Second class','Third class','Not a lever'],correct:1,
    explanation:'In a wheelbarrow, the wheel is the fulcrum, the load is in the middle (the bucket), and the effort is at the handles. Load between fulcrum and effort = Second class.'},
  {id:'mc8',section:'mechanical',lesson:'mech_levers',difficulty:2,
    q:'A lever has an effort arm of 8 feet and a load arm of 2 feet. What is the mechanical advantage?',
    options:['2','4','6','16'],correct:1,
    explanation:'MA = Effort Arm / Load Arm = 8/2 = 4. This means you only need 1/4 of the load\'s weight as effort force.'},
  {id:'mc9',section:'mechanical',lesson:'mech_levers',difficulty:2,
    q:'Tweezers and chopsticks are examples of which class of lever?',
    options:['First class','Second class','Third class','Compound lever'],correct:2,
    explanation:'In tweezers, the fulcrum is at the end, your fingers apply effort in the middle, and the tips (load) are at the other end. Effort between fulcrum and load = Third class. These trade force for precision and speed.'},
  {id:'mc10',section:'mechanical',lesson:'mech_levers',difficulty:2,
    q:'A wrench requires 30 N·m of torque to loosen a bolt. If the wrench is 0.5 meters long, how much force must you apply?',
    options:['15 N','30 N','60 N','120 N'],correct:2,
    explanation:'Torque = Force × Distance. 30 = F × 0.5. F = 30/0.5 = 60 N.'},

  // ---- MECHANICAL: GEARS & PULLEYS ----
  {id:'mc11',section:'mechanical',lesson:'mech_gears',difficulty:1,
    q:'Gear A meshes directly with Gear B. If Gear A turns clockwise, which direction does Gear B turn?',
    options:['Clockwise','Counter-clockwise','Same as A','It depends on the number of teeth'],correct:1,
    explanation:'Adjacent meshing gears ALWAYS rotate in opposite directions. A turns clockwise, so B turns counter-clockwise.'},
  {id:'mc12',section:'mechanical',lesson:'mech_gears',difficulty:2,
    q:'Gear A has 20 teeth and spins at 100 RPM. It drives Gear B which has 50 teeth. How fast does Gear B spin?',
    options:['250 RPM','40 RPM','50 RPM','100 RPM'],correct:1,
    explanation:'N₁ × V₁ = N₂ × V₂. 20 × 100 = 50 × V₂. V₂ = 2000/50 = 40 RPM. Larger gear = slower speed but more torque.'},
  {id:'mc13',section:'mechanical',lesson:'mech_gears',difficulty:2,
    q:'A chain of 5 meshing gears: the first gear turns clockwise. Which direction does the last (5th) gear turn?',
    options:['Clockwise','Counter-clockwise','Cannot determine','Depends on gear sizes'],correct:0,
    explanation:'Odd number of gears in a chain → last gear turns SAME direction as first. Each gear reverses: CW → CCW → CW → CCW → CW.'},
  {id:'mc14',section:'mechanical',lesson:'mech_gears',difficulty:1,
    q:'A fixed pulley is used to lift a 100-lb weight. How much force must you apply?',
    options:['50 lbs','100 lbs','200 lbs','25 lbs'],correct:1,
    explanation:'A fixed pulley only changes direction, not force. MA = 1. You must apply 100 lbs of force, but you can pull DOWN instead of lifting UP.'},
  {id:'mc15',section:'mechanical',lesson:'mech_gears',difficulty:2,
    q:'A movable pulley system has 4 rope segments supporting the load. To lift a 200 lb load, how much force is needed?',
    options:['50 lbs','100 lbs','200 lbs','800 lbs'],correct:0,
    explanation:'MA = number of supporting rope segments = 4. Force = Load/MA = 200/4 = 50 lbs. But you must pull 4× the distance.'},
  {id:'mc16',section:'mechanical',lesson:'mech_gears',difficulty:3,
    q:'Gear A (10 teeth) drives Gear B (30 teeth), which drives Gear C (15 teeth). If Gear A spins at 300 RPM, what is Gear C\'s speed?',
    options:['100 RPM','200 RPM','150 RPM','600 RPM'],correct:1,
    explanation:'A→B: 10×300 = 30×V_B → V_B = 100 RPM. B→C: 30×100 = 15×V_C → V_C = 200 RPM.'},

  // ---- MECHANICAL: ENERGY ----
  {id:'mc17',section:'mechanical',lesson:'mech_energy',difficulty:2,
    q:'A 4 kg object moves at 5 m/s. What is its kinetic energy?',
    options:['20 J','50 J','100 J','10 J'],correct:1,
    explanation:'KE = ½mv² = ½(4)(25) = 50 J.'},
  {id:'mc18',section:'mechanical',lesson:'mech_energy',difficulty:2,
    q:'If you double the speed of an object, what happens to its kinetic energy?',
    options:['Doubles','Triples','Quadruples','Stays the same'],correct:2,
    explanation:'KE = ½mv². If v doubles, v² quadruples, so KE quadruples. Speed matters much more than mass for kinetic energy.'},
  {id:'mc19',section:'mechanical',lesson:'mech_energy',difficulty:2,
    q:'A 10 kg object is lifted to a height of 5 meters. What is its potential energy? (g = 10 m/s²)',
    options:['50 J','100 J','500 J','250 J'],correct:2,
    explanation:'PE = mgh = 10 × 10 × 5 = 500 J.'},
  {id:'mc20',section:'mechanical',lesson:'mech_energy',difficulty:2,
    q:'A ramp is 10 meters long and 2 meters high. What is its mechanical advantage?',
    options:['2','5','10','20'],correct:1,
    explanation:'MA of inclined plane = Length/Height = 10/2 = 5. You use 1/5 the force but travel 5× the distance.'},
  {id:'mc21',section:'mechanical',lesson:'mech_energy',difficulty:2,
    q:'A machine does 600 J of work in 30 seconds. What is its power output?',
    options:['10 W','20 W','180 W','18,000 W'],correct:1,
    explanation:'Power = Work/Time = 600/30 = 20 W (watts = joules per second).'},

  // ---- MECHANICAL: FLUIDS ----
  {id:'mc22',section:'mechanical',lesson:'mech_fluids',difficulty:1,
    q:'A force of 200 N is applied over an area of 4 m². What is the pressure?',
    options:['800 Pa','50 Pa','100 Pa','200 Pa'],correct:1,
    explanation:'P = F/A = 200/4 = 50 Pa (Pascals).'},
  {id:'mc23',section:'mechanical',lesson:'mech_fluids',difficulty:2,
    q:'In a hydraulic system, piston A has area 5 cm² and piston B has area 25 cm². If you push piston A with 40 N, what force does piston B exert?',
    options:['8 N','40 N','200 N','1000 N'],correct:2,
    explanation:'F₁/A₁ = F₂/A₂. 40/5 = F₂/25. F₂ = 40 × 25/5 = 200 N. Force is multiplied by the area ratio.'},
  {id:'mc24',section:'mechanical',lesson:'mech_fluids',difficulty:2,
    q:'A wooden block floats with 60% of its volume submerged. What is the block\'s density relative to water?',
    options:['0.4','0.6','1.0','1.6'],correct:1,
    explanation:'The fraction submerged equals the ratio of object density to fluid density. 60% submerged → density = 0.6 × water density.'},
  {id:'mc25',section:'mechanical',lesson:'mech_fluids',difficulty:2,
    q:'Water flows through a pipe that narrows from 10 cm² to 5 cm². If the initial velocity is 2 m/s, what is the velocity in the narrow section?',
    options:['1 m/s','2 m/s','4 m/s','10 m/s'],correct:2,
    explanation:'Continuity equation: A₁v₁ = A₂v₂. 10 × 2 = 5 × v₂. v₂ = 20/5 = 4 m/s. Narrower pipe = faster flow.'},

  // ---- MECHANICAL: ELECTRICITY ----
  {id:'mc26',section:'mechanical',lesson:'mech_electricity',difficulty:1,
    q:'A circuit has a 12V battery and a 4Ω resistor. What is the current?',
    options:['3 A','48 A','0.33 A','8 A'],correct:0,
    explanation:'Ohm\'s Law: I = V/R = 12/4 = 3 Amps.'},
  {id:'mc27',section:'mechanical',lesson:'mech_electricity',difficulty:2,
    q:'Three resistors of 2Ω, 3Ω, and 5Ω are connected in series. What is the total resistance?',
    options:['0.97Ω','3.3Ω','10Ω','30Ω'],correct:2,
    explanation:'In series: R_total = R₁ + R₂ + R₃ = 2 + 3 + 5 = 10Ω.'},
  {id:'mc28',section:'mechanical',lesson:'mech_electricity',difficulty:3,
    q:'Two 10Ω resistors are connected in parallel. What is the total resistance?',
    options:['20Ω','10Ω','5Ω','2.5Ω'],correct:2,
    explanation:'1/R = 1/10 + 1/10 = 2/10. R = 10/2 = 5Ω. For two equal resistors in parallel: R_total = R/2.'},
  {id:'mc29',section:'mechanical',lesson:'mech_electricity',difficulty:2,
    q:'In a series circuit, if one light bulb burns out, what happens to the other bulbs?',
    options:['They get brighter','They stay the same','They all go out','They dim but stay on'],correct:2,
    explanation:'In a series circuit, there is only ONE path for current. If any component breaks, the circuit is broken and ALL components stop working.'},
  {id:'mc30',section:'mechanical',lesson:'mech_electricity',difficulty:2,
    q:'A 120V circuit draws 2 Amps. What is the power consumption?',
    options:['60 W','240 W','120 W','480 W'],correct:1,
    explanation:'P = IV = 2 × 120 = 240 Watts.'},

  // ---- MORE MATH (MIXED DIFFICULTY) ----
  {id:'m33',section:'math',lesson:'math_algebra',difficulty:3,
    q:'If log₂(x) = 5, what is x?',
    options:['10','25','32','64'],correct:2,
    explanation:'log₂(x) = 5 means 2⁵ = x = 32.'},
  {id:'m34',section:'math',lesson:'math_geometry',difficulty:3,
    q:'A sector of a circle has a central angle of 60° and radius 12. What is the arc length?',
    options:['2π','4π','6π','12π'],correct:1,
    explanation:'Arc length = (θ/360) × 2πr = (60/360) × 2π(12) = (1/6)(24π) = 4π.'},
  {id:'m35',section:'math',lesson:'math_word',difficulty:3,
    q:'A plane flies 600 miles with a tailwind in 2 hours, then returns against the same wind in 3 hours. What is the wind speed?',
    options:['50 mph','75 mph','100 mph','60 mph'],correct:0,
    explanation:'Let plane speed = p, wind = w. With tailwind: p+w = 600/2 = 300. Against: p-w = 600/3 = 200. Adding: 2p = 500, p = 250. Then w = 300-250 = 50 mph.'},
  {id:'m36',section:'math',lesson:'math_arithmetic',difficulty:2,
    q:'What is 0.125 as a fraction in lowest terms?',
    options:['1/8','1/6','1/4','3/25'],correct:0,
    explanation:'0.125 = 125/1000 = 1/8. Shortcut: 0.125 × 8 = 1, so 0.125 = 1/8.'},
  {id:'m37',section:'math',lesson:'math_algebra',difficulty:2,
    q:'What is the value of x if 2^(x+1) = 16?',
    options:['3','4','7','8'],correct:0,
    explanation:'16 = 2⁴. So 2^(x+1) = 2⁴. Therefore x+1 = 4, x = 3.'},
  {id:'m38',section:'math',lesson:'math_geometry',difficulty:2,
    q:'What is the area of a trapezoid with parallel sides 8 and 12, and height 5?',
    options:['40','50','60','100'],correct:1,
    explanation:'Area = ½(b₁+b₂)×h = ½(8+12)×5 = ½(20)(5) = 50.'},
  {id:'m39',section:'math',lesson:'math_word',difficulty:2,
    q:'A shirt costs $45 after a 25% discount. What was the original price?',
    options:['$56.25','$60.00','$67.50','$70.00'],correct:1,
    explanation:'After 25% discount, you pay 75%. So 0.75 × original = 45. Original = 45/0.75 = $60.'},

  // More mechanical
  {id:'mc31',section:'mechanical',lesson:'mech_energy',difficulty:3,
    q:'A 2 kg ball is dropped from 20 meters. What is its speed just before hitting the ground? (g = 10 m/s²)',
    options:['10 m/s','20 m/s','40 m/s','200 m/s'],correct:1,
    explanation:'Using energy conservation: mgh = ½mv². The m cancels: gh = ½v². v² = 2gh = 2(10)(20) = 400. v = 20 m/s.'},
  {id:'mc32',section:'mechanical',lesson:'mech_forces',difficulty:3,
    q:'A 1000 kg car accelerates from 0 to 20 m/s in 10 seconds. What net force is required?',
    options:['200 N','2000 N','10000 N','20000 N'],correct:1,
    explanation:'a = Δv/t = 20/10 = 2 m/s². F = ma = 1000 × 2 = 2000 N.'},
  {id:'mc33',section:'mechanical',lesson:'mech_fluids',difficulty:3,
    q:'According to Bernoulli\'s principle, what happens to air pressure above an airplane wing as air speeds up?',
    options:['Pressure increases','Pressure decreases','Pressure stays the same','Pressure oscillates'],correct:1,
    explanation:'Bernoulli\'s Principle: faster-moving fluid exerts LOWER pressure. Air moves faster over the curved top of the wing → lower pressure on top → net upward lift force.'},
  {id:'mc34',section:'mechanical',lesson:'mech_levers',difficulty:3,
    q:'A lever needs to lift a 300 lb load. The effort arm is 6 feet and the load arm is 2 feet. How much effort force is needed?',
    options:['100 lbs','150 lbs','200 lbs','900 lbs'],correct:0,
    explanation:'F_effort × 6 = 300 × 2. F_effort = 600/6 = 100 lbs. The MA of 3 means you only need 1/3 the force.'},

  {id:'r9',section:'reading',lesson:'reading_main',difficulty:2,
    q:'"While electric vehicles are often promoted as zero-emission transportation, the manufacturing process for their lithium-ion batteries involves significant environmental costs. Mining lithium and cobalt requires large amounts of water and energy, often in regions already experiencing water stress. Additionally, the electricity used to charge EVs still largely comes from fossil fuel power plants in many regions. Proponents argue that over their full lifecycle, EVs still produce fewer emissions than conventional vehicles, but the comparison depends heavily on the local energy grid."\n\nWhich statement best summarizes the author\'s position?',
    options:[
      'Electric vehicles are worse for the environment than gas cars',
      'Electric vehicles are environmentally perfect',
      'The environmental benefit of EVs is real but more nuanced than commonly presented',
      'Battery manufacturing should be banned'
    ],correct:2,
    explanation:'The passage acknowledges both sides: EVs have environmental costs (mining, grid dependence) but proponents note fewer lifecycle emissions. The "it depends" framing shows nuance. Options A and B are too extreme. D is not suggested.'},
  {id:'r10',section:'reading',lesson:'reading_inference',difficulty:3,
    q:'Based on the EV passage, in which scenario would electric vehicles have the GREATEST environmental advantage over gas vehicles?',
    options:[
      'In regions with coal-heavy power grids',
      'In regions with abundant renewable energy sources',
      'In regions with limited water resources',
      'In regions with no recycling infrastructure'
    ],correct:1,
    explanation:'The passage states the comparison "depends heavily on the local energy grid." If the grid uses renewables, the charging emissions drop dramatically, maximizing EVs\' advantage. Coal grids (A) would narrow the advantage. Water issues (C) and recycling (D) relate to manufacturing, not usage emissions.'},
];

// TEXT-TO-SPEECH ENGINE
// ═══════════════════════════════════════════════════
function TTSBar({lessonId}){
  const [speaking,setSpeaking]=useState(false);
  const [paused,setPaused]=useState(false);
  const [rate,setRate]=useState(1.0);
  const [progress,setProgress]=useState(0);
  const utterRef=useRef(null);
  const intervalRef=useRef(null);
  const chunksRef=useRef([]);
  const chunkIdxRef=useRef(0);

  // Clean HTML to plain text for speech
  const getText=useCallback(()=>{
    const lesson=LESSONS[lessonId];
    if(!lesson) return '';
    const div=document.createElement('div');
    div.innerHTML=lesson.content;
    // Add pauses at section breaks
    div.querySelectorAll('h4').forEach(el=>{el.textContent='\n\n'+el.textContent+'.\n';});
    div.querySelectorAll('.formula').forEach(el=>{el.textContent='\nFormula: '+el.textContent+'.\n';});
    div.querySelectorAll('.tip,.example,.warning').forEach(el=>{el.textContent='\n'+el.textContent+'\n';});
    return div.textContent.replace(/\s+/g,' ').trim();
  },[lessonId]);

  // Split text into chunks (speechSynthesis has a ~200 char limit in some browsers)
  const splitText=(text)=>{
    const sentences=text.match(/[^.!?]+[.!?]+/g)||[text];
    const chunks=[];
    let current='';
    sentences.forEach(s=>{
      if((current+s).length>180){
        if(current) chunks.push(current.trim());
        current=s;
      }else{current+=s;}
    });
    if(current.trim()) chunks.push(current.trim());
    return chunks;
  };

  const speakChunk=(idx)=>{
    const chunks=chunksRef.current;
    if(idx>=chunks.length){stop();return;}
    chunkIdxRef.current=idx;
    const u=new SpeechSynthesisUtterance(chunks[idx]);
    u.rate=rate;
    u.pitch=1;
    u.onend=()=>{
      const next=chunkIdxRef.current+1;
      setProgress(Math.round(next/chunks.length*100));
      if(next<chunks.length) speakChunk(next);
      else stop();
    };
    u.onerror=()=>stop();
    utterRef.current=u;
    window.speechSynthesis.speak(u);
  };

  const play=()=>{
    if(paused&&speaking){
      window.speechSynthesis.resume();
      setPaused(false);
      return;
    }
    window.speechSynthesis.cancel();
    const text=getText();
    if(!text) return;
    const chunks=splitText(text);
    chunksRef.current=chunks;
    chunkIdxRef.current=0;
    setProgress(0);
    setSpeaking(true);
    setPaused(false);
    speakChunk(0);
  };

  const pause=()=>{
    window.speechSynthesis.pause();
    setPaused(true);
  };

  const stop=()=>{
    window.speechSynthesis.cancel();
    setSpeaking(false);
    setPaused(false);
    setProgress(0);
  };

  // Cleanup on unmount
  useEffect(()=>()=>{window.speechSynthesis.cancel();},[]);
  // Update rate on existing utterance
  useEffect(()=>{if(utterRef.current)utterRef.current.rate=rate;},[rate]);

  return(
    <div className="tts-bar">
      <div className="tts-label">🔊 Listen</div>
      {!speaking?(
        <button className="tts-btn tts-btn-play" onClick={play} title="Read aloud">▶</button>
      ):(
        <>
          {paused?(
            <button className="tts-btn tts-btn-play" onClick={play} title="Resume">▶</button>
          ):(
            <button className="tts-btn tts-btn-play" onClick={pause} title="Pause">⏸</button>
          )}
          <button className="tts-btn tts-btn-stop" onClick={stop} title="Stop">⏹</button>
        </>
      )}
      <div className="tts-progress"><div className="tts-fill" style={{width:`${progress}%`}}/></div>
      <div style={{display:'flex',alignItems:'center',gap:4}}>
        <span className="text-sm text-muted">{rate}x</span>
        <input type="range" min="0.5" max="2" step="0.25" value={rate} onChange={e=>setRate(parseFloat(e.target.value))} title="Speed"/>
      </div>
    </div>
  );
}

// STORAGE HELPERS
// ═══════════════════════════════════════════════════
const STORAGE_KEY = 'oar_study_bot_v1';
const CHECKPOINT_KEY = 'oar_checkpoints_v1';

function loadData(){
  try{ const d=localStorage.getItem(STORAGE_KEY); return d?JSON.parse(d):null; }catch(e){return null;}
}
function saveData(data){
  try{localStorage.setItem(STORAGE_KEY, JSON.stringify(data));}catch(e){}
}
function loadCheckpoints(){
  try{ const d=localStorage.getItem(CHECKPOINT_KEY); return d?JSON.parse(d):[]; }catch(e){return [];}
}
function saveCheckpoints(cps){
  try{localStorage.setItem(CHECKPOINT_KEY, JSON.stringify(cps));}catch(e){}
}
function getInitialState(){
  const saved=loadData();
  if(saved) return saved;
  return {
    lessonsCompleted:[],
    quizHistory:[],
    streakDays:0,
    lastStudyDate:null,
    totalStudyMinutes:0,
    sessionStart:Date.now()
  };
}

// MAIN APP
// ═══════════════════════════════════════════════════
function App(){
  const [state,setState]=useState(getInitialState);
  const [view,setView]=useState('dashboard'); // dashboard, learn, learn_topic, practice, quiz, quiz_active, review, log
  const [selectedLesson,setSelectedLesson]=useState(null);
  const [selectedSection,setSelectedSection]=useState('all');
  const [quizQuestions,setQuizQuestions]=useState([]);
  const [quizIndex,setQuizIndex]=useState(0);
  const [quizAnswers,setQuizAnswers]=useState([]);
  const [quizStartTime,setQuizStartTime]=useState(null);
  const [showExplanation,setShowExplanation]=useState(false);
  const [selectedAnswer,setSelectedAnswer]=useState(null);
  const [practiceMode,setPracticeMode]=useState(false);
  const [checkpoints,setCheckpoints]=useState(loadCheckpoints);
  const [cpName,setCpName]=useState('');
  const [showCpModal,setShowCpModal]=useState(false);
  const [confirmRestore,setConfirmRestore]=useState(null); // checkpoint id to confirm

  useEffect(()=>{saveData(state);},[state]);
  useEffect(()=>{
    const today=new Date().toDateString();
    if(state.lastStudyDate!==today){
      const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
      const isConsecutive=state.lastStudyDate===yesterday.toDateString();
      setState(s=>({...s,lastStudyDate:today,streakDays:isConsecutive?s.streakDays+1:1,sessionStart:Date.now()}));
    }
  },[]);

  // Derived stats
  const totalAnswered=state.quizHistory.length;
  const totalCorrect=state.quizHistory.filter(h=>h.correct).length;
  const accuracy=totalAnswered>0?Math.round(totalCorrect/totalAnswered*100):0;
  const wrongByLesson=useMemo(()=>{
    const map={};
    state.quizHistory.filter(h=>!h.correct).forEach(h=>{
      if(!map[h.lesson])map[h.lesson]=0;
      map[h.lesson]++;
    });
    return map;
  },[state.quizHistory]);
  const weakLessons=Object.entries(wrongByLesson).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const sectionStats=useMemo(()=>{
    const sections={math:{total:0,correct:0},reading:{total:0,correct:0},mechanical:{total:0,correct:0}};
    state.quizHistory.forEach(h=>{
      if(sections[h.section]){sections[h.section].total++;if(h.correct)sections[h.section].correct++;}
    });
    return sections;
  },[state.quizHistory]);

  function startQuiz(section='all',count=10){
    let pool=QUESTIONS.filter(q=>section==='all'||q.section===section);
    // Weight toward weak areas
    const wrongIds=new Set(state.quizHistory.filter(h=>!h.correct).map(h=>h.qId));
    let weighted=[];
    pool.forEach(q=>{
      weighted.push(q);
      if(wrongIds.has(q.id)){weighted.push(q);weighted.push(q);} // 3x weight for previously wrong
    });
    // Shuffle and pick
    for(let i=weighted.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[weighted[i],weighted[j]]=[weighted[j],weighted[i]];}
    const seen=new Set();
    const selected=[];
    for(const q of weighted){if(!seen.has(q.id)&&selected.length<count){seen.add(q.id);selected.push(q);}}
    setQuizQuestions(selected);
    setQuizIndex(0);
    setQuizAnswers([]);
    setQuizStartTime(Date.now());
    setShowExplanation(false);
    setSelectedAnswer(null);
    setView('quiz_active');
  }

  function startPractice(lessonId){
    const questions=QUESTIONS.filter(q=>q.lesson===lessonId);
    if(questions.length===0){alert('No practice questions for this lesson yet.');return;}
    setQuizQuestions(questions);
    setQuizIndex(0);
    setQuizAnswers([]);
    setQuizStartTime(Date.now());
    setShowExplanation(false);
    setSelectedAnswer(null);
    setPracticeMode(true);
    setView('quiz_active');
  }

  function answerQuestion(ansIdx){
    if(showExplanation) return;
    const q=quizQuestions[quizIndex];
    const correct=ansIdx===q.correct;
    setSelectedAnswer(ansIdx);
    setShowExplanation(true);
    const entry={id:Date.now(),qId:q.id,section:q.section,lesson:q.lesson,correct,date:new Date().toISOString(),userAnswer:ansIdx};
    setQuizAnswers(prev=>[...prev,entry]);
    setState(s=>({...s,quizHistory:[...s.quizHistory,entry]}));
  }

  function nextQuestion(){
    if(quizIndex<quizQuestions.length-1){
      setQuizIndex(quizIndex+1);
      setShowExplanation(false);
      setSelectedAnswer(null);
    }else{
      setView(practiceMode?'learn':'quiz_results');
      setPracticeMode(false);
    }
  }

  function saveCheckpoint(){
    const name=cpName.trim()||('Checkpoint '+new Date().toLocaleDateString());
    const cp={
      id:Date.now(),
      name,
      date:new Date().toISOString(),
      snapshot:JSON.parse(JSON.stringify(state)),
      stats:{
        answered:state.quizHistory.length,
        correct:state.quizHistory.filter(h=>h.correct).length,
        lessonsCompleted:state.lessonsCompleted.length
      }
    };
    const updated=[cp,...checkpoints].slice(0,20); // keep max 20
    setCheckpoints(updated);
    saveCheckpoints(updated);
    setCpName('');
    setShowCpModal(false);
  }

  function restoreCheckpoint(cpId){
    const cp=checkpoints.find(c=>c.id===cpId);
    if(!cp) return;
    setState(cp.snapshot);
    saveData(cp.snapshot);
    setConfirmRestore(null);
    setView('dashboard');
  }

  function deleteCheckpoint(cpId){
    const updated=checkpoints.filter(c=>c.id!==cpId);
    setCheckpoints(updated);
    saveCheckpoints(updated);
  }

  function resetProgress(){
    if(confirm('This will erase ALL progress and checkpoints. Are you absolutely sure?')){
      const fresh={lessonsCompleted:[],quizHistory:[],streakDays:0,lastStudyDate:new Date().toDateString(),totalStudyMinutes:0,sessionStart:Date.now()};
      setState(fresh);
      saveData(fresh);
      setCheckpoints([]);
      saveCheckpoints([]);
    }
  }

  function resetToFresh(){
    if(confirm('Reset progress to zero? (Your checkpoints will be preserved so you can go back.)')){
      const fresh={lessonsCompleted:[],quizHistory:[],streakDays:0,lastStudyDate:new Date().toDateString(),totalStudyMinutes:0,sessionStart:Date.now()};
      setState(fresh);
      saveData(fresh);
    }
  }

  function unmarkLesson(id){
    setState(s=>({...s,lessonsCompleted:s.lessonsCompleted.filter(l=>l!==id)}));
  }

  function completeLesson(id){
    if(!state.lessonsCompleted.includes(id)){
      setState(s=>({...s,lessonsCompleted:[...s.lessonsCompleted,id]}));
    }
  }

  const lessonList=Object.values(LESSONS);
  const mathLessons=lessonList.filter(l=>l.section==='math');
  const readingLessons=lessonList.filter(l=>l.section==='reading');
  const mechLessons=lessonList.filter(l=>l.section==='mechanical');

  const sectionColor=(s)=>s==='math'?'tag-math':s==='reading'?'tag-reading':'tag-mech';
  const sectionLabel=(s)=>s==='math'?'Math':s==='reading'?'Reading':'Mechanical';
  const pct=(n,d)=>d>0?Math.round(n/d*100):0;

  // ═══════════════════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════════════════

  // ---- DASHBOARD ----
  if(view==='dashboard') return(
    <div className="app">
      <div className="header-bar">
        <div>
          <h1>OAR Study Bot</h1>
          <div className="subtitle">Benjamin's Personal OAR Tutor — Target: 50+</div>
        </div>
        <div className="flex gap-8 flex-center">
          {state.streakDays>0&&<div className="streak-badge">🔥 {state.streakDays} day streak</div>}
          <button className="btn btn-sm btn-secondary" onClick={()=>setShowCpModal(true)}>💾 Save Checkpoint</button>
        </div>
      </div>

      <div className="grid3 mb-16">
        <div className="stat-card"><div className="num">{totalAnswered}</div><div className="label">Questions Answered</div></div>
        <div className="stat-card"><div className="num" style={{color:accuracy>=70?'var(--green)':accuracy>=50?'var(--yellow)':'var(--red)'}}>{accuracy}%</div><div className="label">Overall Accuracy</div></div>
        <div className="stat-card"><div className="num">{state.lessonsCompleted.length}/{lessonList.length}</div><div className="label">Lessons Completed</div></div>
      </div>

      <div className="grid3 mb-16">
        {['math','reading','mechanical'].map(s=>{
          const st=sectionStats[s];
          const acc=pct(st.correct,st.total);
          return(
            <div className="card" key={s}>
              <div className="flex flex-between flex-center mb-8">
