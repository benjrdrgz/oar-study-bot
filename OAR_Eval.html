<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OAR Pre-Test Evaluation — Benjamin Rodriguez</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#131a2b;--card2:#1a2340;--accent:#00b4d8;--green:#06d6a0;--red:#ef476f;--yellow:#ffd166;--orange:#f77f00;--text:#e0e6f0;--text2:#8892a8;--border:#1e2d4a;--purple:#b388ff}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:16px}
.container{max-width:800px;margin:0 auto}
h1{font-size:28px;text-align:center;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.subtitle{text-align:center;color:var(--text2);font-size:14px;margin-bottom:20px}
button{cursor:pointer;border:none;font-family:inherit}

/* Phase indicator */
.phase-bar{display:flex;gap:4px;margin-bottom:24px}
.phase-step{flex:1;height:6px;border-radius:3px;background:var(--card2)}
.phase-step.active{background:var(--accent)}
.phase-step.done{background:var(--green)}

/* Intro card */
.intro-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;text-align:center;margin-bottom:20px}
.intro-card h2{font-size:22px;margin-bottom:12px}
.intro-card p{color:var(--text2);font-size:15px;margin-bottom:16px;max-width:500px;margin-left:auto;margin-right:auto}
.btn{padding:12px 28px;border-radius:10px;font-weight:700;font-size:16px;transition:all .15s}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{background:#33c9e8}
.btn-yes{background:var(--green);color:#000;padding:14px 32px;font-size:18px;border-radius:10px;font-weight:800}
.btn-no{background:var(--red);color:#fff;padding:14px 32px;font-size:18px;border-radius:10px;font-weight:800}
.btn-yes:hover{background:#2ee8b5}
.btn-no:hover{background:#f2607f}
.btn-kinda{background:var(--yellow);color:#000;padding:14px 24px;font-size:16px;border-radius:10px;font-weight:700}
.btn-kinda:hover{background:#ffe088}

/* Assessment card */
.assess-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:16px;transition:all .3s}
.assess-section{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;padding:4px 12px;border-radius:20px;display:inline-block}
.assess-section.math{background:rgba(0,180,216,.15);color:var(--accent)}
.assess-section.mech{background:rgba(255,209,102,.15);color:var(--yellow)}
.assess-section.read{background:rgba(6,214,160,.15);color:var(--green)}
.assess-question{font-size:20px;font-weight:700;margin:12px 0 8px;line-height:1.4}
.assess-formula{font-family:'Courier New',monospace;font-size:22px;font-weight:800;color:var(--yellow);background:var(--card2);border-radius:8px;padding:12px 16px;margin:12px 0;text-align:center}
.assess-context{font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.assess-buttons{display:flex;gap:12px;justify-content:center;margin-top:16px}
.assess-progress{text-align:center;color:var(--text2);font-size:13px;margin-bottom:8px}
.assess-counter{font-size:28px;font-weight:800;color:var(--accent);text-align:center;margin-bottom:4px}

/* Results */
.results-header{text-align:center;margin-bottom:24px}
.results-header h2{font-size:24px;margin-bottom:8px}
.score-row{display:flex;gap:12px;justify-content:center;margin:16px 0;flex-wrap:wrap}
.score-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 24px;text-align:center;min-width:120px}
.score-box .num{font-size:32px;font-weight:800}
.score-box .label{font-size:12px;color:var(--text2);margin-top:2px}
.score-box.good .num{color:var(--green)}
.score-box.warn .num{color:var(--yellow)}
.score-box.bad .num{color:var(--red)}

/* Cram output */
.cram-section{margin:24px 0}
.cram-section h3{font-size:18px;font-weight:800;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--border)}
.cram-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
.cram-item.priority-high{border-left:4px solid var(--red)}
.cram-item.priority-med{border-left:4px solid var(--yellow)}
.cram-item h4{font-size:15px;font-weight:700;margin-bottom:6px}
.cram-item .cram-formula{font-family:'Courier New',monospace;font-size:20px;font-weight:800;color:var(--yellow);margin:8px 0}
.cram-item .cram-note{font-size:13px;color:var(--text2);line-height:1.6}
.cram-item .cram-note strong{color:var(--text)}
.cram-item .cram-example{background:var(--card2);border-radius:6px;padding:8px 12px;margin-top:8px;font-size:13px;border-left:3px solid var(--green);color:var(--green)}
.cram-item .cram-trick{background:rgba(179,136,255,.08);border:1px solid rgba(179,136,255,.2);border-radius:6px;padding:8px 12px;margin-top:8px;font-size:13px;color:var(--purple)}
.cram-item img{max-width:100%;height:auto;border-radius:6px;margin:8px 0;background:#fff;padding:4px;max-height:180px;object-fit:contain}

.scratch-dump{background:var(--card);border:2px dashed var(--yellow);border-radius:12px;padding:20px;margin:24px 0;font-family:'Courier New',monospace;font-size:15px;line-height:2;white-space:pre-wrap}
.scratch-dump h3{font-family:'Segoe UI',sans-serif;color:var(--yellow);margin-bottom:10px;font-size:16px;text-transform:uppercase;letter-spacing:1px}

.all-good{background:var(--card);border:2px solid var(--green);border-radius:16px;padding:32px;text-align:center;margin:24px 0}
.all-good h3{color:var(--green);font-size:22px;margin-bottom:8px}
.all-good p{color:var(--text2)}

.restart-btn{display:block;margin:24px auto;padding:12px 32px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-weight:700;font-size:14px}
.restart-btn:hover{border-color:var(--accent)}

/* Animations */
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:slideIn .3s ease}

/* Print friendly */
@media print{
  body{background:#fff;color:#000}
  .assess-card,.intro-card,.phase-bar,.assess-buttons,.restart-btn{display:none}
  .cram-item{border:1px solid #ccc;break-inside:avoid}
  .cram-item .cram-formula{color:#000}
  .scratch-dump{border:2px solid #000}
}
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>

// ============================================================
// APP STATE
// ============================================================
let currentIndex = 0;
let results = {}; // id -> 'yes' | 'kinda' | 'no'
let phase = 'intro'; // intro | assess | results

function render() {
  const app = document.getElementById('app');
  if (phase === 'intro') renderIntro(app);
  else if (phase === 'assess') renderAssess(app);
  else if (phase === 'results') renderResults(app);
}

function renderIntro(app) {
  app.innerHTML = `
    <h1>OAR PRE-TEST EVAL</h1>
    <p class="subtitle">Know what you don't know — then drill ONLY that.</p>
    <div class="intro-card">
      <h2>How This Works</h2>
      <p>I'll show you <strong>${ITEMS.length} formulas and concepts</strong> from the OAR. For each one, tell me:</p>
      <div style="display:flex;gap:12px;justify-content:center;margin:16px 0;flex-wrap:wrap">
        <div style="background:rgba(6,214,160,.1);border:1px solid rgba(6,214,160,.3);border-radius:8px;padding:12px 20px;text-align:center">
          <div style="font-size:24px;font-weight:800;color:var(--green)">YES</div>
          <div style="font-size:12px;color:var(--text2)">I know this cold</div>
        </div>
        <div style="background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.3);border-radius:8px;padding:12px 20px;text-align:center">
          <div style="font-size:24px;font-weight:800;color:var(--yellow)">KINDA</div>
          <div style="font-size:12px;color:var(--text2)">I've seen it but shaky</div>
        </div>
        <div style="background:rgba(239,71,111,.1);border:1px solid rgba(239,71,111,.3);border-radius:8px;padding:12px 20px;text-align:center">
          <div style="font-size:24px;font-weight:800;color:var(--red)">NO</div>
          <div style="font-size:12px;color:var(--text2)">Don't know / blank</div>
        </div>
      </div>
      <p>Then I'll generate your <strong>personal cram sheet</strong> — only the stuff you need to memorize.</p>
      <div style="margin-top:20px">
        <button class="btn btn-primary" onclick="startAssess()">START EVALUATION →</button>
      </div>
      <div style="margin-top:12px;font-size:13px;color:var(--text2)">Takes about 3-5 minutes. Be honest.</div>
    </div>
  `;
}

function startAssess() {
  phase = 'assess';
  currentIndex = 0;
  results = {};
  render();
}

function renderAssess(app) {
  const item = ITEMS[currentIndex];
  const total = ITEMS.length;
  const sectionClass = item.section === 'math' ? 'math' : item.section === 'mech' ? 'mech' : 'read';
  const sectionLabel = item.section === 'math' ? 'MATH' : item.section === 'mech' ? 'MECHANICAL' : 'READING';

  // Phase bar
  const phasePct = currentIndex / total;
  let phaseHTML = '<div class="phase-bar">';
  for (let i = 0; i < total; i++) {
    const cls = i < currentIndex ? 'done' : i === currentIndex ? 'active' : '';
    phaseHTML += `<div class="phase-step ${cls}"></div>`;
  }
  phaseHTML += '</div>';

  app.innerHTML = `
    ${phaseHTML}
    <div class="assess-counter">${currentIndex + 1} / ${total}</div>
    <div class="assess-progress">${sectionLabel} — ${item.topic}</div>
    <div class="assess-card animate-in">
      <span class="assess-section ${sectionClass}">${sectionLabel}: ${item.topic}</span>
      <div class="assess-question">${item.question}</div>
      <div class="assess-formula">${item.formula}</div>
      <div class="assess-context">${item.context}</div>
      <div class="assess-buttons">
        <button class="btn-yes" onclick="answer('yes')">✅ YES</button>
        <button class="btn-kinda" onclick="answer('kinda')">🟡 KINDA</button>
        <button class="btn-no" onclick="answer('no')">❌ NO</button>
      </div>
    </div>
  `;
}

function answer(val) {
  results[ITEMS[currentIndex].id] = val;
  currentIndex++;
  if (currentIndex >= ITEMS.length) {
    phase = 'results';
  }
  render();
}

function renderResults(app) {
  const yesCount = Object.values(results).filter(v => v === 'yes').length;
  const kindaCount = Object.values(results).filter(v => v === 'kinda').length;
  const noCount = Object.values(results).filter(v => v === 'no').length;
  const total = ITEMS.length;
  const readiness = Math.round((yesCount + kindaCount * 0.4) / total * 100);

  // Items to cram: all 'no' and 'kinda'
  const cramItems = ITEMS.filter(item => results[item.id] === 'no' || results[item.id] === 'kinda');
  const noItems = ITEMS.filter(item => results[item.id] === 'no');
  const kindaItems = ITEMS.filter(item => results[item.id] === 'kinda');

  let readinessColor = readiness >= 70 ? 'good' : readiness >= 45 ? 'warn' : 'bad';

  let html = `
    <h1>YOUR RESULTS</h1>
    <p class="subtitle">Here's exactly what you need to focus on.</p>
    <div class="score-row">
      <div class="score-box ${readinessColor}">
        <div class="num">${readiness}%</div>
        <div class="label">Readiness Score</div>
      </div>
      <div class="score-box good">
        <div class="num">${yesCount}</div>
        <div class="label">Know It ✅</div>
      </div>
      <div class="score-box warn">
        <div class="num">${kindaCount}</div>
        <div class="label">Shaky 🟡</div>
      </div>
      <div class="score-box bad">
        <div class="num">${noCount}</div>
        <div class="label">Don't Know ❌</div>
      </div>
    </div>
  `;

  if (cramItems.length === 0) {
    html += `
      <div class="all-good">
        <h3>🔥 You're Ready</h3>
        <p>You said you know everything cold. Go crush this exam. Don't second-guess yourself.</p>
      </div>
    `;
  } else {
    // PRIORITY 1: Don't know at all
    if (noItems.length > 0) {
      html += `<div class="cram-section"><h3 style="color:var(--red)">🚨 MUST MEMORIZE (You Don't Know These)</h3>`;
      html += noItems.map(item => renderCramItem(item, 'high')).join('');
      html += `</div>`;
    }

    // PRIORITY 2: Kinda know
    if (kindaItems.length > 0) {
      html += `<div class="cram-section"><h3 style="color:var(--yellow)">⚠️ REVIEW THESE (You're Shaky)</h3>`;
      html += kindaItems.map(item => renderCramItem(item, 'med')).join('');
      html += `</div>`;
    }

    // PERSONALIZED SCRATCH PAPER DUMP
    html += `<div class="scratch-dump"><h3>📝 YOUR PERSONALIZED SCRATCH PAPER DUMP</h3>`;
    html += `Write this the SECOND you sit down:\n\n`;
    cramItems.forEach(item => {
      html += `<span style="color:var(--yellow)">${item.topic.toUpperCase()}:</span> ${item.cramFormula.split('\n')[0]}\n`;
    });
    html += `</div>`;
  }

  html += `<button class="restart-btn" onclick="startAssess()">🔄 Retake Evaluation</button>`;
  html += `<div style="text-align:center;padding:20px;color:var(--text2);font-size:13px">Go get that 50, Benjamin. 🎯</div>`;

  app.innerHTML = html;
}

function renderCramItem(item, priority) {
  const sectionClass = item.section === 'math' ? 'math' : item.section === 'mech' ? 'mech' : 'read';
  const sectionLabel = item.section === 'math' ? 'MATH' : item.section === 'mech' ? 'MECHANICAL' : 'READING';

  let imgHTML = item.img ? `<img src="${item.img}" alt="${item.topic} diagram">` : '';
  let exampleHTML = item.cramExample ? `<div class="cram-example">${item.cramExample}</div>` : '';
  let trickHTML = item.cramTrick ? `<div class="cram-trick">🧠 ${item.cramTrick}</div>` : '';

  return `
    <div class="cram-item priority-${priority}">
      <span class="assess-section ${sectionClass}" style="font-size:11px">${sectionLabel}: ${item.topic}</span>
      <h4>${item.question.replace('Can you ', '').replace('Do you ', '').replace('know ', '').replace('?','')}</h4>
      <div class="cram-formula">${item.cramFormula.replace(/\n/g, '<br>')}</div>
      ${imgHTML}
      <div class="cram-note">${item.cramNote}</div>
      ${exampleHTML}
      ${trickHTML}
    </div>
  `;
}

// Boot
render();
</script>
</body>
</html>
